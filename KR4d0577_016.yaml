body:
  text: 麟原後集巻四元王禮撰序滄海遺珠集序予既編次元初以來朝野之詩凡二千三百餘首為長留天地間集行於世四方士友猶交致其所睹記者於予不覺又五百餘首展玩誦之因撫巻嘆曰詩也者其人文之精而元氣之為也歟何其愈出愈有而愈無窮也白樂天嘗言三才各有文天之文三光首之地之文五材首之人之文六經首之就六經言詩又首之自今而觀元氣行乎三光五嶽之間所以烟雲風雪晦明變化山川艸木動植榮悴流轉而常見者皆文也况鍾而為人又得五行之秀宜其能言之士各鳴其所遇以感人心而代不乏焉盖亦乗元氣吐人文往過來續而無盡藏也而亦未易得也抑嘗觀夫滄海之珠乎清圓明麗之可貴孰非元氣之孕也而詩之美似之然求珠於海必腰綆深入乎千尋蛟龍之淵而後得其難也若此乃有委於沙礫泥淖而莫之或收豈不深可慨哉於是復鋟今所得若干篇以補其遺而名其集曰滄海遺珠嗟乎詩之遺落不世見者可勝道哉登是集者可無棄予如遺之嘆矣遂書此以志其首送劉維行序吾邑瀨江劉氏世業小兒醫四方孩穉之病者咸奔走焉予往識日新翁淳慤信實人也嘗徴予序其譜繼又識其從子維行其恂恂篤厚猶其季父人皆稱其異於衆醫而未知其所以異盖其異者儒門也其諸祖有尊經先生博洽經史有才學者未能或之先也湏溪劉大博嘗師事焉於吾家衡州史君南山翁尤莫逆故予稔知其家嗟夫醫之為數人之死生繫焉豈不難哉然小兒醫又其最難者也血氣未充外邪易入啼焉而莫知其所苦問焉而弗能吐其意心誠求之億則庶中非恂恂篤厚者罕能得也予親友劉英逺童幼爽和深自驚慮於是屬之維行維行極力調䕶旋喜勿藥英逺感之深以世俗之所以報者未足副維行之望必求余文以報之數以書來諗衰晚之年懈於搆思而請弗倦因嘆維行及幼之功出於誠而英逺報徳之意亦出於誠皆可敬也予雖老又惡得愛於一言哉送莫慶善歸宜春寓所序莫慶善氏吉文士族也少有俠氣善琴善畫鷹知名一時有縣其所畫中庭雞鶩諤視不敢進亂定喜宜春山水幽絶往游僑居二十餘載名公使客之過宜春者必之莫氏得其一翎半筆寳若大貝去秋暫還廬陵識與不識咸奔走焉罷於筆墨殆甚宜春明年春將復僑所鄉之親舊留行未得飲之酒賦詩為别而屬某序其情酒半某語之曰傳稱士去其國止之曰奈何棄墳墓也韓昌黎稱楊少尹亦以鄉人莫不加敬誡子孫以楊侯不去其鄉為法慶善得無有遲遲之思乎且某聞李伯時畫馬法雲秀禅師曰公業此日乆求其情狀繫念不忘他日必入馬胎伯時愕然遂畫觀音慶善落筆無非暴鷙搏擊之態得無麟鳳儀儀師師之意罕見也夫慶善曰子厚我者也藥石之誨也吾將歸老於忠節之邦矣吾將引洙泗清流以泚筆掇太山巖石以礪墨而寫夫日凖月角河目海口龍形虎掌之表矣相視一笑别去贈愚直隠者序洪武四年秋予校文東廣蔡與善亦省其嚴父立敬翁於五羊暇則侍其親來謁于時觀與善其容顒然其志昂然予竊喜翁之有子也自是别去邈莫相知後聞其游海康溯灘瀧而窺勾漏歴蒼梧之野以至於桂林而歸又鼓枻東游以觀京師之雄麗浙水之清妍益壯其為人今年夏五有稱愚直隠者談星命數學於吾里占候吉凶如養由基之射予聞而異之曰其寄迹於方技而逃名於隠逸者與既而來訪謂昔者嘗拜予於嶺表與之語而熟睨焉前與善也於是濶别一紀而翁亦不可作矣棘欒乍見感嘆乆之與善作而請曰僕歸魯溪之上有年矣築室里之環山粗庇風雨左右田園數畝耕治足以給朝夕親舊過從斗酒談笑亦自暢情而畷翁牧老又時能班荆憩䕃共話桑麻或喜其愚或與其直而吾之心跡亦可隠矣時有稽疑過衡門之下則據愚者之見而直道之否泰禍福之機粲然可睹他何能哉先生與僕雅故願一言序愚直者之志予知蔡乆嘉蔡之多能慕蔡之肥遯又忍違蔡之請乎作贈愚直隠者序思齊堂詩序思齊堂者士原珠湖之肯搆也有詩成巻者騷人才士咏其思齊之志也盖堂也者君子攸躋之地風雨除矣鳥䑕去矣似續妣祖者於斯居處笑語者於斯俛仰之際得無有所思乎人之常情孰不望髙思賢人君子勝已而可敬必願與之齊齊之如何就其如賢人君子者去其不如賢人君子者則人亦安知其孰為賢人君子而孰為我哉此士希賢之功而在實用其力也詩人喜之稱之於以助之非一念相愛之情歟士原本淳溪彭氏其先由科第起家鄊稱右族僑寓珠湖昉三四世父子承中廢而為興門人所難者嘗閱其譜牒歴歴如眂諸掌及觀堂扁與題詠之什又喜士原之勇於從善諸賢之與人為善故為序之詩云誰謂華高企其齊而尚當與為士原而三復誦之送族子朝俊行術序朝俊將行四方辭於予曰易言不家食吉愚末小子之出長者將何以教之予問汝之出也何挟乎曰道本於太一分而為天地轉而為隂陽高明祖父之所以駕風鞭霆興雲致雨利下土福民生傳自劉公動神以迄於今者太一之說也世家宣溪含沖毓和克生賢傑科第簪纓綿綿延延以享夫榮名而䕃其後者由遇夫地仙鍾珏得聚散向背之㣲則隂陽之說也賤子皆與聞之其於出也何有於是進之曰茍卿有云藝之善者不兩能今汝乃兼能之不幾於夸誕乎雖然老氏之稱道家以其近道理也觀山川流峙之形勢者可謂之明地理則於二者可不力學以究其理乎苟能讀書究其理則吾之心正天地之心亦正吾之氣順天地之氣亦順而仰有以動乎天東西為緯南北為經山為積徳川為積形而俯有以察乎地若然則庸巫常師不足汝敵矣朝俊作而謝曰善哉長者之誨也敢不敬從於是因其先祖南齋之號一字南阜又可見其自新之意而南為生育之鄊尤可尚云送士鴻應辟序泰和劉司業之子平原應辟赴京維檝白鷺之渚趨予陋止言别且曰平原甫除喪家政無所經紀病母無所療養學業未有所切摩形單影隻煢煢自悼乃有以名聞檄急於火勢難乆稽觸熱以往先生執友也可無一言啓益我哉聞之黯然因念司業敬我深知我厚嘗以宦游靡定欲屬其子於我以為經已有諾責而時艱人逺未有幾㣲及之如斯以出愧負司業矣夫以世禄之彦才質之美遲之數年使鄧林之植藍田之産經夫斵之礲之以成其美嚴徐之見未為晚也發於持滿必為名士為賢大夫庸非士友所深望雖然人之出處淹速固各有時非人之所能為也愬情而弗獲則禄代以養仕優而學要亦無不可者洛陽年少立經紀之制陳治安之策傳之天下垂於無窮豈亦大早計乎余前言過矣子其勉之平原今字士鴻云伯雨字序王氏子祖霖以大父之命既筮賓以冠僉謂此令器也揆錫以字無踰伯雨一日請於予曰願有所教俾得因名思義以自勉焉予見其執經問難弗明弗措揮毫落紙虎躍鸞翔心甚奇之於是因其字以諗之曰雨者天之霈澤隂陽和暢之所致也古人則藴之為徳行施之為利澤上之恩澤及於已則已之膏澤下於民小畜之辭曰宻雲不雨自我西郊施未行也伯雨之今日以之乾之辭曰雲行雨施天下平也則隂陽和洽而品物暢遂伯雨之他日以之以子之才未有畜而不施藴而不用者也雖然雨固潤澤萬類者也適其時則為甘損於物則為苦用汝作霖雨之際為甘乎為苦乎伯雨曰嵗既大旱將甘之之不暇又焉得以為苦耶予笑曰因此悟彼斯子可與言易矣作伯雨字序以詒之贈無誥師歸隠序前十年前陵驚谷駭平生游好困阨淪謝過半其幸存者或隔絶數千百里外累嵗書教不相移或逐逐珪組干名席寵於當世則不得朝夕常見求其氣味同樂尚近可與晤語抒意者何其不富見也以清修朴簡迹寄釋氏法中若吾無誥師其殆凡卉之猗蘭衆羽之孤鳳也歟其性情文學不與吾儒異道又多藝能逺近所敬慕真栁子所謂雖聖人復生不可得而斥也往承平時師方壯年同兄碧虚游覽淛之名山水過江表從訢公笑隠游故多識一時茂士重客迨歸東山若將終身亂餘起而領袖青原愜輿望甚於今五年矣聲鼓而退或問師故則曰吾曩也振錫而出不自知胡然龍翔之留也歸也解包而歸隠亦不自知胡然而青原之寄也吾止吾行如雲如水隨於時聽於天吾惡乎知惡乎知苐與其有所任於事而役乎心曷若逍遥訑慢以樂吾志乎予聞而嘆曰其有道者歟予固知師之賢於人也雖然古人一池一堂之勝猶以得其人居之則山若髙水若廣况青原聞天下者乎予方為學校出也而氣味同樂尚近如無誥師者乃幡然去之違離契濶吾誰與語能無愴惻於懷者乎𤣥妙韋煉師道沖與予皆知師者韋既采惜别之詞為巻復徴予序之予於無誥舊且厚雖㣲韋請猶將盡吾情况敢負於韋而愛於言哉詩云無金玉爾音而有遐心餞别之頃尚當為師三復誦之閩山樵隠序閩山樵隠者新安汪君士章也方天下無事士章克紹前烈干禄以養志亦少遂矣迨八表塵昏即裂冠毁冕入乎閬山一簔一笠與樵夫野老同其趣非知幾之士哉予觀箕潁以來長往之倫厥類非一或隠居以求其志或避世以全其髙或垢俗以潔其身或守已以鎮乎物類皆表裏一致始終同操使百世之下景慕不已其所謂志意修則驕富貴者歟有如士章道足以𢎞才足以赴而能囊括於寛閒寂寞之地鍾鼎不足為之榮簞瓢不足為之屈宜其樵隠樂趣諸賢詠歌之不足也予初未識士章雲陽進士李君一初亟稱其賢固已耳熟而心往矣今見士章睟乎其容藹乎其言益信李君之知人則於士章已嗟見晚能無情乎雖然仕止在乎隨時士章年强徳立而時方求賢正士君子行志達道之日也惡可乆宅閬山之勝遂忘天下之窮民哉若觀魚鳥玩泉石以自娛乃余衰邁無用於世者之宜而非所望於士章焉他日成名歸榮故鄉而後寓隠於樵未為晚也士章以為何如美王太守祈雨詩序郡太守太原王公君澤莅政廬陵之明年汲汲惟恐黎庶之失所遇利害悉興除之於是政平俗安方千里倚之為泰山為慈父夏五月連旬不雨赫威如爐民無所喙息而苗日槁矣公惻然曰吾郡之民俛焉日給公上之需於常賦外而未嘗有幾㣲怨咨之色形於顔面真良民也今遭時之盭如此將仰無以充國家之賦俯無以為事育之資吾且奈之何哉遂徧禱於老佛之宮神仙之所又遣府史乞靈於龍湫公則齋戒沐浴夜直雩壇以俟遲不得命則不冠不履奉所祀之神周巡闤闠以致罪已意而日竟不曀衆益疑焉禮則知雨之終可必也蒼蒼而上窮阨而呼必可聞隠痛而祈必可感盖形勢高而視聼卑也先是公於歉月寛里役舊輸之虧者數百人歡聲載道上聞於天洗寃澤物之意隠然與東海祭孝婦同科况其素行之孚於上下交於神明而無愧者哉此禮所以知雨之終可必也既而賜履之境靡不沾足于是郡邑之士咸為詩歌以詠太守之德而謁禮為之序禮觀一雨之應國家財賦之出生民事育之資舉有所利賴繄誰力哉賦詠之可也遂歌之可也序而傳之亦可也故書夀歌題辭傳有之食饗之禮非以致味也又曰饗所以昭徳也近年俶擾以來故家舊族慶問闊焉不講况宴㑹之頃覬其藹然徳意粲然禮文哉於此而有能彷髴古訓一二是猶絶壑而聞履聲重隂而暏日月豈不驚見而喜道哉晴溪居士涉險阻艱難於盛年享熾昌夀考於晚節懇懇念箕裘之業惓惓營勤讀之齋志趣固有賢於人者也四月維夏適届初度一時子姓羣從捧觴上夀拜跪有序進退有容各取器物之可以擬夀延夀者悉播之聲歌以抒有慶之悰予覽而笑曰諸生之意逺矣樂記曰歌之為言也長言之也作歌以蘄夀非取長年之同音歟猶晉人尚九日而靖節詩謂舉俗愛其名斯人樂乆生意也長言之永歌之自不知手之舞足之蹈盖歌詠所以養人性情舞蹈所以養人血脈髙年聞歌詠之美自然思暢神怡精力强固豈不賢於偃仰屈伸效彭祖於渺茫哉春酒介夀亦取和適又其次也於是上下之際藹然徳意相洽粲然禮文相接則夀考且寧保我後生也必矣諸生欣然請題辭於簡遂書斯語以與進之亦以勉夫世禄之家事長之禮有未暇者云麟原後集巻四

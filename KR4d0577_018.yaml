body:
  text: 麟原後集巻六元王禮撰記存竹堂記余至東昌客有從余登蕭氏之堂予問堂以存竹名竹惡在客曰非是之謂也蕭氏祖徳祥能守厥考竹軒居士之業猶竹軒未亡嘉之者以存竹稱也然則其詳可聞乎曰當在宋也徳祥之五世祖子信職醫獲交於忠簡胡公公餽之金錫之田薦之官俱弗受問所欲曰但願子孫世世讀書足矣公嘉其志大書讀書二字顔其堂至居士能守此訓以不隤其世業徳祥又能繼其志潛心於學明理於醫逺近疾病者咸歸之證論可為與否或當至劇乃愈或可不療自愈後皆如其言全活者衆而未嘗責報於人貧乏者與藥不問直侑以米炭薑棗濟之士大夫謂其能以竹軒之心存心非徒存其遺訓世業而已謂之存竹也實宜初仕廣州惠民藥局提領遷韶州醫學教授以夀終於家平居惟延師教子為先務世慮澹然雖出入權貴之門未嘗干以私又曰今其子孫信厚文雅資計温裕皆食舊徳所致而斯堂未有記常往來於懷先生辱與其子若孫游能勿靳於一言乎余觀今世豪家大族五世希不失矣贊皇之石魏公之笏其存幾希矧有如韶州教授既存竹軒之世業復存竹軒之世徳者乎宜其子孫詵詵濟濟勿替有引非偶然也昔髙唐趙氏有儒醫篤於利濟𠖇𠖇隂佑釐以孫子青山先生出焉天之報施善人庸有爽哉蕭氏嫓美於趙將必有顯者出以其時考之可矣姑誌於斯堂以俟進脩堂記從弟子充嗜學不厭因舊堂而牖之疏通爽朗名以進修求永新烏侯繼善先生篆於堂顔庶常目之以自勵既而欲聞其方志於屋壁於是語之曰易云君子進徳修業在忠信在修詞立誠釋者曰忠信主於心者無一念之不誠修詞見於事者無一言之不實予謂徳以存之心言也業以著於事言也中心之謂忠以實之謂信無妄之謂誠三者一道也徳言進忠信之積也一念不忠信徳非其徳矣况覬其進乎業言修又言居用力不置猶居其中也脩業而言修辭惟口出好興戎當謹飭其辭主於忠信所謂立誠也言忠信修辭立誠之謂也行篤誠忠信進徳之謂也君子終日乾乾慎斯二者而已矣昔元城事温公五年得一語曰誠請問其目曰自不妄語入元城初甚易之退覺言行矛盾力行七年而後成人之表裏一致豈易得哉夫堂也者君子攸寧之所而日與賓友揖讓進退周旋唯諾於其間者也吾弟賓退之頃即思向之所為果忠信乎所言果誠實乎夜寢之際即思晝之所為所言果無愧乎孜孜力行改過勿憚不為善人君子之歸吾未之信也吾宗簪纓之世雖逺詩禮之澤猶長但在勿替引之耳予老矣何未見子弟篤於進修以無忝爾祖者乎顧名思義尚允蹈之毋徒借聖賢法語以為黼黻庭内之具介石軒記予一日至子充弟介石軒茶餘看菊意頗閒適子充從容言曰是軒得永新烏大夫篆以華之以伯氏也然名非不佞所命也昔曽伯祖城山公為太常寺丞時曽大父韋軒翁侍行由學館授登仕郎當國鄭府之吳潛甚器重之欲薦為東宮屬官適四川制置使某入覲又辟㕘謀軍事曽大父見某黜嘆曰君子道消矣拂衣而歸繕園池作亭字之曰介石日與故舊飲酒賦詩其間楊文節公為書其扁今以名軒不忘前人知幾之意伯氏幸能志其所以豈不因之以自朂哉則復之曰豫之六二介於石不終日貞吉夫子因二以中正自守其介如石而能見幾而作故極言知幾之道謂君子上交不諂下交不凟其知幾乎又曰介如石焉寧用終日斷可知矣夫當宋季奸臣柄國邊釁日開天地閉賢人隠時也而祖有見於君子小人進退之幾歸休乎斯亭盖深於易者也豈知進而不知退者所能及哉雖然彼一時也此一時也今吾弟往教四方無往而非賓主師友之交而欲介焉自處則非吾所知也説文曰介介畫也有分辨意嚴於分辨則不為石徂徠之方峭必為王荆公之執抝矣將處無與居也出無與徒也倡無與和也豈不孤立於天下哉聖不云乎鳥獸不可與同羣吾非斯人之徒與而誰與子充有味於予言也乎抑亦惟祖訓是式歟子充謝曰謹事斯語因筆於是軒以記湖山清隠樓記由永新而南歴坡經丘行三十里有湖山明秀之勝游氏世居焉予嘗至其地徘徊湖上不自知心豁神怡也觀其嵐峰迎日而曉霧縈青瑤浸澄霞而暮烟横紫與夫千巖飛瀑萬樹啼蟬鳬鷖散影於渚坻雊雉交飛於林麓其或桂飄金而風露清梅吐玉而泉石潔物態景光𠖇㑹静得則湖山一日之晦明四時之代謝善畫者亦未盡其趣也是以騷人文士至者或信信始别别而出門在道猶顧瞻徙倚而忘去去年予歸自永寧游氏湖山清隠之樓適成習傳邀予憑闌縱目湖山千態萬狀莫不自獻於几席之外若有大異於疇昔者矣時有歌於湖上者歌曰青迴翠合兮山掩水重英傑以毓兮畜聚與豐攬秀挹爽兮伊誰與同風月無邊兮維子之宮又歌曰湖之山有兔有麂山之湖有鱣有鮪為網為綸兮以賓以祀樂吾之樂兮施於孫子習傳笑顧予曰子為我記之予以為天下湖山之勝非少而有素業以世居其地者不多見今習傳世居斯土而専有其勝非一寓目一暢懷者比天之厚於游氏為何如哉予觀世之嬰情於寵辱之途者變遷於朝夕若蜉蝣之過目曽不得以少適其意視身享一丘一壑之樂而埀裕於後者可倖致耶超曠之識要不以此而易彼也予惡得不為習傳記之後之登斯樓而覽斯文庶亦悠然於山水之間而有悟也樂存堂記予僑寓東昌時尚賢以比隣日相洽知其信厚人也相疎十有餘年矣相視齒髪異於昔矣乃易字樂存以署其堂而謁予志之予聞孟氏君子有三樂王天下不與存焉於子心跡若有不似然者抑亦自有樂處歟曰走也毎療一病誠其意以求之詳其脈以察之或寒也或熱也或寒熱之相薄或元氣之痿孱也為之攻其族通其竅求以復其元及渙然氷釋熙然春融則歡然如釋重負予樂也惟仁以存心樂意未嘗不相干仁存斯樂存矣顧人之癢疴疾痛於我乎安性命夀夭於我乎順知利其利者不知予之樂其樂也舍此焉取所謂樂哉予喟然嘆曰古人有言士一命以上茍存心於愛物於人必有所濟職任民牧者曽思若何使無愁歎之聲若何使無顛連之苦如斯人之用心者乎先天下憂而憂後天下樂而樂相業也語曰不為良相則為良醫觀於蕭氏益信用記於壁庶覽者或有勸焉攬勝亭記予僑寓永和有年矣離去而重來亦數數然矣獨不知陳氏江亭之勝有足覽者今年秋訪隣尋舊子煒兄弟坐予亭上朴而不華雅而不俚規置有若畫舫者焉奇花異木嘉果美蔬雜植左右啟其户牖視之青原洞岩蔽乎其前有化人之幽致仙子之髙風令人動出世離塵之想螺山鷺渚峙乎下流城郭隠隠若往而復前修諸老忠義精爽有不升降飛揚於星月風霆之際者乎贑江横陳東南西之海外國凡百奇玩交廣諸郡鱗介羽毛草木根實之貢與可資於世用者舟楫晝夜不絶又使人重仰止朝宗之思嗟夫昔賢之涉此土若張曲江韓昌黎趙清獻蘓文忠黄文貞輩南去北來俯吟仰嘯曠觀千載今求其影跡已飄忽於斜陽芳艸之外矣而風檣沙鳥不改異日天地真逆旅也耶登斯亭者撫過續之逝川慨推遷之浮世寄懷物表脫略塵凡觴咏相娱攬結勝概豈非曠度逺適之快哉用記於壁朂我同志仁人堂記予訪舊東昌陳氏子煒邀予過其第傑宇夷庭歴刼如故几席静嘉而蘭芷芬郁如其意象為興門坐乆予問昔之字宗仁者於子誰歟曰煒先父也有為上岳知事者於子誰歟曰煒從兄也既而從容言曰里之長老因先父之字嘗以仁人名斯堂而未遇知名之士發其意以埀訓敢以為先生請予惟子弟如煒之兄弟能不遏佚前人光而述之揚之有可尚者矧舊知其父兄又何愛於一言哉苐孔門未嘗以仁輕許亞聖猶難之况常人乎傳稱仁者人也言仁最為親切最須體認盖人受天地生物之心以為生具此生理無往而非仁愛之意西山真氏以為人之所以為人以其有此仁由有此仁而後命之曰人人而不仁則非人矣昔嘗三復斯言惕然深省予告子者豈有加於此哉先儒謂滿腔子皆是仁故拔一毛而舉身為之動者生意之相關也手足痿痺懵不相知者乃生意斷絶醫家謂之不仁也煒之兄弟誠知民吾同胞物吾與也應事接物恒以仁愛存心則推而放之四海而達非特有光於前人亦足埀裕後昆矣有不列於仁人君子之林乎於是序而記之復系以詩詩曰乾父坤母品物囿仁人鍾靈秀同類益親惻隠之徳被物與民各具於已斯之謂人聞過則戒見善則欲四海弟兄况在骨肉相殘相害禽獸弗為靡克靡復念初可悲仁人名堂顧諟深省洞然八荒一視同境詩以颺之玉汝於成夙夜匪解自强自明雅軒記城西周復雅娖娖亷謹人也嘗為府從事獲上官器重而性嗜恬淡辭要而甘閒焉葺廬峻潔字之曰雅軒左圖右書前琴後奕培雙桂於中庭蓺九畹之芳萼客至焚香煮茶或談桑麻或咏風月棣韡光於朝萼萱泛采於春暉客有謂予曰復雅是軒可謂有雅致矣先生可無一言以榮斯所乎予復之曰若所謂雅者得其外未得其内也夫雅者正也復雅能律已以正耳不聽淫聲則耳正以聪目不視邪色則目正以明出處與正人居言動遵正道行故君臣以正則禮而忠父子以正則教而諍兄弟以正則友而敬夫婦以正則義而和朋友以正則切而規古之君子無往而不律已以正故上下觀感悉歸於正未有枉已而能正人者也夫茍堅持雅操有如此者得非博雅之士乎復雅聞而謝曰先生啟我以正言博我以雅道敢不服膺勿失以終身行之請記斯語於屋壁於是乎書徳基堂記徳基堂者何鳳岡精舍講學之堂也講學而以徳基名者何欲學者之實履也易曰履徳之基也徳行於禮有基勿壞又曰履不處也不處則有行之義焉夫學之貴乎行也尚矣修齊治平之道本於躬行心得顧可以口耳從事哉世之學者講非不明也知非不熟也而求其實踐是道百無一二是身與道為二也故曰知之匪艱行之惟艱為已而不為人則身與道一矣庸非斯堂建立之意哉或語予曰鳳岡精舍昔也僻在荒隅士子罕至今稅局副使魏君徳基亷士也而能去淫祠改創於此又作堂殿後以為講習之所魏雖去職而士子不忘其功名堂徳基猶召茇也此蕭君同文有請於子也子知之乎葢以予觀之欲學者從事於踐履之實或人之見欲學者不忘乎改創之人仁者見之謂之仁知者見之謂之知可謂兩得之矣皆善意皆可書琪峰記吾里蕭以琪氏業醫小兒數世矣兼大方脈常曰小兒骨骼未成血氣未充風寒暑濕易以成疾尤不可不慎有以病請即奔走焉不計其人貧富問藥無弗與者既效報則受之不報亦聽之其老老幼幼之心誠可尚也嘗葺其西偏燕息之所篆其顔曰琪峰予問客曰其義何居曰以其宣華諸峰秀絶森列乎前者有若琪花之自獻者乎曰未也抑以家有玉季之弟庭有玉樹之兒而是老巍乎其間有若琪峰之温潤乎曰近矣而猶未也然則敢問義惡乎在曰爾雅記九府美物之所聚東方之美者有醫無閭之珣玕琪焉醫無閭山之名也珣玕琪玉之屬也非以醫道無以相羣侶亦猶珣玕琪之可寳者乎以琪謝曰博哉子之言也敢不蠠没朝夕以求無瑕客曰請記斯語以成其美於是乎書復古齋記郡城西盧務敏予暱友也為人謙而慤無市道毎過其門雖亟迫必坐其齋齋曰復古藻之以詩文者富矣觀其色頻若有望於予者予於務敏豈吝一言哉第惟居今世而求其復古吾憂其難之愈愈也姑即四民言之農於四民中愿也淳也抑觀之壟畝之間或覸其隣之耄倪暨有逺役即侵彼之疆辟此之界或有匽瀦填以廣其壤分水利則專而莫知其他實堅實好者成則私之秕而稗者歸主猶吝而弗足不力穡以長材間罪嵗而輟業農而若此冀其復於古也可乎又嘗觀於百工之肆焉知者創物巧者述之審曲面勢以飭五材而世守之謂之工宮室器物期於適用而經乆非直為觀美也今也髙曽規矩之不遵天時地氣材美工巧之不偹夙修而莫成春用而夏廢蠟梔之鞭眩人攫利而已工而若此可冀其復於古乎貿遷有無通四方之珍異謂之商旅熙熙壤壤為利來往上則富國下則富家故君子富好行其徳古則然矣陶朱通積貯之理子貢好廢舉之術白圭於人棄則我取自足力侔萬乗名顯天下今則隠税昧公間道潛行或至敗露悉喪其有可謂富國富家者乎堅壯真好者不收紕薄偽惡者販粥通儈為姦賤貴貴賤曰度量衡不得其同以之交易猶禦人人也可謂好行其徳者乎商而若是冀其復於古也難矣至若士也所謂秀民冠乎農工商而弗與等夷也宜其知古道者也而逝不古處皇多有之不盡其分不公於言厚已雖慝者穉者附之情異雖尊者良者疵之得勢則趨不究其人處約則棄不思其德操世法以逢迎謂守經為迂繆漸次涅染習以成風士而若此可謂長太息者矣愈趨愈下况望其復古也乎此予於復古有深慨而難於言也務敏曰誠哉是言也豈有憾於世道之不古故以復古顔是齋祈斯世之不逺復也雖然四民之欲變化其子弟書籍也華采其庭户圖畫也皆於我乎賴故四民之躋是齋者屨常滿請書於壁庶來者讀之傷今懷古則於世道不為無助予不得辭於是乎書螺山記吾郡近城之勝有二青原鬱其南螺山峙其北山以螺名謂山形有類於螺也雨霽其顛沙礫中牧童時拾小金螺眩爛可愛友人胡君九成學圃於其側而深有慕於是山焉於是字其游息之所曰螺山予謂螺山稱於人以其秀也秀故為是邑之望環數十里外而趨郡者莫不望是以為歸焉不然生草木而居禽獸豈異於他山也哉九成之胡實闕之裔則為望族其為人也語言辨矣智識深矣儀表偉矣使其浸濡乎禮法之場翺翔乎詩書之府又豈不為鄉邑所望耶至是九成與螺山不可以差殊觀矣雖然人萬物之靈也山塊然之物也不知者謂人借山以為重知之者謂山借重於人也自近者言女江之東山富川之文山雖非培塿丘垤所可同然亦烏有泰華之神秀廬阜之雄傑哉一借重於楊伯子文履善而名聞天下後世九成茍卓犖自異於流俗庸非螺山至幸哉予比過其舍見其醲於親賢取友教子淑身為記螺山之稱於人如此虞邵庵有云子能觀山以成徳其進未可量也九成其亦有味於斯言也乎美岡記英逺中州劉氏之彦也往年予歸自贑易舟神岡英逺與其弟適來相與同載晤言信信而去予固以奇之矣近年來膺門治家有興無替開門延賢志尚愈軼於流俗母家有人其使予喜也嘗志其燕居之室曰美岡志岡之名蘄如岡也而謁記於余余以為岡之所以美者以其草木敷榮也草木敷榮以得其養也梧桐植影於朝陽菶萋必致夫鳴鳳茍斧斤尋之牛羊牧之可以為美乎心性之得其養亦猶是也英逺時涉是岡縱觀南之有臺北之有萊菁菁郁郁有養如是豈不足為進修之助乎昔魏武侯以山河之美固也徳性之美不尤愈於山河之美乎英逺不必視美岡為美岡而視吾身為美岡則美不在彼而在此矣人傑地靈其理一也雖然吾家仲宣之賦登樓以信美而非吾土致不滿焉今英逺以美岡作簾額則専而有之矣豈仲宣之所敢望哉仲宣且不敢望况其後之人哉何時與子振衣千仞之岡以極來遊來歌之興姑書此以為記讀易所記西昌南岡李君汝明食租衣稅之家也代遷物故寄跡於星史卜祝之間以娛其晚節去年邂逅於東昌握手語舊惘然以乆既而語予曰僕葺數椽於故居之側朴陋簡素僅庇風雨時洗心退藏其中以觀四聖人之易而字其顔曰讀易所願先生記之予復之曰以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此數語讀易之律令也且如乾卦初九潛龍勿用九二見龍在田利見大人辭也初九為乾之姤九二為乾之同人變也潛龍見龍象也勿用利見大人占也然辭之所㑹者淺象之所得者深故聖人假象以盡其辭君子居則觀其象而玩其辭動則觀其變而玩其占必體認辭象變占然後觀其身所處之位其時所遇之事而決其當否吉凶焉此聖人作易教人之本意也而世儒說易往往得其一而遺其二王弼以老莊說易而淪於荒唐漢上以象數說易而失於滯泥誠齋以三百八十四事明三百八十四爻則隣於淺狹皆非知易者也伊川義理精到亦止於辭而無旁通曲暢之妙惟晦菴本義包括甚廣然但引其端而不盡其義是在學者精體而活看耳大概看卦之法有六卦象也卦變也卦徳也卦義也卦位也卦時也看爻之法有四應也比也承也乗也讀者隨時變易以從道則吉凶消長進退存亡之理庶乎其可得矣汝明謝曰先生博我以文𢎞我以道請書於屋壁以備觀省焉於是乎書麟原後集巻六

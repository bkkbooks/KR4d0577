body:
  text: 麟原前集巻二元王禮撰誌邵廵檢墓誌銘君諱南字道行其先本姬姓系出召公世為燕人後遷河南在宋堯夫為河南族厥後復徙河北天常至本朝有曰進者僉侍衛後奕軍籍于君為曾大父又家廣平威州古宗城也居郡城西北隅大父諱信娶李氏二男子長公良字政卿次忠良字幹臣又居北門外治先塋于城西驛道之北凡五冢後復遷于城東北上世俱隠徳不仕忠良始受部符任錢榖官配栗繼劉宋李王凡五氏男子四君其長也次庸道中次成道脩次通道亨君由國子監生舉呈翰林院既試捧中書檄充淮安路安東州學正考滿勑授贑州路雩都縣印山廵檢歴兩考代未至卒于官寔至正壬辰十月初五日也生于元貞乙未享年五十有八娶張氏子三人思孝思齊思逺女二人劉嗣古趙秉彛其壻也孫男三人江漢汝君之没也江淮驛騷不得歸祔于先塋權厝贑城之外思齊聞予避地雩陽具状稽顙涕泣而請銘予哀其孝思不敢固辭受状而讀之君平生事父母孝母氏蚤棄世事繼母四人愈謹無間友愛異母弟加厚𦵏族之不能𦵏者十餘䘮仍撫其遺孤性篤厚樂易友誼尤深皆可書遂銘銘曰公奭于周系姬自邵其采邑後為氏由燕跨河幾歴世文獻寥寥屬焉志大賢之後羽林士豐嗇相承君始仕才多齡寡嗟莫致埀慶後昆尚昌熾郭㑹可墓誌銘嗚呼醫能以仁存心若郭君㑹可者真百一千一者耶何可得也前二十年余里永陽有傭于贑之安逺者至雩都病革舟人出之水澨一息未絶如縷君過而憐之舁歸家冐衆口非詆不頋躬眂藥劑飲食之宜既愈給道里費遣還其鄉傭人感更生之賜稱雩郭大醫不離口聞者傳誦謂世誠少斯人也又遲之十五年余舉進士筮仕安逺道雩聞郭明善精于醫同郡太和人也始定交焉其後余僑寓扵雩則與明善日宻矣一日明善求余銘其尊人㑹可之墓昉知傭人所徳雩之郭大醫者實㑹可也使世有仁醫如此余猶将求其名氏而傳之矧有子親厚于余其敢愛一言耶按状君諱元亨字㑹可世家太和鍾歩曾大父諱某大父諱徳慶父諱祥叔俱業醫俱善士㑹可始逰雩其道日行遇故舊傾倒盡歡坐客常滿所識窮乏者間移貸營什一類不能償君亦不較人以疾請不問貧富逺近即馳視之日四五往不懈未嘗責報而或賙之者以為常非獨水澨人也後家日肥迎養其二親親殁歸𦵏故里襄事有豐無儉姻族稱之曰難曉暢地理愛雩之百丈塘有古䜟記語其子曰異日必歸我扵此死之嵗盡會親友與訣居無何得疾蚤作衣冠而坐歴歴區處家事畢曰吾逝矣竟不起至正甲申九月十六日也享年六十有三娶袁氏有婦行後君十六年卒男二人明孫徳孫徳孫明善也女三人壻鄒彭蕭孫男三某某某初以隂陽之忌權厝于里之近今卜某年月日改𦵏遵治命焉銘曰雩山之峯雲油然兮下埀百丈之塘水鱗焉兮淪漪厥蔵既安詔後允宜千嵗之外知其為仁醫之墓尚封崇之照磨王公墓誌銘公諱思道字國賔姓王氏宋紹興間盧溪先生庭珪修譜具載金地長者十一孫大光冢子六承事徙東向以是徴之公東向之系距長者十有九世矣曾大父仲繇修眉豐頬埀手踰膝治生勤儉而家日肥年近百嵗大父必先克承志業慕靖節恬退之風性喜植菊丞相杭山章公鑑字其亭曰晚菊父宗元嘗試藝不偶遭世易思自樹于鄉閭浮榮不復動其心妣某氏公自少誠篤有容語不妄出性至孝弱冠以推擇為吏念一弟逺宦于外祖父髙年不可勞于户役即􅅲而家居日以奉親幹蠱教子為事兄弟聚處無論親逺貧富一不以户役累之而驅馳因控身任其責賔親至者必傾竭盡歡座上常滿不厭儒有懦不自立者奸人従他邑移文媒走卒及群無賴為欺侮公力捍之甚者根拔其風遂熄人蒙其恵到今元初法制未一黠吏復乗之以奸民困徭役公乃義以濟之首捐田五十畆倡以次出有差共得田二百五十畆嵗收粟五百石以供科役未歛時用有不給輙先貸之而後取償不以嵗月規息利公賦首辦而吏弊無所施綱維其間者三十年野無呌囂之卒里多足給之家于是隣境聞義徙宅来依者六七今皆長子老孫矣鄉隣有不平者小而壤地婚姻大而鬭争死事無不詣公求直則悉理以開諭公以處裁無不心服以退無復蹐邑門者凡㳺食無良之徒喜使酒尚鬭然聞公謦欬即逺引避不敢過其前已巳至壬申連嵗旱饑公竭誠禱于延福河江之神每瓢水以歸雲雨随至民賴以全活者衆三江橋興廢不時来往病渉公見富人有欲脩釋典報親者輙諷其莫若捐田贍橋其福田殆甚于彼聞者信従積助田得百四十以共修葺經費謂其本于報親也名之曰白雲橋所居鄰小溪人稱為溪濵居士天歴間有薦其才授東平兩軍照磨適丁父憂制滿越明年卒生宋徳祐乙亥殁扵至順甲戌九月廿三日享年六十配劉安成著姓也弟國輔㳺状元所寄黎公之門從鄉先生羅静山受業學優而仕聲譽蔚然皆公力也子男一人貞以易試連不得志扵有司遂就校官選終平江學正女三人壻劉齊方李所先郭立心孫男五人震允益志同益歴潯州静江敎授補分省掾同羅鬼宣撫司奏差女一人𦵏公扵里之小女坑戍山辰向公卒之後二十年奉訓大夫順元宣慰司副使范公匯嘗狀其行謂公處宗族兄弟極其雍睦而宗族兄弟懐其厚處鄉里姻朋盡友助之道而鄉里姻朋莫不服其義御下以誠而小人輸其情接士以禮而君子尚其徳處事則公正諧世則謙損其孫允力學好修深懼先美不章将冺冺無以示後遂以状来請銘余惟公行義孚于一鄉者隠然與王彦方同科銘其可辭乎銘曰惟古於民嵗用三日世逺風譌盡瘁徭役有能義田卑髙計力吏弊自除公賦自給鋤强植弱護里如璧有拂扵膺望廬求直誠以折之鬭忿氷釋弭災利渉恵澤非一嗟嗟彼蒼胡不憗遺胡不百年俾鄉爾師我銘幽光孰其齊而所謂伊人古之人斯㳺杏隠墓誌銘君諱從善字性初永新人也永新番陽叚為士族有由科第起家至銀青金紫者其近有㳺氏世醫小兒人稱為㳺小兒家君之祖本叚氏贅而後于㳺曾大父某大父明叔父聖傳世守醫業君幼明敏兼精大方脉知義理喜吟詩胸次出乎等夷有以疾苦告輙惻然動中風雪暮夜不避不以貧富異其心于窶者尤加意焉予之藥屢視問不倦既愈􅅲然無徳色常活艱危扵他技窮蹙之後故疾篤者率曰得㳺公一視雖死無憾盖用藥權宜不拘拘泥古如嬰兒患噤口痢食輙吐忽鬻飴者過門兒索􅄳父母有難色君曰􅄳本榖蘖所成食無害且恣其滿餐詰旦視之飯無噤矣其于理𠖇㑹多類此君不幸蚤失恃啣哀没齒事父愈竭其情世父髙年食貧君事之如其父存順没寧悉躬任之鄉里尤以是多君平生喜地理家術居屢遷最後得里之大湖山有林泉之勝遂營築以老焉左圖右書古帖名畫輕裾長袖與賔交清談其中或焚香瀹茗或酒酣豪歌亦不自知其樂也一時名勝莫不有湖山歸隠之詠亂定思再構于湖上未遂而寝疾以丁未五月二十三日卒扵湖山之隣寓得年七十有三配吴氏先君二十二年卒子男一人紹曾克世其美女五人適吴適尹適龍皆望族餘幼孫男一欲其繼家學命之曰師岐卒之嵗臘月窆于秋陂河西嶺遵治命也後之八年其嗣子以里之老生胡性仁状君行来請銘余嘗恨未識君尚忍固辭抑余聞㳺之先居烟市通衢往来窮乏者随力賙遺一日有道者来過授以截瘧治瘍二方用之神效居三嵗而去臨别謝曰吾為若累多矣然明年若将有大難吾遺若信香遇難焚之吾将復来明年果嵗大饑殍者求食食之斃里兇猾誣以殺越人于貨公入其詞将驗屍倉皇焚所遺香道者復至閉一净室而坐已而死者更生行歩如飛其禍遂寝開户求道者亦莫之見嗚呼傳記載與仙遇者盖有之矣然類多長者積善之家豈好善優于天下者仙亦願之耶将列天上官府者亦皆古忠義之士耶觀君當䘮亂流離而家獨完人肝腦塗地而獨考終命庸非天之報施善人而仙遇之餘福耶鄉人稱之曰杏隠當矣宜為銘銘曰積善之家誕與仙遇遇仙之人厥後允裕如杏隠君活人孔庶既濬其源亦演而注大湖有榜秋陂有阡子子孫孫慶埀以延羅浮翁墓誌銘嗚呼浮翁先生不可作矣復欲求典刑如浮翁淳篤如浮翁敎不倦如浮翁胡可得也初延祐甲寅科興一時海内之士争自濯磨以効用郡以先生通春秋大義起應詔戰藝失利歸而學易丁已在選中時吴文正公典舉讀其經義歎曰深扵易者于禹鼎賦則云學邃而詞騷氣逸而義正馳騁乎屈宋班揚間賦中髙手也至時務䇿則云學有體用治有本末識時務之俊傑也悉批于巻自是聲譽藹鬱静山翁晚節末路賴以怡恱明年㑹試于京師志未遂當道援例以下第舉人保充江西憲掾先生不就惟思授業以淑後進為養親計而已其誨門弟子也必孝弟謹信志學慎獨也必格物修身親賢信友也必正誼後利崇徳修慝也問辨講切豈徒詞􅍨之末哉故今年之塾舘甫定而嗣嵗之聘幣又交至矣至正辛夘淮甸弄兵郡守丁中憲梁亞中猶聘先生職敎郡庠以正人心越明年警報日切自書臺移家泮之詩人堂後二年甲午患虚弱之症以卒二月四日也享年六十有九卒之後二十一年代遷世逺其子尚觀始克状先生懿行授禮俾志其墓而銘之竊惟弱冠嘗拜先生知其平生一二既又與尚觀同舉扵鄉好猶兄弟誼不得辭按状先生諱振文字𢎞毅姓羅氏晚字羅浮人稱為浮翁世為安成儒族曾祖某祖某父士琥字西玉號静山俱有隠徳先生性孝父母有疾必置小床侍親側以覘寒燠饑飫而順適之卧不觧帶母彭夫人嗜果與餅嵗得脩奉嘗易以奉之迨二親之殁也姻交㑹𦵏者率數百人娶李氏有婦徳朋田著姓也先其君子廿三年卒後合𦵏扵章塘靣辰背戌子男三人長尚觀贑州龍南敎諭次民觀縣庠訓導次正觀女二人俱蚤世孫男七人繼修繼魁皆襲儒業餘幼所著有大易擬議十巻四書集大成四十巻詩文雜著五巻嗚呼大化之推遷雖參差不可究然近世以来勢力之翕赫者往往随時變滅而詩書之澤綿綿延延将替而復振豈天扵善類終閉惜而睠頋之耶觀之羅氏可騐已抑禮嘗聞静山翁年髙徳邵雖怨家子弟亦深教之有寄以銀酒爵乆而㤀取嵗晚歸之寄者反驚愕歎服其誠一日憩漢江橋有遺雨盖紵絲囊盛楮幣六十千者輙命小僮荷而俟遺者至而徳之其忠厚類此子孫之食其報豈可涯哉銘曰積之豐發之約尚裕其後人星其斗山其嶽孫母髙昌氏墓誌銘孺人輝和爾氏諱額森徳濟系出髙昌敦武校尉雩都縣達嚕噶齊阿勒呼木之女亞中大夫臨江路達嚕噶齊哈斯資善大夫海北道監司道拉齊之媦也初世祖皇帝之下江南也其先與有勞焉簮纓之盛甲于他族雩都君以孺人禀性仁厚擇南士孫庭蘭妻之庭蘭之先以科第起家為縣令雩都稱閥閱者首之適孫三年庭蘭没年甫二十有五植遺腹矢靡他子既入學擇明師奉之盡禮撫同室孤遺如已出經紀家事井井不紊後之三十年屢抱孫矣邑之父老始上其事求旌異以善俗轉聞扵朝屬亂未報而孺人以病終實己亥之嵗二月二十八日也死之日族姻隣巷僕妾無不慟哭失聲得年五十有九男一人本立婦劉氏孫男二人兆元兆麟女二人越三日權厝于城東經堂之北弗靖故也卜某年某月某日改𦵏扵某本立具状稽顙再拜以銘為請余惟女之歸人猶臣之事君従一之義弗可渝也古則然矣今之禄食者果且有取扵此乎果且無取扵此乎銘曰維髙昌有後倬彼姱節維君子有儀式延其澤于嗟二三士也慙徳曷不觀此千載星月陵谷有遷斯文不滅蕭母王氏墓誌銘從甥蕭權以洪武八年某月某日𦵏其母夫人于鄉之闕原涕泣来告曰先母年三十三先父棄世業薄系單人懼其無以自濟先夫人節衣縮食勤儉自持處親族無一間言賔友至者有能誨權以禮談訂經史輙設共具欵留之遇隣媪窮乏寧忍饑推食以食孤燈織絍卒夜分乃寐養舅姑以至扵𦵏祭無不用情盡禮雖冦盗衝斥未嘗廢事移志至正甲辰辟地流江得疾以没權厝于其里日邁月征倐焉一紀始獲妥靈之域于里之近龜䇿習吉念權雖未有樹立以顯揚其親然粗不失士檢鄉人以為子弟矜式皆母力也今幽堂将開而先美無傳人子之罪重矣銘墓之文非舅氏誰託禮嘗欲著夫人行義以傳後埀訓屬遷革靡寧弗果矧兹有請可黙焉不紀其實耶夫人姓王氏曾祖某祖某父桂芳妣蕭氏年未筓歸扵曲山蕭如春俱世族男一人即權女一人蚤夭享年五十有三銘曰老不可偕嬛焉孀居惟勤惟儉載究載圖上有以終其親下有以植其孤俯仰奚怍九原有以報其夫可不謂賢者乎嗚呼李母劉氏墓誌銘唐西平忠武王之十七世孫寧孫既𦵏其母夫人劉氏之後每見余輙戚然道其母平生悲不自勝若無以報㒺極者今年夏五余至其舍竹林夜語跋渉世故汎及其私又蹙然欷歔以歎曰寧孫母劉歸先君子為繼室時大母劉夫人在堂寧孫上有二兄前母朱氏所出母氏事姑盡孝撫諸子諸孫盡恩自闑以内葛裘鹽米醴醪臡醢孰凍孰燔孰社孰臈孰鑿而老孰糲而農孰時以薦孰胙以烝先子未嘗寓目焉饑斯食寒斯衣賔祭斯豆觴共具而已迨寧孫生甫四嵗二兄受室而先子棄諸孤母氏悉以家業付二兄主之常曰寧孫方在幼後来成立與否惡乎前知惟天惟祖宗所以篤祐李氏何如耳吾奚纎芥厚薄之私乎拊育均一族姻稱賢母者母氏弗外焉至今保姆能談往事歴歴然墓草四易矣未有石以紀先美将子是托其毋我辭繼讀前鄉貢士孔君濟所述李氏世節堂事蹟稱夫人年三十而偕老分乖理家有法子孫日就冠婚中更世變黽勉力持至嵗丙午夫人夀六十有六矣臘月五日實逢初度闔門四伯餘指尊卑以次捧觴上夀環拜盛禮群従之長者有進而言曰是日鄉問載清衣冠咸集繩繩蟄蟄堂陛若不能容此髙年盛福天所以報夫人四十年貞苦之節也夫人歛容曰我何能幾是皆太夫人遺澤所及太夫人盛年孀居撫子姪以成立扶持門户五十年而子孫蒙其成以有今日若夫從一之義家範是遵直饑食渇飲然常行之事耳奚足異哉嗟乎若夫人者可謂加于人一等矣銘其可辭夫人漢安成侯之裔世居安福上城曾祖某祖某父某母某氏歸廬陵醪溪李氏則生于闕辛丑之十二月卒于洪武已酉之五月享年六十有九越二秋始克𦵏四年十一月十二日也鄉曰永福原曰白鹿子男三人夀孫元孫寧孫女五人壻髙方升陳西金劉子節彭立賢湯子敏孫男八人曾孫男二人銘曰吁嗟嗣母先後一軌孰無町畦視同一體伯竒休徴百世能幾逆生扵私家政用圮于嗟淑人氏劉嬪李既失所天所従者子何厚何薄哲婦有泚慈孝且貞萃此三美裕後報之彼蒼諶只無媿斯文于以代史夏仲賢墓誌銘夏氏之孤有曰璉者因其塾賔王洵衰絰来見以儒士胡驂所述行状一通稽顙再拜請曰先人不幸今年六月十二日客死青陽璉奉柩来歸窆扵里之石屋則九月廿二日也痛惟先人辛勤以植家正直以禔身而渉亂日深没没無顯于世今雖慎其終矣未得聞士文墓何以綏九京之心而逭不子之罪也敢丐志銘于先生余弔而謝之取其状而讀之君諱日富字仲賢廬陵長樂里人也曾大父以巽大父廷介考志和妣湯氏昆弟三人君倫次居季伯仲二兄蚤世君與叔氏撫其幼孤皆嶷然成立待同居子壻恵愛均平治家勤入儉出未嘗少懈體榦脩聳而退讓若不勝衣然性蹇直為恭不能偽言有弗循理者輙辨折不辟雖所敬畏亦必㣲諷之使免有瑕謫樂江湖善交友北方士大夫喜人質直故亦多君君尤重然諾常訓其子曰吾與其易諾而有負也曷若慎許而言出不食之無咎也璉之侍随扵外聞名公碩儒必使踵門求益人亦稱其善敎子也洪武七年以次子瑜乆在青陽動念往求之既至居三月病未十日而卒青陽簿聶希喆遣子相璉以歸其䘮其得于人人類如此享年五十有七娶韋氏善綜理其家日為興門男二人長為璉次則瑜也女二人壻王志在貳室次胡某孫男某某嗟夫人之生世若仲賢者無困拂于前有華耀于後視世之貴富尠終者不為優乎况王胡二君俱信士言不浮且謂仲賢有子執䘮盡禮非庸衆人所及是足見其家敎矣宜得銘銘曰嗟仲賢何拮拮惟儉勤秉為則慕陶朱濟豐缺守其謙直不訐慈恤孤公應物勝千諾重一黙時之人翕附熱艶浮榮耽冕紱宛兮離蔓纏骨泚行人首丘隔誰如君返鄉國蔵佳原石屋穴面坤流練縈折裕後昆延世澤我銘幽名永掲麟原前集巻二

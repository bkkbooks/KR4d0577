body:
  text: 麟原文集别集類四元提要臣等謹案麟原文集二十四巻元王禮撰禮字子尚後更字子讓廬陵人元末為廣東元帥府照磨明興不仕聘為考官亦不就江西通志載吉安人物有王子讓而無王禮葢誤以子讓為名也禮工於文章著述甚富嘗選輯同時人詩為天地間集案謝翺嘗録宋遺民詩為天地間集此襲其名葢隂以自寓其名見於郭鈺静思集中今已久佚維是編尚存分前後兩集各十二巻前有李祁劉定之二序定之序謂其託耕鑿以栖迹於運去物改之餘依麵糵以逃名於頭童齒􅀈之際其文竒氣硉矹胸臆以未祼將周京故也有與子讓同出元科目佐幕府其氣亦有掣碧海弋蒼旻之竒及攀附龍鳯自擬留文成然有所坐噫喑鬱抑捫舌騂顔曩昔豪氣澌泯無餘矣意葢借禮以詆劉基然所評與禮文不甚似祁序稱其藹然仁義之詞凜然忠憤之氣深切懇至無不可人意者斯得之矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五麟原文集目録别集類四元前集巻一碑巻二誌巻三行狀巻四序巻五序巻六記巻七記巻八表巻九傳贊巻十題跋巻十一記巻十二哀辭後集巻一序巻二序巻三序巻四序巻五記巻六記卷七記巻八銘巻九銘巻十行狀祭文書啓巻十一説巻十二雜著詞題疏麟原前集原序永新溪東北入廬陵界敖城諺謂楚相孫叔敖嘗築城然楚都郢去兹甚逺敖既相楚惡得来哉盖臆說爾敖通作嶅山聱牙蟠紏環廽若城故謂敖城居敖城王姓最舊號宣溪王溪至是名宣因溪以號其族也王之老成人見稱扵國初者子讓子讓當元時舉扵鄉為經魁從藩省辟佐主帥全普菴戡定江湖間志弗遂歸隠號麟原然人不以前藩省辟官今麟原自號稱惟曰子讓亦猶宋尹師魯非不有官號人惟曰師魯以其炳著人耳目不在官號也子讓既隠本朝治化聿興有来迎典場屋文衡主鄊飲賓席者輙避匿不就其所與友有雲陽李提學希蘧洲原胡尚書山立皆以弗仕為心昔元盛際専假科舉抑南士南士多伏蔵用詩文自寫至是與子讓希蘧山立輩往還丘壑巖谷有為詩題子讓所居者予㤀首聨其下云當户雨苔雙石峻隔江煙樹數峯閒杖藜麥壟秋霜後樽酒茅堂夕照間聞有古書人不見柴門客去又常闗觀是子讓甘寂淡樂幽僻託耕鑿以栖迹扵運去物改之餘依麯糵以逃名扵頭童齒豁之際無求扵今有期扵古可見也子讓没有年其族顯者今大理寺卿同節謂子讓諸孫被薦入京者謙為族姪以謙謁予持子讓集来不盡出予亦以病不及盡觀其所出信手閱數篇至為吾邑作綱目書法老儒水窓劉友益後𦙍記復先廬慨仰舂陵伯升文叔昆季復炎鼎引杜牧神堯能以一旅傾孤隋後世子孫不能以四海全盛力復河北深惜永嘆之嗟乎子讓其竒氣硉矹胸臆猶若佐全普菴時以未祼将周京故也有與子讓同出科目佐舒穆嚕主帥定吴越幕府唱和其氣亦有掣碧海弋蒼旻之竒後攀附龍鳳自擬畱文成然有作嘻喑鬱伊捫舌騂顔曩昔氣澌冺無餘矣王半山云髙位紛紛誰得志窮途往往始能文上句斯人之謂下句子讓之謂論士者奚必以遇合與否較量抑揚哉同節願予序斯集予謂同節文集有建大将旗鼓獨出井陘口若淮隂侯者有合諸國從親共入函谷闗若信陵君者多寡惟所當今同節法理餘暇手不釋巻子世賞成童踰年宴瓊林績文翰苑俟他日合子讓同節世賞所作為宣溪三王集豈不善予序焉亦以期焉賜進士及第通議大夫禮部左侍郎兼翰林院學士經筵官國史副總裁知制誥永新劉定之序余與王君子讓為斯文友二十餘年矣始余友子讓時子讓方銳意科目眉目清聳舉舉異常人余謂其必為後来之秀其後果亞江西鄉榜余又謂此未足以溷子讓子讓名譽當不啻此已而世故紛紜為性命奔走不暇音問不相及近一二年乃得再㑹扵禾水之上須髮容貌纍纍然其中退然其辭氣卑卑然余疑其顛沛轉徙随俗異化以故若此及觀其所為文數十篇皆藹然仁義之辭而凛然忠憤之氣深切懇至無不可人意者然後知子讓之學與日俱進子讓之氣與年俱老而非變故反覆之所能沮䘮者也余又觀其易字子讓一篇所見益髙所處益下有歛春華而就秋實之義扵是又知子讓之學日近乎裏子讓之心日進乎道而非辭說工巧者之所能尚也嗚呼䘮亂既乆平生友朋存者百無二三縦有存者亦不能以自力而子讓獨能肆志扵學不廢而益勤故其見扵文章者如此余衰憊已甚無復有意斯世而獨扵子讓之文有發焉故為書之嵗在乙已夏四月雲陽李祁序

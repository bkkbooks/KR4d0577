body:
  text: 麟原後集巻二元王禮撰序遊青原詩序青原廬陵山水幽絶處也春秋景霽山礬岩桂其馨滿林士女覽物暢情徃徃遊焉予猶及承平時家殷人足青原之途騎􅀈聫人肩摩攜壺荷􅀢而來之者如雨必盡興乃返其間雖裕儉不同要亦與禽魚之樂於澗谷者同一自適之機耳惟騷人雅土則不然逸豫酣樂之餘必使山泉之勝烟雲之態人物之趣流寫於翰墨傳誦於人間若有聲之畫雖未至者見之如親臨其處焉予嘗有斯志毎難其侣而力日有未暇也友人王伯允乃能與其徒夏彦琛伯仲及夏之親故崇酒豐饌以極青原之樂又形之咏歌鏘如鳴球可為出乎流俗矣好事者且寫為圖而求予序之予故有感於舊日之盛而嘉其同予之志云夏陽湯氏族譜序族譜者譜其族屬崇卑疏戚使子孫篤尊尊親親之誼而或以之述門望顯畜聚表交遊者也夏陽湯氏本殷仲堪之裔謂荆州之後嘗為安成刺史子孫因家焉今安成羨江尚有殷使君讀書臺足徴宋避廟諱易姓湯可考者自三評事始初居永新前市後徙夏陽其派凡三下墟市江田心也當在宋也有貢於鄊者有典郡庠著讀史㫖要者有與周文忠諸賢友善者是皆不足為湯氏重也予獨喜童年尚識諸老類皆淳朴深厚温恭直諒有長者風宜其詩禮之澤綿綿至今未冺也其族之譜系九世孫思可嘗鋟梓矣今十二世孫敏幸存刻本視予俾序之嗟乎楊惲之於司馬氏叔子之於蔡中郎固自有不容辭者因念六世祖貢士之配在湯為唐臣父之子江文忠公銘其墓曰家之道奚先閨門之間有妻道焉有母道焉近而王母又為祥叔父之子申齋劉先生志其碑曰夫人以真白起家中廢子孫不失舊物可不謂賢乎觀女徳兩世之在寒門湯之家教可知矣嗟乎予之期望於外氏子孫者豈其㣲哉有之似之無念爾祖離孫王某敬書耕讀民序前年予以鄊飲至禾川邑士吳魁吾在焉與之語娓娓忘倦後有稱揚其名謂足為時用魁吾聞之曰僕何人何足以與於斯遂逃之湖湘從遊者益集既而充然若有所得而歸以書抵其友劉宗啓曰僕營數畆橋亭之野將為耕讀之民矣子知我深為請於王生老人一言少序此志予聞而喜因謂其友曰今適南畆或耘或耔攸介攸止烝我髦士甫田之詩也古者士出於農而工商不與管子曰農之子恒為農朴野而不匿其秀民之能為士者必足賴也又稱倉廩實而知禮節有味哉其言也孟子亦云救死不贍奚暇治禮義飽食煖衣逸居而無教則近於禽獸誠知耕讀不可偏廢也子獨不見商之阿衡乎耕於有莘樂堯舜之道亦一耕讀之民耳及其五就之餘自任以天下之重斯民也三代之民也顧可易視哉日用飲食徧為爾徳意魁吾之在隴畆陶然而歌曰朝耕兮暮讀其樂也足足暮讀兮朝耕其樂也弗敢以喻人我酒既㫖我肴既馨衎我賓親亦洽比隣何思何慮其葛天氏之遺民雖然此固其志也然束帛之賁恐終有不容避者矣至若予也既魯且耄自度無益於世戒子若孫力充耘耔誦詩讀書為民之良慢訑之叟時翺翔乎義山之麓禾水之澨嘗冀缺田間之榼閱寗戚牛角之經姑與此民擊壤以相娛可乎不可乎遂書以訂其始郡庠鄊飲酒詩序禮義者人性之所具燕飲者人情之所通通其情而禮義行乎中聖人之設教者然也聖人以民勞於耕穫力於賦役則於尊卑長幼貴賤之節曠矣於是因其閒暇制為飲酒之禮以正齒位此尊讓親睦之俗所以成而陵犯狂暴之風所以息也往讀禮經說者以為飲凡四事三年賓賢能一也鄊大夫飲國中賢者二也州長習射而飲三也黨正蜡祭而飲四也縂謂之鄊飲酒也行之以禮教敬也濟之以樂教和也拜至拜洗拜既者敬之至也請安請坐爵樂無算者和之至也飲食必祭不忘其本隆殺有等不踰所尊序賓以賢斯貴徳也序坐以齒斯貴長也序僎以爵斯貴貴也工歌必獻不忘功也沃洗及冥不遺賤也聞關睢葛覃巻耳而齊家之道形焉聞鹿鳴四牡皇皇者華而事君之忠著焉有令有辭有勸有戒一飲一食一拜一坐皆制之以道而㣲意存焉此仲尼觀之而知王道之易易也此成周之世所以人人有士君子之行也燕飲行而禮義興其於化民成俗豈小補哉洪惟天朝肩振古未有之福威行近古未行之禮樂於鄊飲大典尤惓惓焉於是廬陵郡守徐侯彦中恪遵詔㫖八年季春舉行是禮吉士藹藹賓筵秩秩簡則不苛於煩和則不偏於嚴四方扶老攜幼來觀者數千人盛哉所未有也自今繼繼而行之得於觀感者有不為堯舜之民哉有不為三代孝弟忠信之士哉一時與燕者喜侯之温恭執禮咸為詩賦以詠其事禮非處士之賢而忝賓介故序所聞議禮之槩於其首簡云永新鄊飲詩序鄉飲古禮也三代行之致隆平自秦而降禮廢乆矣漢晉間興遄輟僅為美談奚補於治聖朝治定功成慨然思復古風詔天下郡縣薄海内外下之都鄙悉行鄉飲酒禮庶幾觀感作興民化俗淳徳至渥也特係在職者奉行之耳既而有司或欽崇大典或茍為文具則賢否之異也吉之永新賦煩民伉寛則玩急則怨前政相繼去職未遑斯禮洪武八年冬四明烏侯繼善實為邑長視篆未數月政化大通乃於學宫創行鄉飲教弟子員遵周譜習歌樂章是日也先舍菜於先聖先師乃始迎賓俎豆静嘉威儀棣棣揖讓酬酢隆殺之辨尊卑長幼貴賤之節秩然有章深山邃谷掖老攜幼來觀者千餘人莫不喜且嘆曰幸哉復覩三代之制盖侯仁厚㢘敏動以身教所謂有關雎麟趾之意而後可行周官之法度所謂至誠未有不動者也繼今以往敬讓之俗有不成鬭暴之習有不息者乎一邑之效有不為南邦之式者乎於時逺邇之士咸為詩歌以詠之屬禮為之序顧惟衰邁無足齒録辱侯詒書致之賓席日承温容聆崇論覽雄文令人有見晚之嘆則述兹盛美又惡得以荒陋辭長留天地間集序三代明王之御天下也化先於政知詩之為教本乎人心契乎天理雖賞所未易誘罰所未易禁者而詩能動化之於是設采詩之官以觀風貢之朝廷而達之天下使人咏嘆之間隂有所創艾感發其功顧不逺且大耶周道衰采詩曠厥官而詩教廢由是專任賞罰以為政而治不古若矣治不古若則詩日不如古宜也後人讀杜詩而不究其意乃目為小技豈知詩哉余嘗謂離騷漢魏以來作者非一人其傳而可誦者必其善言情性可興可戒而不偭乎六義之榘矱者也三百篇之有六義猶至圓不能加規至方不能踰矩涵泳之乆自然氣韻音節從容中道而入人者深復何卑卑為論者之所能律哉雖然文章與時升降國朝混一區宇曠古所無以淳龎朴厚之風氣藴為沖淡豐蔚之辭章發情止禮有體有音皆可師法殆將聳元徳以四代軼漢唐而過之惜采録無官文采不盡暴於當世收而輯之庸非為士者之職乎居常無事喜編羣賢美製喪亂迄今百不存十懼其復失思鋟梓廣傳庶來者知一代聲教文物典故之概誦而玩之將人心天理油然感動見善則興聞惡則戒不賞不罰而懲勸多人人有君子長者之行其於風俗禆益豈淺鮮哉使得長留於兩間世道之幸也因名之曰長留天地間集云送稅課湯君秩滿序廬陵稅課副使湯君得代同僚許君不色喜為之躊躇為之惘然為之倀倀耿耿謂禮曰僕與堯佐處此三年矣凡酬答營辦用舍之際宜厚宜涼宜弛宜張宜緩宜急一動一息一言一話此行彼同前舉後濟無枘鑿無猶豫無町畦得寡過於士君子之林非偶然也今先我代去殊難為懷子善文能道人意所欲言者為我序所以為别亦少慰我意繫遐思於無窮也禮既而遊於鄊校則搢紳不樂其去見於辭入於市井則貨殖者不樂其去形於色商旅相與談於津奔走執事之人相與談於巷頌其美而願其乆者衆也則復於許曰使禮為辭勸其留必輿情所喜若為辭餞其去非衆心之所怒乎余懼衆怒之難犯也既再閱月許復貽書曰願其留者人之情也不可止者國之章也堯佐行有日矣吾子斯文之厚可無以榮其往哉因念昔有問政於揚子雲子雲曰思斁湯君洽賦一方人思而不斁若此使得宰一邑典一郡以臨其民其恵澤可思者不相什伯於今乎自是其大用審矣余日望之是為序送吳知縣入覲序禮盛時對䇿嘗言守令爵位於民為最近其政治利害於民為最切必得其人任之而後可人得矣遽易屢遷亦非民之福也大抵初至之嵗不諳其土俗二年始察其情偽虚實方欲少展才志而瓜期近矣是以視居官如傳舍心常茍率尚望其膏澤下於民哉當時司文衡者是其言而居阿衡者不能用孰知去之三十年虞廷三考黜陟之法復行禁於昔而開於今豈偶然之故哉廬陵素稱地廣民稠今則荒蕪死亡過半矣而獄訟繁溢賦役煩重才而賢者乆任且未易使治况中才之士而欲三年報政哉舒城吳侯之為邑長於斯也今考績之年矣其廉介如始至而其智愈明其才愈優豈其才智有今昔之殊盖乆而後得之也故能以民心為己心視公事猶家事古所謂必世百年乆於其道而天下化成於吳侯觀之漸可信矣莫春之吉入覲述職意甚至也縂百揆者必曰廬陵困於兵亂乆矣勞於貢輸至矣斯令也撫摩其民以奉其上烏可使有美政者不竟其功乎銓羣吏者必曰邑令民之師帥上宜於國下宜於民斯無愧負矣是令也事上也忠使民也義烏可奪之使不終恵於邑乎吾民則曰我有疾苦呼我父母今朝於京式遄歸處又曰侯我父母念我孔艱往朝於京不日其還嗟乎某之衰齒六十有六矣閱吾邑之賢令不為不多矣求如吳侯者幾何人哉於是郡邑能文之士為詩歌以餞侯之行而謁某序其首竊惟古人於賢卿大夫之行事雖數十世之下猶稱誦之載於簡䇿矧親沐其治化而黙無紀述豈人情也哉遂作送吳侯入覲序瀛洲圖詩序三年秋某忝校藝閩省同郡蕭自省劉允泰盱江吳尚志㑹稽宋無逸四明桂同徳上饒余從善延平孫永齡諸名士咸與焉章貢劉宗海氏以掾職試事日接顔辭驩如也既竣事宗海持瀛洲圖言於衆曰古稱海上有山曰瀛洲清逺絶塵俗余甚慕焉將以名吾齋能無愛於一言乎咸曰諾各賦詩一章退某為之序因念前十五六年筮仕安逺猥以筆墨留分省日與宗海游於時宗海二親在堂伯仲怡怡良辰暇日輒尋文翰之侶游馬祖巖汎舟埧上觴咏以為樂當其身世兩忘景與神㑹悠然自適於時日之頃者雖不可常然瀛洲方外之樂亦無以過之既而别去事異時殊濶絶如隔世矣孰知此年復得再㑹於三山而宗海為大藩從事惟七閩無他郡兵燹之虐城邑之完人物之富無異平日宗海進而立乎賢相名卿几席之側以討論政治退則羣乎掾曹之彦詞林之秀則有鏃礪括羽之道冠佩容色舒舒愉愉盖身囿乎瀛洲而不自知也雖然仙非有超世之見者不能為宗海於事物之來其納而容之也使若水之於海莫知其所往其可拒也則若潮汐逆捍於千里之外弗與同其波而定見之確乎不可拔者猶是洲屹乎風濤浩渺之中而莫之能動若然宗海殆神仙中人矣况瀛洲乎抑余因是圖又有喜於畫史之妙也天下之物有非人力所致者而畫史能致之某嘗思古豪傑之士於千百載之上恨生不同時而畫史頃刻能致於目睫以慰懷賢之想今宗海慕清逺幽勝於海外不可知之鄊而畫史以意形之一室以成宗海所慕而宗海欣然樂之以為瀛洲在我矣非寓意而不留意者能然乎禮喜宗海興寄髙逺而知其有得於斯焉故著今昔相與之意為之序送楊生逺遊序楊為白下聞姓前二十年余客雩陽與萬全翁為斯文友徃還言論生在侍楚楚異他子弟有勤學好問意繼以所業過從質是否頎乎似求益者余心甚奇之其後又數年兵變孔棘而翁捐館生頻年行乎患難乃能兼藝能以自濟得不乏賢於守章句㳤人逺甚雖然生計則得矣余獨惜其智分而學不得專時邁而名未易立數以惟斆學半勉則慨然曰生向也不得逺遊以親也今惟慈顔而起處安健仲氏且善養又安能侣數童子匏繫富兒之門以老哉抑豈若肆耳目扵通都大邑山奇川秀之間以紓懐緒以致甘㫖哉今年秋余挍藝閩藩生來謁於三山驛舍握手與語而後知其無言不酬如此迨余之歸也送至延平因得睹其近稿則閩之佳山水無不形於咏歌秩秩乎其體裁之正也雍雍乎其音節之和也兹其遊之不可少也哉方將出閩關汎淛江下嚴灘入㑹稽而探禹穴沿洄江淮之交以仰窺京師之壯麗則所歴益多所進益不止此雖然斯言也因生詩而發予之求於生猶有重於詩者昔司馬子長好遊或者以其史記之奇偉得於名山大川嗟乎子長之得於逰豈獨史記哉生今之徃也有若鄭衛之地則退然恧然凜乎視指所加而知戒有若洙泗之鄊則回翔焉想慕焉思古人所以自致不朽者何在而知勸則遊之有益於生也豈有涯哉行矣勉旃明年候歸棹於鷺渚之濱將覘所得於遊者以為生賀贈醫士余以謙詩序去年余校藝三山歸至鍾陵趙仲敬來訪語及醫士余以謙之賢余已心識其人矣今年秋復同曽君希魯挍文東廣同院有爽節適曽君因及以謙之為術余益敬其為人於是求詳於曽君則曰余為章貢世醫而以謙尤精遇人有疾苦不問貧富即趨視之雖震風凌雨不避察脈視證如别黑白如養由基之射然不衒能不伐勞不瑣瑣規利其處心與君子同常人殊病愈者雖不徳之弗問也沂僑寓雙江有年數矣凡老少有疾悉賴調䕶感其不厭而愧其所報雖天之福善必在其子孫顧不能使如宋清闕托諸辭藻藉藉至於今我負也歟哉近獲縑軸欲求詩文之能者著其處心濟人之美而子為之倡何如余聞而笑曰以謙之於曽君全其無恙於一家曽君之於以謙冀其有聞於千載盖交相贊者也不求報而報之其皆古人之心也乎余亦樂道人之善者故書其槩於簡首云送蕭韶㑹試詩序學校選舉出於一則真才用而世大治此一道徳同風俗之源而今昔志士之所願見也予嘗溯而求之周兼三代之制於斯為盛禮在瞽宗書在上庠干戈羽籥之習在東序學者積業就材文武一道至於選舉則鄊遂之學三年大比考其徳行道藝而興賢能凡進徳事舉言揚曲藝悉論而誓之或升司馬或升太學是貢士亦取夫學校之異者於是簡不帥教者移之於鄊之左右又移之遂雖受成獻馘亦本於此盖天下無一事不出於學校無一才不起於學校安得不道徳歸一而風俗大同哉官人用吉士之際其詩曰奉璋峩峩髦士攸宜曰有馮有翼有孝有徳藹藹王多吉士為君子使何至若後世由進之多岐哉皇明之有天下也講求古人所以設教使文武萃於一而學校選舉出於一庶幾三代遺風復見今日十有七年甲子秋大比郡縣之弟子員試藝於各省於時泰和蕭韶以詩中前列横翔捷出士類驚駭可謂俊秀之士矣將赴春官友舊咸賦詩贈行而屬予序之故舉三代養士取人之法洎本朝復古之意以告之庶幾擢髙科躋膴仕者忠信成風㢘恥道立以無負於朝廷無愧於三代人人有士君子之行則斯文幸甚霍山十二景詩序余聞平陽堯之所治故其人至於今恭儉克讓和而不怒憂深思逺有聖賢之遺風常欲與之遊而罕遇其人申君良弼司征廬陵有士君子之譽于是益信前聞不妄一日語予以霍山之景凡十有二曰迴巒春早曰介山秋色曰綿嶽雪晴曰箭壑斜陽曰龍洞白雲曰馬跡晴嵐曰抱腹雲梯曰大岩氷柱曰屏風疊嶂曰玉峽飛泉曰三清烟雨曰禅房夜月皆其邑山川之勝且曰某雖逺役於外而故鄊景物常顯顯心目間思得能言之士序其槩而詠歌之公退展巻一誦猶身至乎釣遊之所而目寓乎景物之間也子以為何如予聞而嘆曰良弼之志亦厚矣王師範有云吾敬桑梓所以教子孫不忘本也君其有同於是耶近年求仕者有薄其鄊土詭籍中州以利於進視棄墳墓猶棄敝屣况有繫念於山川景物者乎珠出於淵潭而賤淵潭璧生於荆山而惡荆山視良弼斯舉豈不霄壤懸絶哉各賦三韻以為諸賢之倡丘隅一雨霽藹藹烟翠好獻嵗曽幾時鳴琴得春早羨爾迴巒姿陽和轉枯槁右迴巒春早常時介山道慘若寒食節况此風色殊秋髙轉蕭瑟嗟哉號野翁使我長惻惻右介山秋色綿岳雪岧嶤晨暾光欲滴凄涼一片地狷介有遺跡彤弓饗既疎茅土復何益右綿岳雪晴箭壑日脚埀平原草如剪世路老行人徃來足忘蹇返照滿空林長送牛羊轉右箭壑斜陽蟄龍本在淵閔世鱗鬛動功成而不居退宻守幽洞雲桂碧松枝英英亦藏用右龍洞白雲斯人不可作馬跡尚如故割股情何深還家棄前屨千載嵐霧中精靈託啼鸒右馬跡晴嵐抱腹巖回合金粟招提境梯梯上層巒靉靆出山頂此處學無生犁然發深省右抱腹雲梯大岩水晶域玉柱凝氷花貢入廣寒宮煩疴焉敢加歛兹錫民福歌詠懽劉义右大岩氷柱雲間千萬叠烟嶂如屏風秀色在朝暮奇觀異横縱何由陟其椒一覽華與嵩右屏風叠嶂砑然蒼玉峽知是何年鑿飛泉濺珠璣觸石響雷雹誰挽銀河流人間洗炎爆右玉峽飛泉清静老氏宫凡間羨琳宇無為常自化香篆長如縷塵躅至者希沈沈鎖烟雨右三清烟雨禪定乆已出悠然塵外蹤夜月如流水振衣受涼風何由裂煩網寄跡觀性空右禅房夜月草意詩序昔軒轅氏以神聖之資行施濟之徳察草木之滋鹹酸甘辛蘞蜇以藥人之疾苦於其美惡無所憎愛一視同仁其嘗百草者惻隠之意也至楚之屈子始分辨於其間扈江離擷辟芷搴木蘭攬宿莽雜椒桂紉蕙茝畦留夷滋掲車索胡繩雧芙蓉惟恐衆芳之見棄而薋菉葹榝蕭艾之類深慮其充夫佩幃盖惓惓忠君愛國之誠而懷賢嫉佞自形於比興之表義也迨觀杜少陵除草之句惡之如蜂蠆若芒刺芟夷不待於髙秋其嫉惡如仇猶屈子之意乎濓溪周元公深探聖賢之奥洞觀造化之原吟風㺯月洒落光霽庭草不除謂與自家意思一般其萬物一體猶軒轅之意乎白下劉君善初蒔衆卉於庭藹然如茵繽然如幄行列奇石而日哦其中以舒浩蕩之懷耿介之氣因字其所曰草意宗工鉅士髦友畯生莫不歌詠之而善初徴序于余余不知善初之草意仁耶義耶客有謂予曰善初業醫而活人之念尤切竊觀其意無亦願學軒轅氏之流歟曰仁與義吾不得而悉也予聞而嘆曰方今公道日淪民風日靡戸服艾以盈要謂幽蘭不可佩與其為少陵之義形於色曷若濓溪一般意思之為髙乎善初曰先生可謂得我心之同然者也請書以為草意詩序麟原後集巻二

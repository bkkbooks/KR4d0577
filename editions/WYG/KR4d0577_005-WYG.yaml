body:
  text: 麟原前集巻五元王禮撰序送呉莘樂遷葬序僕十年前舉于鄉永豐丞呉君校藝湖廣還至九江聞僕在選中而喜曰非倖致也僕由是感其相知其後有四方之役不見者輙三四年而音聞則嗣䘮亂平忽遇于雩陽執手勞苦恍若夣寐連床夜話世態之難國歩之感勤勤忠告汎及其私于是又感其相厚既留旬日思抵永豐省其先府君墓謀歸窆于義山之陽嗟乎㒒于君有深省矣古語有之求忠臣于孝子之門葢言忠孝非二致也乃今觀之益信初君之仕永豐也體聖上之仁子育黎庶抑暴起萎臣之忠也仕而迎養子道之常回首故山白雲伊邇烏知時殊里絶先人魂魄有不得思沛哉迨君之離永豐也生民之禍日烈貲殘舍燬間以身免雖龍驤之塋馬鬛之塜不以怨惡開則以金玉累異鄉杯土抑且奈之何哉而父兄之詔其子弟者則曰縣丞汝父母也先塜在斯邑者春秋可忘祭掃之義乎酋長之戒其部曲者亦曰縣丞我父母也先塜在斯邑者朝夕可忘省視之勤乎違之七年矣而松楸蔽芾蔚如甘棠人心天理之不蝕豈偶然者哉夫納忠于君而獲報于親君子之孝也君今徃省臷忻穉喜感舊談新飯洒酒澆翁仲猶昨死生契濶既慰且安發引江行特易易耳世謂吳君起家為名進士從政為古循吏校藝為明有司或莫知其純孝者故僕因其是行也著所聞以自儆且以為當世士君子勸焉繂維漸開酌酒舉餞而侑之以歌歌曰若有人兮邑中黔堂有弦兮戸無兼金溟渤􅅽埃兮髙岸以沉南山有丘兮其木孔隂狐兎削跡兮鸞鳯來吟種徳必穫兮良哉此心歌罷抗手别去魏松壑吟藁集序詩大序曰在心為志發言為詩傳曰志之所至詩亦至焉三代古詩何莫非其志之所之也五言起于蘇李其離别贈答中情繾綣藹然詞氣之表下至晉隋陸機之論詩則曰縁情而綺麗而文中子亦云詩者民之情性也故詩無情性不得名詩其卓然可得于後世者皆其善言情性者也奈何世道日降温柔敦厚之教無聞遂啟邵子刪後無詩之歎葢不求其本而誇竒鬪靡者病之也古人托物比興其鳥獸草木之名皆取人所同知者庶幾咏歌有足感發何嘗採掇珍異如丹砂空青金膏水碧山海經所未載博物志所不録皆左抽右擷取青嫓白令人乍見如入武庫駭神盪目不可名狀徐而味之求其纒綿要眇如山陽之笛依依不能去心何可得也嗟乎安得起吾廬陵劉先生九京之下與論風雅之妙哉古燕魏松壑翩翩佳公子也早有能詩聲凡可悲可憤可樂可感輙形謳吟末嘗探賾摭怪而語必不可俗余讀之盡巻快意快意使其不以﨑嶇風塵汨其中所詣殆不止此抑文章者士之末也余于松壑尚有所加敬焉夫名師勝友輔己之藥石也尤宜親近庶幾變化氣質講切問學其或囂囂耻于自下則賢者日逺矣松壑資禀如此而視斯文之友如骨肉人亦孰不傾囷倒廪而竭情焉將見鏃礪括羽之益以成其徳奚獨馳騁乎翰墨之林而已哉余也歸歟青原之下杜門讀書以娛其晚尚取四方名勝之作萃而刻之則松壑在所不可少云雩陽孫母輝和爾氏貞節序易稱有夫婦而後有父子有君臣謂人倫莫能或之先也聖人删詩念夫婦以經斯父子君臣之倫無不得其正掲栢舟冠變風其意顧不深逺哉嗟夫予于雩都孫母之貞節有不得不暴之天下矣孫母輝和爾氏而諱則額森德濟也父諤爾根為雩都縣逹嚕噶齊賢邑士孫庭蘭以其子妻之歸孫三年庭蘭歿年甫二十有五誓守遺腹靡他黙祈熊祥庶庭蘭死猶不死後果得丈夫子榮宗是也鞠字恩勤日深歳積逮從學受室卓然能自樹立則母年已五十餘矣于是里社長老聚而言曰是貞節婦也不白于公旌異之其何以勵俗遂上其事于縣縣令受其詞而察之得其實復上其事于府府公受其詞下而察之得其實又上其事于行省省臣聞之于朝將表其門適以事變寝己亥春余自嶺南還雩見榮宗㷀㷀哀疚則其母亡矣一日泫然謂余曰本立未生先父棄代頼母氏載育載訓以有今日其貞白之節行道之人猶知之旌淑有令遘亂而止本立徳薄才淺無可自見于世以顯揚其親今母氏音容不復接矣罔極莫報而語食自若于天地間尚得為人子乎思得四方能言之士載諸咏歌庶有聞于後不孝之愿也先生以為何如請述其槩余遂志之曰兵興以來父子君臣之間有愧于孫母者衆矣尚徳君子三復斯文知斯人之特行嘉其子之孝思豈無慨然興懐而咏嘆之者送鄭子髙還徽州序至正辛邜古歙鄭君子高來省季父雩陽尹明年江淮繹騷跬歩如在絶域遂僑寓雩邑荏苒十年今茲舟楫始通子髙率其族屬之寓者東還故鄉余聞為子髙慨然人生憂患惟渉世亂離而淪落異鄉者可念有欲歸而力不能自歸者多矣力能歸而諉曰無父母兄弟或白髪倚門而不歸者何限乆飢之先塜尚有能動心乎哉今子髙在鄉無定省攖其懐在外有家室慰其思亦復何所不可而慊焉深恨終養之不待雖泉流世隔瞻慕愈切子髙乎其使余感也將見過家上塜斷垣古木皆異時丱角嬉遊處豈無徬徨而興嘆父母親友斗酒勞苦必有嘉子髙不忘其先不棄其鄉以戒子弟者嗟乎魯無君子斯焉取斯過紫陽夫子之祠可無媿矣然一去一留交情之變茍非言志曷暢離懐舉餞諸賢列賦寵别屬禮序其首簡故著其概如此云送李師昌序太史公傳日者以為古之賢人不居朝廷必在卜醫之中而世之仕宦者相引以勢相導以利枉主法獵農民以官為威以法為機求利逆暴辟無異于操白刄以刼人者也視君子處卑隠以辟衆而以義置數十百錢者豈不深可愧哉予嘗竒其言凡卜筮方藥之士未嘗敢以易心視之懼隠君子或寄迹于斯也然亦罕見其人焉今年秋辟地白沙吾黨李師昌者集生授業餘力為人推五行藥衆症無不竒中視他術相去逺甚家貧親老復欲遨遊公鄉間以給甘㫖若斯人者其太史之所録也乎抑師昌以古木為標榜木而名古余懼其材大難為用矣雖然杞梓連抱而朽數尺良工不棄况木之古者閱歴風霜不知其幾使出而遇司馬其容久乎醫卜間耶師昌行矣與人臣言依于忠與人子言依于孝見從政有如前所云者諭之以命而藥其病可也陳子泰詩藁序余聞辨于味而後可以言詩信也今夫適于口者若醯非不酸也止于酸而已若醝非不醎也止于醎而已以充飢者或輟焉知其醎酸之外醇羙膏腴有所乏耳苟有物焉既充乎飢又適于口豈不饜飫爽快乎人哉江西自徳機范先生用太白風格一變舊習流動開閤舂容條暢音嚮節奏咸赴以合類皆和平之音于是學者翕然從之遂無復濤怒電蹴鰲掀鯨吼鑱空擢壁峥氷擲㦸之態然求其一聨一句之間涵滀􅀈永有無窮之思得至足之味使人不知手之舞之足之蹈之則眇見焉泰和陳通子泰故家子弟之淳愿者也為詩業進士遭亂感時傷事發于詠歌劉君子髙又從而維之抑揚瀏亮甚非𤨏𤨏者所能及也自是少加以思將見韵外之致景外之趣超詣沉鬱如藍田日暖良玉生烟可望而不可致之目睫之前斯可名家矣若然醇羙醎酸之味有不備者歟子泰示余詩藁欲聞所益于余最厚故樂題其簡端云贈陳省掾序葢余于省郎陳君之完城竊嘆其有大過人者也士方讀書衡門于古今事未愜意者恒奮袂扼腕抵掌頓足恨不置身其間以少展尺寸及用于世或才不足以稱其位氣不足以赴其志使人致疑于窮經幸而施為稍異于流俗又以未逹國體任重而躓異流俗矣逹國體矣卓卓然古人于今世足為邦國重萬物吐氣矣又或偏于獨見懈于末路嗟乎才難如此于今誰與共論當世事哉君之在永新也或曰規畫有方訓練有法或曰恩義感激得士卒心或曰雍容暇豫時以碁自娛茫乎莫測其涯涘以是觀之非其才足以稱其氣足以赴者歟非窮經果足致用歟非通逹國體者歟非居今之世復見古之人歟宜乎有如主敬雖﨑嶇兵亂間無一瓦之覆以為家而惓惓執鞭事君者葢亦有見也士之頌君者禮嘗序之矣主敬又得若干為一卷君何以得此于人人哉雖然士之屬望于君不永新而止矧永新猶有未奠枕者乎孫子謂兵聞拙速未覩巧之久也吳子則以二重一信為勝之主民之斯命者尚其念之送湯輔徳廣州䝉古字學録序昔我世祖皇帝奄有區夏以遼金及遐方諸國各有字書而本朝尚缺故特命國師創製䝉古字頒之四方期以順言逹事而已于是内則翰林院以總其教外則䝉古教授以董其學可謂備一代制度矣比者江西提舉官推廣上意辟習于茲事者増置諭録以羽翼之由是外弟湯輔徳沿檄録廣州䝉古字學將行别予宣溪之上或謂輔徳簮纓世家階庭才子不明經舉進士顧乃業右學以徼進不幾近耶予語之曰子亦知夫國字之功乎鄭夾漈謂梵音行于中國而吾夫子之經不能過䟦提河一歩者以字不以聲也國書因聲之自然而使無字之聲悉成有聲之字推之于逺豈小補哉輔徳之是役也邇之化民可使嶺海以南誦其語者莫不鼓舞于王言誕敷之下逺之事君則經筵逹帝聰發揮尊主庇民之妙未有不由于此也尚何愧于科第乎矧餘力學文固將並行而不倍也既以觧或人復叙次是語以為輔徳赴廣州䝉古字學録序蕭伯循詩序始余有安逺之役道雙江謁府長伯循過余于旅邸因見其詩後以王事鞅掌邈不相關五六年矣去歲還廬陵遁跡曲溪之上伯循復以詩來訪相對如夣寐詞翰之妙非復疇昔深使余喜也今年余寓東昌伯循之里也又盡見其感時懐古咏物抒情登覧酬贈餞别等作徐而讀之大篇舂容短章峭㓗流麗而無矜持䟽放而有興趣凡意所欲言無不盡逹于筆下如時花吐艶過者屬目如春禽調吭聞者快耳此豈沾沾録録者所可企及哉雖然劉夣得有云心之精㣲發而為文文之神妙咏而為詩司空表聖亦曰文之難而詩尤難二賢深于詩道者也味斯言也詩果可以易視耶伯循嘗誦詩三百矣試舉一二得于余心者談之常棣之于兄弟伐木之于朋友蓼莪罔極之感東山體下之心伯兮之思其君子旄丘之責其隣國小宛之相戒谷風之相怨燕燕恩爱之情黄鳥哀痛之恨何其曲盡人情㣲婉懇至後千百載能言之士莫或及之何哉噫有三代人物而後三代之詞章可覩也人品不古若而欲詞章軼乎秦漢之表豈理也哉學者歩趨乎聖賢涵養其氣質則詩之本立矣本立則其言藹如得乎性情之正不期高逺而自髙逺矣伯循思其難務其本致其思而使之精養其氣而使之平充其學而使之洽異時視東昌談詩之日猶今日視雙江始見之時則伯循殆將超等夷而名家矣勉旃伯循朝滿夕除潢潦也沿委而遡夫源其江漢之流乎胡澗翁樂府序文語不可以入詩而詞語又自與詩别曽蒼山嘗謂詞曲必詞語婉孌曲折乃與名體稱世欲暢意者氣使豪放語直俳伶輩飾婦衣作社舞耳其不茍句者刻鏤綴簇求字工殆宮粧木偶人形存而神不運余深以為知言自花間集後雅而不俚麗而不浮閤中有開急處能緩用事而不為事用叙實而不至塞滯惟清真為然少㳺少晏次之宋季諸賢至斯事所詣尤至姑即鄉國論吾家松竹居士暨胡古潭彭巽吾皆詞林之雄也國初太原元裕之以此擅名其後涿郡盧處道河南張仲美韵度俱非尋常可及親友胡善樂以其季父澗翁詞稿示余無前二者之失而得諸老之遺纒綿依約語意深到令人不能釋手既而謂余曰往者季父詞稿司馬昂夫嘗序之矣鋟梓未完而兵變盡廢捃拾記憶存十一于千百俟力稍舒仍托工人壽之子為序所以顧惟淺陋奚足以窺曹劉之牆苐念胡氏自宋以來詩書閥閱雄長當時澗翁于古潭孫行克傳弓冶不墜家聲又能傲睨凡流得其禮接甚登龍門尚有承平王孫故態今觀其羙製可謂無愧古潭矣囬視松竹清風紹其遺嚮者其抑無愧于澗翁也乎因序其稿歸之并以識余之不武云耳送王録判補憲掾序至正十五年正月江西河東道肅政亷訪使司辟吉安路録判王君叔琰掌憲牘合城士民怛然失色留之不可來諗于予曰兵火凋瘵之餘天以録判惠我遺黎公而能慈而勇利必興害必除革吏弊若鑑詧而隄决也恤民隐若寒煦而饑飫也總府知其才公委日至必求其情斷于理與工容恱者夐異政府數月善譽翕然今為上位所奪去勢不得留計將安出余觧之曰王君居是職則合郡䝉福而止贊治憲幕則吉安四州五邑與列郡之民咸蒙其賜烏得以寡妨衆哉然余因君之行而竊願有言焉夫憲司朝廷之耳目而書吏又憲司之耳目也當今時弊可動心駭目可扼腕抵掌何限起而救之政在今日識時俊傑豈昧先務之當急乎風俗頺敗忽禮讓而崇驕侈人紀人綱其誰與立一宜先各郡有官君子之賢十不一二不次超遷猶懼弗勸二宜先人民鮮少牛畜殆盡東作方興田必荒萊百姓不給何以裕國三宜先楮弊通行官民利頼窒而不流自上壊之物價翔踴民不聊生四宜先忠義之士國爾忘家殺身不悔無貴賤無小大必有以旌異之則人心激五宜先奸暴縱横弱肉强食上下黨結政以賄成岑范久踈無所忌憚六宜先惟侯世臣之裔與國同休戚雖位卑政劇猶惓惓撫民如子矧今贊風紀之司立清要之地有不舉先務以新庶政者乎將見薅稂莠以扶嘉植渙氷雪而囬春陽則深山長谷之民必舉手加額曰憲幕有賢其將復覩唐虞之治于是來者慰悦請書其語為君贈余雖未識君然得其為人矣故敢獻芻蕘之愚云吳伯淵吟稿序余兒時從師學詩辱教之曰吾之道本乎性情寓乎景物其妙在于有所感發茍無得于斯不名為詩因舉古詩優游不廹意在言外者每夜諷咏數語久之真覺淘去塵俗神思清逺于是令録三百篇中可興可怨者及離騷而下蘇李漢魏等作沉潛誦玩叅以盛唐諸名家而止常曰詩在山巔水涯人情物態故紙上踵襲非詩暇日率子弟徜徉臨眺仰掇俯拾無不可誦然後戒以語忌俗意忌陳調忌卑味忌短小者不可使多難者不可使近得之悠然挹之淵然而詩在是矣其後年益上思干禄以養親竭力為舉子業終歳不一吟者有年然舊聞隠隠在耳夢寐猶未忘也近見一二學者喜鋪張而乏變化尚朴厚而無興趣多或未精短或未暢安得起是翁九京之下與共論哉臨川吳君伯淵以其詩示余有舂容而無急廹有藴藉而無斵琱有情景而無典故真可與言詩矣由是遡而求之而盛唐而騷選而三百優柔涵泳之久且將有得于詩教温然為成徳奚啻小技之精而已哉余之期君也逺故以所得于師者竭焉使三復斯言有助我之歡則非吴下阿䝉矣用序其稿俟良㑹之再卜之送楊子牧九江謁吳亷使序凡遊都㑹之地者非有析圭儋爵之想則必貿遷廢舉之徒否則挾其一技一能以自售舍是三者亦無因而至矣今有漫游之士無三者之志而有思賢之心求俶儻瑰瑋之君子一見以自勵衆人訝之余獨竒焉非王謝家子弟有此一徃雋氣哉前憲使吳公以雄辭直道屹立乎邦土離析之際困踣不回萬物吐氣不負乎學不愧其先禮也願為執鞭久矣而衣食于奔走志弗之遂蜀楊樵子牧故宋叅知政事公棟之裔孫其尊父則余氏出也别余將㳺九江問其志則曰曩侍親尉崇仁時嘗一拜憲使公今二十餘年矣懐賢之切嘗夜夣之思少立下風獲聞崇論宏議豈非平生快事哉余聞竊驚嘆焉公一退士耳非有聲利之及乎人而欣慕之者惓惓弗置此豈偶然之故耶係人心者必有在矣而子牧卓越之見殊于尋常余猶為簮纓世族之有賢子弟喜也夫以余慕公之素而依違于日邁月征之餘不得奮飛以奉教于左右今于楊之徃也能不重竦望之情哉雖然九江今都㑹之地也子之徃也異乎三者之志矣抑適滄海者人必示之以其珠入崑山者人必衒之以其玉珠玉在側得無歆動于中乎子牧作而曰樵歸之日倘辱大人先生咳唾之珠玉志願足矣他則非所知也相視一笑而别録事司典史謝宏用羙觧序典史司縣幕佐也持案牘之權與官吏相可否其職任之係不輕然率由吏老將至而始任焉故好興事舞文法乃其常敦篤渾涵之意什不一二也茍有之則人隂受其賜者多矣豈必有建明施設而後為賢哉吾郡録事典史司謝宏用之考滿也城西諸君子謂禮曰謝君佐政三年矣醇謹而無鍥薄也悃愊而無操切也奉法遵職不察察以為明也同寅協恭不斷斷以為任也知録事張公之賢而相之而民莫之知也吾子可無贈言以寄吾黨之情也乎禮復之曰吾得其人久矣彼有所受之也内附初宏用之王大父昌元以故宋儒臣逮事世祖皇帝念二帝三王之治莫備于書進而獻之陳說大義上嘉納焉授吏部尚書于是朝廷議禮制度咸俾與聞當時諸老樂談其事謂隠然與箕子陳洪範者同科眉山楊衡州于吏部公有鄉里親戚之舊嘗為余誦之夫觀人必本之父兄師友宏用敦篤渾涵度越時輩庸非先世之儒術飾吏事耶使仕優益學發揮吏部公所以事君者以臨其民而世濟其羙豈不益有咏嘆君子忠厚之澤于方來哉麟原前集巻五

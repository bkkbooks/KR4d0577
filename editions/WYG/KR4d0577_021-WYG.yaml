body:
  text: 麟原後集巻九元王禮撰銘廖岡銘有序廬陵之西有廖岡焉相傳李唐時有廖仙姑棲神巖石禱雨輙應四方徼靈無逺弗届紹興二年里士蕭廷珦胡子美重修治之自紹興迄今又四百餘年矣斯民蒙其福澤以有生者不知其幾世神之貺烏可忘耶歲甲寅蕭氏之裔民則暨其姪用和合里族之力市甎甃其内外儼為一室而檻閉之使翼翼綿綿則神之厚我民也愈逺矣岩上嘗産異香良藥亂後嘉植則翠柏十章云明年夏前鄉貢進士王某過之其弟夀春俾從子權来請銘為作銘曰廖岡有仙其原邈悠雨暘失序靡禱弗酧山川出雲烝民乃粒子孫裕蕃莫匪爾極岩構幽幽以永神庥福我祐我天地同流永思堂銘予友蕭志通慟親之殁也有遺憾念某不忘字其堂曰永思求予銘予嘉其志為之銘曰岵屺生悲音容身後一旦忽忘豈伊田獸愈逺愈追徳淳俗厚孰拯頹風扁此堂構永思云何盡此餘孝慕終吾身雖老弗撓忌日節令思成靈貌復念吾親思其嗜樂思其所志思其所教既念吾親復念吾身身者親枝盡道乃人髪膚之㣲莫敢遘􅢌况在志行肯慙鬼神思而至此厥思始大見賢思齊夙夜匪懈嗟今之人暫思已稀蕭氏有子其殆庶幾雲在軒銘余歸自章貢僑寓永和從龍比鄰也與相接者一二年矣余後歸宣溪從龍館授鄰里日益相踈而于心終不忘去年重尋舊逰從龍聞予至亟持伍先生所為雲在軒記視予欲予為之銘予平昔重違朋友之意不能恝然况于予舊友又豈有愛于一言㢤為作銘曰隂陽聚氣山川流象或祥或異變易殊狀軒轅紀瑞伊祁繫望周觀至分漢喜芒碭陟彼太行孤飛其上孝哉狄公親舍瞻悵自斯以後懷親之勤觸目感中慨焉白雲雲歸于谷親歸于墳永言孝思五内裂分永和余升克孝之子思慕音容陟降庭止木本水源難忘厚恩何以志之雲在有軒悠悠英英集于茂林雲在在林寔勞我心溶溶漠漠入于幽壑雲在在壑寔勞我目宿簷在軒伊邇匪遥不寐有懐載夕載朝孝子不匱君子所予形于咏歌達于國史風移俗美式化里閭我銘斯軒人其舍諸誠正齋銘郡城李樞子容明敏淳篤扁其讀書之所曰誠正齋而來請銘可見其務内之功切矣麟原老人為之銘曰人之為人靈冠萬物心生吾身意乃其發誠則無偽正則無譎惟誠惟正神妙莫測我思誠之其功曷先曰敬曰畏翊人以天我思正之勿怠而飭絶其慾貪戒其縱逸顧諟虗靈俾常惺惺認善惡關截其以分君子小人實判于此既誠且正賢聖同止作此銘詩懸于是齋目擊道存懋㢤懋㢤具翕堂銘有序太和劉君子髙偕其兄子中弟子彦怡怡不榛梗而家日肥子髙既荐之明年治堂于居之後字之曰具翕取常棣既具既翕語庻目擊以固斯樂耳故人王某聞而来㑹頋瞻歎曰兄弟若劉氏其罕見矣夫殆世衰靡俗之砥柱也釋詩者曰具俱也翕合也盖俱言跡合言心也迹俱而心弗合其樂安在况覬其樂之湛乎曩誦詩至戚戚兄弟莫逺具邇與式相好矣無相猶矣為之徘徊諷詠不覺情親惟憂其句之盡今登斯堂不有感于予心也乎銘曰乾父坤母四海弟昆父母在親天叙攸倫情切義深異乎友生一夲分枝共氣殊形既具既翕惟君子有如塤于箎如足于手斯世同生異世則否迹宻情踈顔不有厚繄古之人曷其齊而姜肱盗感王覧母怡嗟今之人厚薄異施不牽于婦則梏于貲三虎在賈三鳳在薛蔚此三荆菶菶堂側詩以聲之君子是則以儆䦧墻以告来哲三省齋銘有序余别峯泉翁乆矣白顛重来義門煥新棟宇宏麗顧瞻彷徨深羡其子肯構之賢克成父志既而止敬請曰成也茍完斯廬復即堂之北葺數椽為游息之齋以三省題其顔庶目擊戒存或有以寡其過先生執友也可無一言垂戒我哉誼不得辭遂為之銘稽古修已信道執徳專心務内實惟郕國卒傳大道千載誰越昔學聖門㒺敢怠忽日日省身三者交察人我同胞否泰異逢來即我謀云胡弗忠必盡已心俾歸于中小有回遹戒其鮮終聲應氣求益友良難心既斷金臭亦如蘭諾重季路陋彼㰱盤尾生不食非義所安傳道扵斯博學約守一暴十寒終非已有為仁在熟習則可久嗟㢤時人徒熟稂莠入道在門積德有基至切者三朝思夕思文江歐陽族大且巍文忠同源𣲖則有支詩禮傳家簮纓垂輝宜爾子孫樂且有儀扁以自儆寓戒于規存心齋銘人之為人虗靈者心衆理斯具萬事是任擴而充之周于四海巻而藏之其宻咸在存之伊何主敬無他皎若明鑑匪滌匪磨日久日存其功孔大隂陽以和天地以泰民胞物與㒺有内外一視同仁瑞慶斯沛蔣氏是齋朴而弗華寓意深逺壮麗孰加銘以聲詩萬鈞匪重懋哉懋哉虞廷大用畊樂堂銘有序歐陽子畊易負郭之田以養其親而樂在其中士友表其堂曰畊樂為作銘曰古之四民士農相通烝則為士䖏則為農是以賢聖耒耜必躬甘食已力耻尚商工粤有歐陽文江之滸諧世善交行已古䖏竭力于田以養父母火畊水耨􅌨風沐雨祗見其樂未覩其苦日入則塈日出則作與與翼翼築堂斯穫制既𢎞堅文以丹堊士友所嘉字曰畊樂其樂維何希顔慕伊慈顔以和兄弟以怡錢鎛者外其中孰窺耕道得道藏器待時我銘斯堂于耕有輝一經堂銘有序一經堂者羅士安與弟士剛士明講習教子之地也士安兄弟怡怡而善事其親迨今見先友之至勤勤依依不忘故舊况崇經笥而劣金籯有不克承先志者乎為作銘曰六經行世在天如日名號雖殊其理則一謂之一經六者具該聖心藴奥論道根荄水之滄海山之岱嶽承學帡幪衆說郛郭道寄于經因言以宣經之㣲妙不可言傳善味道腴猶彼斵輪不疾不徐精義入神不善學者指血顔汗矻矻窮年編離簡斷昔之聖賢心與經契口耳之徒心經岐二誦讀庸行夫何益焉經不離道古今正權羅氏斯堂有自来矣景慕前聞慎終如始誠復齋銘余與建中友有年數矣徃在郡城常常而見之逮歸西昌之西不相聞問者累年近聞教授鄊里隠居求志裕如也常欲余銘其誠復之齋諾而未副愧負多矣書來速文乃作銘銘曰於穆太極肇分兩儀卑髙以陳化育始滋厥初流行造化未定今則得之其理各正曰性曰命賦受匪殊收歛凝聚歸藏吾軀保合天和全之在我既利且貞施無不可藴兹太極寂然静專是曰誠復中正無偏成性存存實理斯立體用一源成已成物人之為人不在兹乎鬼神莫欺與天為徒嗟嗟羅君孰察于此顧諟齋銘自求多祉我作銘詩目擊道存表于兹軒詒爾子孫矯輕儆惰二銘有序禮看近思録五巻中矯輕儆惰四字無上下文因嘆朱吕先生用心至矣盖掇取其關于大體切于日用者以為學者求端用力之要故四字之善在所不遺輕惰者世之大病也不幸某亦有之因作二銘以自砭焉人之言行如樞如機胡人未言我唇已翍不錯而失亦厭匪時彼發而中視之忸怩胡人未行我趾已移疾無善步卒堕險􅇖擇地而蹈何有于危浮躁弗禁禍既莫支無易于物桃蟲􅂸飛曷其矯之嚴重自持咨爾輕叟坤厚載物君子所儀民生在勤不勤自隳日無停馭川不息馳况人靈物競辰寔宜學務時敏徳業孰齊治生服勞衣食無虧孔席不煖墨突不緇賢聖且然况在群黎奈何無恙弛其四肢習慣成癖固不可醫曷其警之如臨父師咨爾惰夫乾健不息君子體之守拙齋銘郡城之西南湖之上當在宋也吾祖信臣公攬其勝作山月亭誠齋楊文莭公記之吕忠公謪居寓焉代遷亭廢遺址尚存其下有菴曰圓通徑幽勢阻来多顕者余亦嘗假館其中僧曰道林秉心簡實旁通儒書善吟諷齋名守拙邑士王某為作銘亦償夙諾云爾粤觀太初朴素淳重民之質矣飲食日用風氣既開世道愈漓賦予匪初巧偽以滋有上人者字曰守拙不識不知順帝之則驀坑越壑非意所好稳歩徐行擇地而蹈縁絙走簷非情所與棄危即安循規蹈矩巧乃黠慧弄成無能拙本不巧至巧斯存乆厭機心思與拙伍爰銘其齋蘄復于古鐘銘某年甲子華葢山永豐觀道士劉大智化縁衆姓鑄洪鐘于法堂前進士廬陵王某為作銘華盖之山鑄大鏞鞴金煉液丹砂紅伶倫鳬氏奏厥功銑于篆景法制同信善樂施禧無窮千古萬古鎮永豐一撞上徹天九重再撞魑魅難潜蹤三撞呼旦儆群蒙允矣金奏開神通筆銘彦濟朱兄所製毛頴余用之腕倦矣剛如剸犀之鋒而不妨于轉圓如繞指之韋而不嗇于徤以之待詔玉堂頃刻倚馬以之試藝棘圍湏臾出院題詩蠒紙饑蠶食葉草檄轅門飛龍走電其真文房之寶而使人深羡者耶圖書匣銘有圖有書文字繽紛印以識之罔俾亂真三峯水滴銘如眉三峯中容外屹萬斛文泉出自涓滴筯筒銘雖無辛侈焉用良假百里震驚執此不舍香合銘香以徳馨如玉如金氣逹𡨕漠表于克忱鳩杖銘人言鳩性可治噎我獨喜其稟之拙也而專一人言藤杖可扶老吾獨喜其生之柔也而正直予欹女持予􅉵女掖出入相友鮮女予益雖然是手足之所資而非吾身慿藉之實若夫仗禮義以為幹仗忠信以為力則麟原丈人之平日也寅賔軒銘暘谷出日其赤如金萬國晃朗况深山僻林寅而賔之懐徳寔深嘉客戾止如日照臨門户輝光云何不欽啟我沃我如旱得霖以鍼以砭足捄聾瘖振古尊賢受益匪今髙軒之過蛇化龍吟朂哉是軒常存敬心麟原後集巻九

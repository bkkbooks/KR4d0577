body:
  text: 麟原前集巻一元王禮撰碑贑州路總管府判官王侯紀勛碑今大郡古侯國也而政令之設施財賦之出納軍民之統治尤為繁浩必長克長貳克貳同徳恊共臂指同運則事無不舉不然雖平世不能以治况搶攘亡紀之日哉贑之政可睹矣兵部尚書全公以選牧兹郡文武並用聲威赫然越二年為至正壬辰蔡穎流毒江右搤于吉安間道由撫以窺贑四月據寧都扵是府判官奉議王侯分兵討之癸亥戰猫兒石得間諜戮之甲子戰小庒冦􅅲乙丑至葛坳三㨗毁其茇舍奪其馬丙寅戰印山㓂奔潰已巳駐兵女冠三方並進七戰大㨗是日復寧都獲首賊范某及徒七十餘人得所奪有司銅印一十有三萬户金虎符一日遣部将跡殘兇掠鬼嶺越果子園斬首數百級擒偽元帥劉萬户賴盡焚其巢一十有六乃命增舊城三尺陂萬斛里以灌濠外置鹿角柵以備設䕶民廵檢募集義民城内廵防者千二百人城外守望者二千四百人節鐘鼓以知緩急未幾冦再至再衂州民始安十一月又檄侯分府事扵興國既至縣即調兵廵捕與冦逆扵方石生擒二百人斬首百六十有竒㲻死者不可勝計始葺城壁象十二次先是冦據方大官兵退次遂用郭鼎計分兵進屯寳石逼方大覘冦實虚卒破之招懐脅従失業者五百餘户稍暇建尊經閣以誘士類曰教不可廢也明年春㑹昌失虞復分治雩都以援之廣設義兵千户所以聨其民習武以備用置斜站以報警棋布三堡扵近郊為外防建鐘樓縣治之左以明禁令瞩奸慝二月復㑹昌三月援瑞金懐徕石城歸正者十五砦調兵餉士賚勤罰愆書牒坌集辰至已决業業然如奉漏巵沃焦釡十一月戊辰賊數千自循梅来攻雩都侯躬率衆扞城上發矢如雨殪其十之一明日㓂益張編竹箕駢負以前矢石不得入于是冶銅液以灼之遂大潰初雩都未有城侯命屬官毛榮胡思恭吴溥龔昂廖謙楊貴徳先後督成之不五月而竣事髙厚為尺十有二周環里計者五為門凡六各為樓繚以甌脫六十有四扵時茍安之民睊睊若可緩者至是賊􅅲乃環拜曰再生我者侯也新城之力也不然吾屬無死所矣既而竊相告語侯頻年勞身竭思使我民得以飲食事育繄侯之徳甚大况雩學之新侯功為多而古者議政必公扵鄉校若琢詞其中足繫無窮之思且庶有勸于後也乎侯聞之曰無以為也討賊吾軄所當為幸而成功者聖天子其仁如天之福也兵部公卧䕶坐籌之勝筭也况寧都之役時則有若府史危誠孚方泰亨千户法昌贑縣主簿巴延徹爾鄭秉忠道拉實興國之役時則有若府知事程瑞㕘謀郭鼎攝邑事孔雀努林昶雩都之役時則有若府史王尚文徐行攝邑事縣丞和卓典史胡思恭務使龔昂敎諭吴溥等皆有折衝之勞供給先後之助焉吾何力之有衆皆再拜稱歎然卒以為不可已乃竊具功状以文屬禮禮惟贑以伉徤之俗雖治世難盡繩以法乃不敢乗昏濁自肆俛首聴約束效智力非兵部公文武威明臨照扵上非侯經營扵外以撫之未易臻此又嘗經其戰伐之地睹山川險壮聞父老道侯行事感其志節故不辭而樂書之侯名榮忠岳州人繫以詩曰帝式萬國深仁久安蠢爾蔡穎猘狺其間民不知兵㤀戰㤀守言言贑城如虎斯吼長有大賢貳克同心匪我王侯提師孰任閩險粤巖倚聲藉勢道逺應遲分府往治既往治之小大是倚爰誓旅徒勿怖勿疑維此羣醜乗時披猖侵掠我土誘奸脅良併力齊心我榮彼辱良者致歸奸者同戮汝搴汝旗汝伐汝鼓賞功聫曹罰過逮伍軍士私語凡言必酧各盡乃力毋俾悔尤斾旌揚揚㦸矛耀光竹矢檿弓洵直且强我師震之谷響川應執訊凱還風息塵静迨我閒暇修我陴墉浚我濠池曷售其兇居安懐危頃刻靡懈衆人嬉嬉視我反怪遷治無常念亂若一弗問弗事民誰與恤子孝臣忠雅言所存行義或虧懼侯有聞山成其髙水就其深為民之氐為國之琛我作銘詩宜志宜史逹扵帝聰用錫蕃祉贑州重修孔子廟碑贑通守楊侯偁叙興學本末遣文學金友徳過廬陵以書屬予曰贑學創于宋慶厯而再造于紹興宏麗甲於江右元元貞丙申復改作之癸未魯侯至道一新舊觀于是廿有五年矣時艱事殊壊于兵亂丙午夏令中書右司郎中張公民瞻来㕘贑衛軍事始至謁先聖先師于廟見其頽弊弗支頋瞻太息慨然思以為已任明年四月即捐已俸鳩工庀徒由禮殿廊廡暨奎文閣撤腐易新盖甃堊丹外之靈星泮池垣墉橋道内之冕服貌像㡩幙秩封靡不完美自先聖配享從祀而下坐列有序五月已卯始事踰月丁未卒工上不勤官下不動民視平時糜廩粟帑財以為文具者相絶矧今贍學之粮移資軍餉非公篤尚儒術營度有方夙夜匪懈曷克臻此䝉等免于勞勩而受其成思琢石視後子其為吾書之余惟古今治亂繫乎風俗醇漓風俗醇漓繫乎學校興廢方其治運休明家給人足固以學校為首政况乎師旅喪亂之餘綱淪法斁之日興學校以正人心豈非先務之急哉公之是役可謂知治本矣抑興學校守令責也公官在戎閫以武備為務茍兵戢民安即不曠其軄乃能汲汲及此則材識過人逺矣使贑之士来㳺来歌懙懙濟濟講遺經以致其知遵聖訓而敏于行興讓興仁為鄒為魯俗無伉徤以不負興國美意實自兹始禮儒士也儒宫之成職所當書况請之勤勤又烏得以固陋辭遂為志之而系以詩詩曰於穆夫子師表萬世天地與參四時與契載瞻晬容有肅其地召茇猶思胡此弗治既曰治之曷又戾之侃侃士子行已是思四端五典大道孔夷曰權曰數冐邪抵􅇖興學之初崇美廟貌成徳逹材聿觀其效朂哉士子知至思行歩超賢聖見于墻羮章貢沄沄空同鬱鬱倬彼儒宫埀敎㒺極麟原前集巻一

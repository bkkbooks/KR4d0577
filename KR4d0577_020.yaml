body:
  text: 麟原後集卷八元王禮撰銘塗君儀可墓志銘泰和武山邑之望也相傳陶皮二仙洎武姆嘗煉丹其處今年夏孟道出其下觀其雄峙陂陀意其昜其􅀢必有隱居求志者焉俄至汪陂塗伯髙兄弟傾蓋如故剛止余宿青燈夜話跋涉世故泛及其私既而請曰弊門冷系𣲖自南昌徙居武山之陽有年數矣五世祖君卿又徙汪陂生功甫功甫取曾氏生大父萬溪翁實至元丙子也大父既冠拓畝肯構思光顯其家于天文地理之學無不研究鄰里有鬪爭者歸之曰是能排難解紛以理曉人也官府有征斂者從之曰是能稱停屋簿以公服衆也骯髒鄉曲者讓之曰是徑卉不偃于風也所識窮乏者依之曰是能絶甘分少也性極謙和而人亦莫敢侮拂之居常誡子孫當存心以厚往歲有飛語大溪山寇將夜劫武山塗氏於時武山群從昆弟悉以輜重寄豫汪陂及寇至乃掠汪陂而武山無恙詰朝群從聞之涕泣而至謂必喪所寄矣吾母曾氏謂曰汝衆所寄吾已庋閣之所喪者皆吾物在下者也其忠直不欺汝等今食其報平生言行大概類此痛惟大父捐館于至正丙申享年八十有一起家辛勤凡一瓦之覆一壠之殖子孫得蒙業而安皆其力也遭時喪亂未有聞人顯揚潛德不肖之罪也敢以墓銘為請先生不菲陋之將山川草木與有榮焉豈徒存殁者之幸豫惟孝思之誠可矜而難拒于是序之曰君諱夢龍字儀可萬溪其號也娶朱氏男五人長曰本傳無後性傳之子漢飛芳蘅禮傳之子芳蘭伯髙伯英伯善則世傳之子也季曰泰傳亦無後四子先君相繼而逝送終惟世傳與諸孫也己亥改葬周陂乙山辛向諸孫俱克持家有立萬溪為善之報不在兹乎不在兹乎遂為之銘嶙峋武巘曾降申英靈繼踵鍾逸民塗君得之直且振篤哉務本徂隰畛詩書子姓方溱溱百年俯仰迹已陳周原契龜幽有神丘木雖拱銘則新餘慶流輝垂後人劉君士培墓志銘安成劉君士培既歿之二年禮抱宿草之悲思托之文字以抒吾情而少餘力一日其子倬謀遷其喪歸葬故鄉狀其槩來請銘嗟乎士培良友也行長命窄不可復見矣見其子戚不自勝銘奚敢辭君平生孝友出乎天性視子姓無踈戚一以慈待族姻不榛梗而寬裕與人交篤于義下至皂𨽻行道之人接之無不盡其誠中更變故遷避無常處而俱無怨惡于人腴田沃壤多以遜其鄉黨宗族而弗較惟家廟蒸嘗祖塋祭掃無逺近悉身任其責日親名師勝友明經業進士和易爽朗新學往往樂從之遊然語至大經大法又凛然不少假借嘗纂先世遺文洎諸賢所與書翰詠歌傳記銘誄等作為潛光集唯世德懿行之弗揚是愳比歲朝廷甄拔賢士守令薦君于行省以足蹇難貢免歸使出為世用膏澤有不下于民哉嗟乎杞梓連抱不生步仭之丘士培巽于人人君子必論其世也按劉氏系出西洛至宋始徙安成下村代有顯人其最著者龍雲先生諱弇登元豐進士第繼中博學宏詞科元豐中進南郊大禮賦哲宗覽之動容以為相如子雲復出除祕書正字徽宗改實録院檢討官周文忠公必大敘其文謂歐陽公以文章續韓文公正傳遂為一代儒宗繼之者龍雲劉弇也從孫澧陽史君夢驥嘉定登第授潭州安化尉有廖道人擎錢于路被劫廖角力而凶人死官不能明誣服為劫尉反其欵時西山真公德秀帥潭詳讞其刑云當時廖不敵凶人凶人殺廖矣尉得其情目為長者特薦于朝充達州教嘗捧夔檄防遏北兵招安潰卒九十六萬人為長沙宰又捧冠檄督餉運籌以雪夜擊敗敵騎之妨轉道者解黃州圍由是諸軍大振知澧州暑行營堡竟歿于王事有子曰子薦融州官滿告休得旨主管建昌仙都館歸途歷廣西北兵至境上其帥邀與同守遂留敵愾丙子北兵臨城雖衆寡不敵而猶力戰瀕危語其客曰吾頭可斷膝不可屈取袍笏書其上瘞之登城北面再拜而死嗚呼非三君子文章政事忠義烜赫于前後嗣何所儀式以進其才德士培可謂稱其後昆而竟不得展其所藴天之報施將不在其後之人乎曾祖諱科壬子兄弟四人俱領鄉荐時號一門四賢祖一雷咸淳庚午叔侄三人俱在選中人目為三傑父所學母黃氏君諱培初娶柏溪周氏歸時父命以田歲入粟八百石偕外氏後非昔君仍返其田繼娶東溪李氏俱名族俱有賢行君沒于庚申六月望前二日享年六十有七子男一人倬也女一人未笄銘曰清廟絲桐根于嶧陽瑟瓚蔥珩産乎崑岡含沖育秀尚論其世家匪積慶疇象賢只既鍾世美未究厥施命也奈何時或厄之誕晦于今斯顯其後棠溪千鈞必發于彀我銘墓隂以慰士培潛德有光賁于書臺即心處士鍾君墓志銘嗚呼即心處士古之篤行君子也今世顧欲求斯人哉惡乎得已君諱應麟字祥伯廬陵丹沙里人也其先唐太傅鍾紹京之後由贑縣徙東固東固徙永和曾大父嶽秀字桂卿宋鄉貢進士妣曾氏大父國華字君美隱德弗耀妣歐陽氏父振祖字成叔業儒通醫又由永和徙丹砂妣朱氏君其長子也聰敏有譽修然昂立如胎仙志􅋵潔髙脫略世態守先訓罔敢墜寡言笑重然諾疾惡如仇面折不少恕旁究子史博參方外時與志違乃挾醫敖逰凡求診視者不以賤貧寒暑懈于往遇窶者且助其不給弟瑞伯館授于外常歸候問怡怡如一篤訓子姓及姻子弟獲親炙者耻為浮薄鄰曲無良亦改悔其平生里有爭規以禮讓貧而好施豫屢空意泊如也至元丙子郡城內附天兵駐城外夜有以火攻者獲而僇之訊其徒云是寨兵張雲由永和而至明日胡孫總管水陸進兵聲永和之罪將屠焉陳兵王家洲瀕江居者悉奔竄君慮禍及其里獨不去正其衣冠以俟頃之虞候擁君至帳前總管謂曰秀才永和謀叛而今勦之君對曰永和善地但張雲昨偶經過非永和人也有頃邏卒復命曰永和滿地有卓槍痕迹部衆曰是豈得為善地麾兵欲渡君力爭曰張雲蹂踐其地而然耳永和無罪而塗炭生靈非天意也宜加撫諭使百姓歸德于是兵少止君自往永召其衆急出自白俄而父老率其子弟迎拜馬前具道實不知狀總管大喜執君之手與酒索謳君歌大江東去一曲盡歡罷去永和賴以免禍君力也近壤有巨蟒出沒鄰人見輒呼擊之君止之曰彼不汝害何用擊之蟒徙于君門外叢篁之下穴處焉每旦君開門誦道經蟒聞謦咳則昂首出穴相向經罷復匿如此者十餘年君歿蟒入室衆欲擊有曰君嘗戒勿擊且視之蟒繞靈柩一匝而去晚營别室于屋之東偏扁曰即心因以為號風晨月夕雅歌清嘯煉丹修藥怡神引年一日清晨冠帶而坐命家人具酒饌召親友談笑而别一語不及家事實有元大德丙午二月也娶黃氏子男三人某某某女三人孫男四人生宋淳祐甲辰九月享年六十有三卒之踰月歸葬永和石窟祖原衣冠之士會葬者數百人嗚呼若即心處士之篤行其罕見也夫時進士靜山汪會龍贊之曰鸞之翽翽見其翔不見其集驥之間間稱其德不稱其力嗚呼若人寵榮聲利不茍屈兮乘彼清風歸去之倐歘兮其言已足徴矣距今七十七年其孫煥以里之老生姚安仲狀來請銘某以久逺故辭之辭之而弗能絶因念杜工部子美葬未有銘四十餘年之餘其孫嗣業始得微之元才子文其墓禮銘處士愧元多矣歷年多而請益堅煥之志獨不賢于嗣業也耶傳曰其先祖有善而不知不明也知而不以傳不仁也煥乎可免矣銘曰于嗟乎君九京不作一視同仁懇求民瘼草昧之初濫刑者多力言釋疑帥用止戈種德既深化及蟒虺此而感恩鱷宜可徙于嗟已矣曠無斯人斯人不作漓俗曷淳來者聞風興仁歸厚墓久銘新卜爾有後蕭珠秀才墓志銘國録蕭君子所視豫祭珠兒文讀之悲不自勝蓋嘗傷于虎者也既而欲銘其墓豫不忍辭抑以悼斯子受命之不長慰其親繫念之無已也銘曰生蕭珠川育秀資岐嶷異稟受歲十一外傅就事親孝于弟友經通析文節族踰四稔學益究祖捐館襟領袖字伯璣居客右蘄深造乃弗夀甫弱冠夭莫救玉損瑜蘭隕茂服報重宛在疚厥配曾未嗣後閟新塘安無咎魂兮歸骨肉又徴我銘垂永久樂安典史楊君墓志銘嗚呼近年來親友日益淪謝聞之心折骨驚况忍銘吾子牧哉子牧姓楊氏其先蜀人漢太尉震三公十有一相皆𢎞農人廣明之亂國子祭酒膳從駕西幸孫湖州刺史鎰始家眉州七世孫公畿為南安府尹因居廬陵遂為南祖語見陳公黃裳志南安墓文南安有子曰壯行字伯學實為吾宗王潮州孟孫之姪壻衡州判府致仕者也昌文貫道彬文性道俱王氏出也王氏有從歸之壤千畝故其子伯仲涉秋必吾里之留于豫好則兄弟情則契友以斯文而尤厚也貫道試藝不利晚以父廕授崇仁尉而以科目望其子故子牧勤勵于學雍雍濟濟誠階庭之秀也已而屢丁憂禍家事異前學術漸廢虞文靖公以書勉之曰出蜀萬里詩書門户之托不輕惟節哀自強以副親友故人之望蓋虞楊世姻故也又後之十數年颷回霧塞八表塵昏俯就太和邑幕干升斗之祿以給其家內附初仍辟為撫州樂安縣典史輔政不虐撫民有恩既而邑有負芻之難官吏被僇郭外之民爭護子牧以家匿深谷幸免于禍遂寓金溪謀歸廬陵以幼子馨新在曾氏甥館顧復未忍違俾仲子會奉母先歸理舊業乃拳拳以書屬豫求序其潛虛集明年冬會復往迎養闕焉離索已久企豫望之謂不日握手晤言傾竭底裏孰知會竟負骨以歸哀哉斯人不可復見矣既往哭之會即以表墓為請逮將葬請益勤謂不得銘無以紓其不孝之罪蓋豫于子牧親且故雖不忍銘可終無銘耶銘曰印綬纍纍尚論其世察其所安一鄉善士祿負其能時乖其志得年令終六十有四壼範孔賢厥配彭氏四丈夫子曾會晉馨或夭或遙魂魄曷親宗祧時享惟會是承淳溪沙洲山秀水明安靈于兹尚福後昆蕭兩峯墓志銘某年甲子春姻友蕭尚質述其乃父之行而來請銘泣而言曰先君沒踰年未有片言以掩諸幽不子之罪其可逭乎先生當代之能文者言足以取信于人文足以垂示于後敢請一言以昭潛德庶先君之歿而名永長存也豫哀其言目其狀乃知其上世有為長沙令者始祖學以馬殷之亂遂徙居于禾州之九嶺于君十一世矣君諱崇勳字光謙號兩峯曾祖諱涇祖諱景昌父諱懋俱隱而弗仕母曾氏君性聰慧重厚寡言不事家人生産好讀書習舉子業嘗于棘圍未遂其意而歸退處間軒討論墳典終日靜坐如泥塑人動止必守禮法聖朝以來常被徴辟以年老辭教授于鄉語人以善暮年尤用意于詩取中峯所賦梅韻和為百篇以示子弟御史易君卜所求而誦之益加稱羡且令鋟梓以傳于後歲丙辰四明烏斯道宰永新舉行鄉飲酒禮延處賔席娶詹氏有婦道先君二十九年而卒葬于蒻坑蛇形君生于至元庚戌正月初三日歿于闕癸亥二月初九日享年七十有四子男一人肇基即尚質也女四人俱適人孫男二人談仲謹仲卜葬于本里之下寺坑嗚呼蕭氏之先樂于為善故其子孫久而弗替是非積善之家而有餘慶者乎且君以孝友聞于鄊信實稱于時睦宗洽鄰賙窮恤匱宜可銘也銘曰有學有才有年有德聞于鄉邦雖埋不沒我銘其阡來者是覩為善于家以紹厥祖孫興祥墓磚銘名則興祥質則敦龎斃于豆瘡家人所傷是為廬陵進士王禮之孫殤生癸亥歿甲子既與其生曷促以死于嗟乎彼蒼胡摶戲若此祼葬衢路之曲魂歸來兮伊邇麟原後集卷八

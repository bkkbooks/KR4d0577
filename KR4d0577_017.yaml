body:
  text: 麟原後集卷五元王禮撰記石湖鄉校記石湖鄉校曲山巽行藏修遊息之所也其在宋曾大父仁叟為胄監弟子員厥聞四馳大父宏逺克世儒業欲以所居為鄊校聚俊秀以講先王之道御史蕭公泰登為書鄉校二大字養吾劉先生記之而志竟未就世父夀春思繼成之以仁存銘其堂巽行之言曰學莫貴乎得其地李濬之之白鹿洞范文正之長白山山川之秀皆有助於進修於是即其居之北山行五六里得石湖清幽之勝而卜築焉孰堂門序秩秩修潔面端石之峰偃蹇盤礴鑿其麓為沼泓澄鏡開亭其上曰臨清峰之後為芻豢之谷茂草緑縟濈濈濕濕各有以適其性由沼上而東入清涼之巷二百餘步石湖在焉繞堤雜植􅀈栁依約如畫栁隂圉圉洋洋衝岸曳藻或隊而翔或逸而散又折而後循循以升曰西成之坡穫石離立隱隱如聞挃挃音鄰曲淳朴有幽人之風稍南直堂後為豁眸之巘數椽翼如其顛可以娛客平疇低岫煙雲相滋縈清繚白環列几席之下轉而西步喬松之隂坐賢樂軒則美茹之圃茂蔚其側山林之清籟常聞士商之屐齒罕至藏修於其中遊息於其外所以成德性而暢文藝者不既多乎於是雲陽希蘧翁聞而悅之題其顔曰石湖鄉校既而來學者屨常滿而巽行之學亦日進而月殊矣豫觀蕭氏之鄊校繼志乎數世始得勝而成之則君子之欲化其鄊成其俗者豈可責效於暫而不要其成於久哉豫於鄊校之成嘆其數世之仁而冀石湖之勝有益於學者尚百世之逺也已是為記克復齋記桐廬董君希顔居鄰釣臺攬山川之奇勝慕昔賢之髙風人品固可知也而猶日以進修為事間語豫曰鄉也嘗闢齋於廬之東字之曰克復書䇿琴瑟秩乎几案芝蘭竹石森乎階除誠足以養性怡神而未有文辭以昭名齋之義非缺歟子為我記之豫復之曰希顔儒者也處而所與遊者皆賢師良友出而所與交者皆名公碩卿仁義道德之懿孝弟忠信之實有之已而施於政矣克復何待於豫言然嘗聞之克復非有先後之殊已才克禮即復其機間不容髮顧力行何如耳况正誼不謀利明道不計功即克復之事而董氏家法也歸而求之有餘師何待於外希顔喜且謝曰微子之言吾忘祖訓矣請筆之庶常目在不忘也桐廬有董司徒廟碑載系出漢仲舒希顔豈其裔耶希顔名仁而克復名其齋蓋欲以第一等事自任云種花軒記吾廬陵在江西號劇縣其壤地廣以袤其賦稅浩以穰其詞訟煩以夥而豐實不稱焉於今殆且甚矣土田多荒瘠而租益重裕者不一二而窶者常千百故斂不任峻治不任苛又附郭供億居先恤之則安不恤則頑視他邑為難治洪武七年漕運判官王君以材敏出長斯邑本之仁厚以摩撫之訪其土俗而詳核之政昉二年逺邇和洽廨宇常治也猶以民力罷困後之安其阤陋於是即其西偏為四楹之軒以肅賓客而字之曰種花蓋取潘嶽河陽意也既成屬邑士王某記之某復於君曰傳有之人道敏政地道敏樹均之易易也且獨不見業種花者之術乎識其隂陽而移之順其性也防其風雪而待之固其本也秋陽之烈蔽之不使枯其幹春雨之淫疏之不使淹其根糞之得其宜培之適其中溉以滋其莖鉏以薅其蔓則其生成長茂可立待也而莫切於去其蠧焉蠧傷其生枝葉必悴吾雖愛惜之勤亦何益矣草木無情猶必盡其道以養之况吾之赤子可使有不遂於吾政者乎某嘗行夫田畝蹊路間聞畷夫野老之語未嘗不感邑長豈弟之澤茍有傷其生者咨訪以察之勇決以去之則他日生意發育散於民間在門牆為桃李在中阿為菁莪在南山北山為臺萊藹然一邑之間蔚乎四郊之外豈特是軒之前丈尺之地哉君嘆曰子之言微而婉托物以喻政也請書於是軒以為座右規君字道亨識趣髙逺蓋簮纓忠義之後云藏春軒記古筠在豫章上遊山水幽絶其俗儉而靜樂獨而息交豫嘗遊焉於今三十年矣客有談楊氏藏春軒而請記其勝安得不使豫惘然舊遊之思乎余雖未迹是軒意必繚以周垣藩以叢篠得其門者則覩夫白白紅紅菁菁郁郁生意不斷嘉木交縈樂意相關幽禽對語暖霧融融遊絲冉冉必駭然曰春在是矣未得其門者不有牆厚盈咫如隔蓬瀛之感乎不有蛺蝶紛紛春在鄰家之慕乎若然司馬獨樂諒無以過之雖然豫聞藏春於一隅者士大夫間居之所尚獨善者也推而放之四海者大丈夫得志之所為兼善者也楊氏之英有從事大藩將命無違他日皆將有民社之寄茍思於時為春則於人為仁以仁存心施於有政豈不大有過人者哉書曰斂時五福用敷錫厥庶民雖君人者之事而理無上下其揆一也姑以斯語記於藏春暮年倘有過筠之日尚覽其勝而詠之畦樂記凡物茍可以寓吾意者皆有可樂而往往遊於物之外者得之不能遊於物之外者物且有以纍之人惡能有其樂耶吾郡王君與齡僑於豫章東湖之上有年數矣近得地數畝在闤闠中畦之以萟蘭菊蔬果日薅治而滋灌之於是生意蔚乎其前乃築室臨之字之曰畦樂或曰王君之涉是畦也或荷鉏焉或抱甕焉吾見其弊弊焉勞其身而顧曰畦樂何居豫應之曰豫於是畦喜王君知止足之分矣惟其知止足之分故因時於天求利於地以食於人者有窮而自食其力者無愧無愧斯無咎豈不休休然有可樂哉心既樂惡知身之勞乎蓋樂在外而不在物也且子不見昔之貴擬金張者乎第宅之雄冠蓋之盛宴遊之娛聲色之奉亦可樂矣而常戚戚不愈者物之可以足其欲者交戰乎中而不能超乎其外使知止足之分外物豈有以纍之哉昔人謂陋巷自有其樂而樂不在於簞瓢豫亦謂與齡自有其樂而樂不在於畦特因畦以寓吾意焉耳雖然東湖之上徐孺子髙風蘇雲卿雅操躬耕樂志千載如一日也與齡得無有歆動之思乎與齡性和易顔如渥丹樂意滿容良友也宜為記上猶縣重修譙樓記上猶𨽻南安界於湘廣萬山之間時清則俗淳時異則易以偷已然之迹也縣治舊有麗譙迫於山勢近在眉睫加之下流喧豗如爭訟聲致使長民者政化不通民多病之元季燬於兵燹惟治事之廳僅存於今二紀矣內附初任官惟賢次第修復洪武六年夏邑長余原溥二令熊文英典史秦文升滿嵗去職惟君獨任邑事三月之間百廢具興一日屬其耆老而告之曰時茍清矣邑茍完矣更漏猶托廡下於政有缺有能義助木石者乎咸曰唯唯君知民之樂從也營度於心計謀於衆相其風氣蔽虧脫隘就爽臨於通衢不旬日而麗譙以成於是山勢之擁匝者若退水聲之嘈雜者不聞精神疏通襟抱開豁四方來觀莫不欣慕而言曰前六十年乙卯汴梁楊君實新縣治後六十年乙卯平陽皇甫君又新麗譙二賢前所希有宜求文士以詔後人邑之從事耆老合謀曰宜介前江東帥幕楊君璟卿請記刻其上按顔師古於漢書注譙門謂門上為髙樓以望亦呼為巢所謂巢車者於兵車之上為樓以望敵譙巢聲近本一物也上猶邑於遐荒斯樓不可後繼今以往過其邑者聞更鼓分明有不知其善政者乎又喜邑民淳厚樂於從令相與以有成也故不辭而樂書之大隱樓記郡城南行三里許有起傑然閎麗之樓者問誰歟羅其姓宗信其字也一日過之宗信與豫登樓縱觀西眺古寺杜司戶審言之祠在焉即詩人堂也今長岡斷隴曼衍相屬令人凄其懷古東俯章貢沄沄順流嶺海財貨之轉輸悉此焉出古今遷客騷人若蘇若黃風帆浪舶南去北來可悲可喜者何限憑闌徙倚於此信可脫凡濁而蕩心目也既而謂豫曰斯樓之成進士陳君士𢎞字之曰大隱翰林承旨宋公景濓為篆其顔或謂其在唐肆之區康衢之側非有丹崖翠壁茂林幽壑之勝而加以隱名何居愧未有以對也幸先生適來先生於我有故留為道其可不可也豫曰語有之小隱山林大隱朝市此言何謂也心與迹之辨也自其迹觀之世之厭薄名利遁於巖穴影嚮昧昧惟恐入山不深入林不密者隱也而或借終南為捷徑致北山之移文則其心之隱未可知也其小之也固宜自其心而觀之固有身居鸞臺鳳閣而常懷枕流潄石之思職在獻納論思而時有耕雲釣瀨之想逮夫淵明之戀柴桑六一之懷潁水浮雲富貴世俗泊如類迹未隱而心先之若人也不待棲遲岩谷之間而已超乎方之外矣其為隱也不亦大乎今宗信雖宅於市恂恂然退藏斯樓若無若虛不求聞於人人亦鮮知之者謂其缺山泉之樂則蘭盆蒲石之列几席非匡廬瀑布之泓澄者乎蒼松翠竹之在圖障非會稽山隂之美茂者乎表以大隱孰曰不宜宗信謝曰聞先生崇論昭若發矇矣請書於壁以示來者遂為記歐陽氏永思堂記歐陽文忠公天下之士也其文天下之文也在當時曽子固已謂公之賢韓子殁數百年而始有之今同遊之賓客尚未知公之難遇也後百千年有慕公之為人思見之而有不可及之嘆然後知公之難遇也去今二百餘年矣天下學者孰有不思公者哉天下之人猶思之况吾廬陵鄊國之人哉鄉國之人猶思之况夫歐陽同族之子孫哉同族之子孫而不公思則不惟有愧於鄊國之人且有愧於天下之人矣吉文建寅公之族子也盛年鋭氣謂功業可指取有留京師十餘年一命未足償其志而崎嶇兵亂以老比年還鄊作堂以奉先中祠文忠而諸祖列祀其次字之曰永思徴記於豫建寅所以望其子孫者可謂至矣雖然建寅望其子孫以永思者豈曰徒思也哉後人思公以其賢也思其賢必有企齊之心而後可非思其笑語嗜樂而已也豫之斯語豈特蘄夫歐陽之子孫且有蘄於廬陵之學者使歐陽子孫與廬陵學者自修之篤日思齊而內省焉則無愧於公無愧於天下矣豫亦廬陵人也當因以自警云耕讀齋記楓墅違棟溪五里王氏在焉其先棄囂隘而即曠夷離棟溪有年數矣其彥有曰與定美才逺識戡難禦侮與其伯氏弛張相濟逮鄊里綏靖即理舊址堂構翬飛逺邇稱美嘗語豫曰泰也曩於居南别業築室三間字之曰耕讀幽林在南沃壤在側書䇿耒耜雜然前陳力作而倦則入息披吟田夫野老幽人處士過從論説以為常油油然不知天之髙地之下日月之代明寒暑之推遷豫樂也甫及三年廢於一炬今雖影沒而朝耕暮讀之意嘗往來於懷終當即其舊而新是謀子為我記之豫復之曰帝舜命官既以黎民阻飢命棄播百榖即以五品不遜命契敷教作司徒詩人之詠后稷粒民率育之後必美其陳常於時夏蓋養之與教二者不可偏廢不先於耕則救死恐不贍奚暇治禮義不繼以讀則飽食暖衣逸居無教近於禽獸人事之至切至大孰有先於斯二者哉與定斯舉甚韙宜薦成之他日豈徒一家遵之將一鄊慕之由近而逺雖天下之大有不聞風而興務農力學以致隆平之治者乎與定謝曰命之矣請筆於齋以為訓故為記之而復詠以詩詩曰維南有齋其林幽幽離塵逺嚻耕讀以休其耕維何播種南畝時及力齊荼蓼斯朽奄觀載穫如坻如京以賓以祀百禮告成其讀維何有經有史其善伊儀其惡伊恥變化涵養天秩有常君子之歸邦家之光嗟豫王氏系自長者仁厚傳心晝夜不舍曰農曰學聖謨匪今農惰學倦亦獨何心耕勤讀敏厥效伊邇我作戒詩詒爾孫子知止堂記鵬舉吾友也姓張氏其先真定人少之時與吾弟子周同師鄊先生馮奬翁於泮宮既長即推擇為吏有能聲逮丁中憲之治廬陵也君昉得行志盡其才蓋丁公以風憲耆德選為監郡遭時多艱人少可其意者君以練達明敏佐之信任之専雖齊桓之於仲父不是過也既而丁公改除從嶺海取道入京君與偕行以薦積為廣東帥府都事元祚既革即慨然曰世事若此其可以止乎廬陵吾生長之地而忠節之邦也吾其歸老焉遂挈妻孥以還喜城西蕭氏之基頗有幽趣遂請於官而築室焉繚以周垣雜植竹木椒果池可漁圃可蔬樵牧不待外求豫嘗過而悅之君指其堂示豫曰吾以知止字之矣子為我一言記之嗟乎豫將何言哉猶龍子有云知止所以不殆又曰知足不辱知止不殆可以長久而舉世汲汲於富貴之場者莫之悟鵬舉之見超乎斯世之上矣豫復何言哉且獨不見昔之居此者乎其冠蓋赫奕粉黛靚麗爵品之榮貨産之富殆金張比肩崇愷並駕也而今安在哉使其知止足之分君惡得而有之甚愛必大費多藏必厚亡不易之論也至若孔門知止之説鵬舉與吾弟昔也聞之鄊先生詳矣何待豫言是為記竹所記吾王氏之彥有曰伯輝世居流江流江廬陵之上遊也溪山相繆蛟蟠鵠峙縈青繚白鬱為勝區伯輝即其居旁之隙地種竹千枝猗猗翛翛俯而臨之如玻璃池仰而觀之如翡翠林丹鳳望實而忘飢蒼龍顧影而失色縱酒於中則清風徐來題詩其上則飛塵不涴其孰賓蕭子所氏日造而悅之曰美哉竹之所也既而謂豫曰先生以文學知於時驅馳掄材於數千里之外而同里同姓有若伯輝之謙重清整又與其尊父寧都守相伯仲而竹所一室未聞片言記之豈泄邇忘逺之懼也乎曰既聞命矣何愛於言竹所雖王氏故事然昔人取之以其德也其質直直則不回君子之公正不阿似之其節徑徑則不屈君子之執理不撓似之其中虛虛則容有謙以受益之德焉其筠葉貫四時不易有窮達不變之操焉君子之樂於竹也是之取耳以竹為所必其德無不相似一不類則虛其所矣雖然子所留國學三年閲天下之文多矣倘以豫言不戾於古而有益於人歸以視伯輝何如也是為記芳庭記諛非美俗也而有相尊相厚之意焉故聞諛詞則悅不諛則扞格而難入人之交於人也亦何樂乎扞格難入之意哉故其稱人之字也尊之則加堂焉非堂則軒矣厚之則加庭焉非庭則齋矣或以溪谷或山或洲意猶是也夫然則聞者欣然以喜曰是尊我也是厚我也烏可與之疏且外哉嗟乎習俗移人雖賢不免况其下者乎姪孫子芳好事者多稱之以芳庭或求聞人書二大字以遺之子芳告於宗之丈人曰芳也何德得此於人人哉不表之楣間則負其相尊相厚之情將滋蘭樹蕙蒔杜種菊於前榮以無愧斯名可乎丈人將順其美則朂之曰而奚以多事為哉使三閭大夫盡求䕷蕪揭車之類恆藝之將不勝其勞矣彼求衆芳之所在者意有屬也惡用根荄枝葉之類求乎哉繼今而後思邇名賢使子弟之佳如芝蘭玉樹生於庭階則芳在是矣且而獨不聞吾家種槐之故乎其芳與德俱萌必封殖而後成則其隂滿庭宜矣傳曰栽者培之子芳其勉焉豫聞君子所以貴其名號者誠以其賢否醜美必常與名字相上下而始終夫茍失其所以為芳則斯庭無君子之迹矣可不懼哉豫言如此不知者以為習諛也知之者以為非諛而規也用記於壁樂間亭記則徽舊居郡城辟地始家今之杜方二十年前豫嘗訪焉時得樂間二大字揭楣間自謂樂間叟求豫記文豫謂能間固難間而能樂又難則徽亦冀自是少樂於間矣孰知數年之後運化不齊長子死焉其季庭桂入吏部為書佐則徽隻身僕僕塵埃中曰公曰私靡不躬應求須臾暇且不可得况望長享此間乎既而庭桂由書佐為奏差出入乎公卿之門馳騖於淮泗之上鄉里慕之不弛其舊歡僮僕聞之復起其新敬俯仰今昔有可慨矣去冬庭桂自京歸過豫於溪上入郡因往問焉而新亭適成朴素爽朗有若蓬者焉有若舫者焉庭桂指以語豫曰此樂間亭也昔得文於先生今逸矣願重記之留豫從容竟日觀其圖籍在左壺奕在右杖屨或來於近局衣冠時集於名流廪宇連延騶從敏給即今日意象推之則徽誠可樂其間矣追惟往作記時於今二十餘載一清間之福則徽屢得屢失而今遂其志則人之能得間者非天幸耶世之汲汲於富貴之場日暮途逺倒行逆施不知安間之可樂者其為人何如也庭桂字仲芳與豫同姓云生存堂記豫友劉善自樂慨念喪亂以來二親雖存荐歷兵燹無一瓦之覆一壠之殖以為生既而相繼淪亡送死未盡於禮今幸時清屋廬粗可居田疇粗可養而往而不可還者親也能無䀌然於中乎於是字其奉親之堂曰生存庶幾事死亡如生存亦志遺憾云爾既求永新烏侯繼善篆其顔復欲豫有以記之豫謂是心也人子不死其親之良心也事死如生事亡如存豈獨蒸嘗忌日思慕為然哉一念不忘其親則所以體其心守其枝者無不至矣親雖云歿而吾心之親未殁其音容顯顯陟降庭止吾可以邪放不檢虧體辱身以為父母戮乎吾可不勉強學問進德修業揚名以顯父母乎死者復生生者不愧則庶乎能子矣將不為善人君子之歸乎嗟夫世道日趨於薄有不忍言者矣鄊之人有視死其親若去贅疣然未踰旬月更張百度以從已之欲由今而觀非斯堂之罪人也哉雖然名之必可言也言之必可行也自樂力行之以無負名堂之意至若劉氏世系之詳則在老生蕭會心之記不薦書麟原後集卷五

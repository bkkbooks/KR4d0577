body:
  text: 麟原前集卷一元王禮撰碑贑州路總管府判官王侯紀勛碑今大郡古侯國也而政令之設施財賦之出納軍民之統治尤為繁浩必長克長二克二同德協共臂指同運則事無不舉不然雖平世不能以治况搶攘亡紀之日哉贑之政可睹矣兵部尚書全公以選牧兹郡文武並用聲威赫然越二年為至正壬辰蔡穎流毒江右扼于吉安間道由撫以窺贑四月據寧都于是府判官奉議王侯分兵討之癸亥戰猫兒石得間諜戮之甲子戰小庒冦退乙丑至葛坳三捷毁其茇舍奪其馬丙寅戰印山寇奔潰已巳駐兵女冠三方並進七戰大捷是日復寧都獲首賊范某及徒七十餘人得所奪有司銅印一十有三萬户金虎符一日遣部將跡殘凶掠鬼嶺越果子園斬首數百級擒僞元帥劉萬户賴盡焚其巢一十有六乃命增舊城三尺陂萬斛里以灌濠外置鹿角柵以備設護民巡檢募集義民城內巡防者千二百人城外守望者二千四百人節鐘鼓以知緩急未幾冦再至再衄州民始安十一月又檄侯分府事于興國既至縣即調兵巡捕與冦逆于方石生擒二百人斬首百六十有竒㲻死者不可勝計始葺城壁象十二次先是冦據方大官兵退次遂用郭鼎計分兵進屯寶石逼方大覘冦實虛卒破之招懷脅從失業者五百餘户稍暇建尊經閣以誘士類曰教不可廢也明年春㑹昌失虞復分治雩都以援之廣設義兵千户所以聨其民習武以備用置斜站以報警棋布三堡于近郊為外防建鐘樓縣治之左以明禁令矚奸慝二月復㑹昌三月援瑞金懷徠石城歸正者十五寨調兵餉士賚勤罰愆書牒坌集辰至已决業業然如奉漏巵沃焦釡十一月戊辰賊數千自循梅來攻雩都侯躬率衆扞城上發矢如雨殪其十之一明日寇益張編竹箕駢負以前矢石不得入于是冶銅液以灼之遂大潰初雩都未有城侯命屬官毛榮胡思恭吳溥龔昂廖謙楊貴德先後督成之不五月而竣事髙厚為尺十有二周環里計者五為門凡六各為樓繚以甌脫六十有四于時茍安之民睊睊若可緩者至是賊退乃環拜曰再生我者侯也新城之力也不然吾屬無死所矣既而竊相告語侯頻年勞身竭思使我民得以飲食事育繄侯之德甚大况雩學之新侯功為多而古者議政必公于鄉校若琢詞其中足繫無窮之思且庶有勸于後也乎侯聞之曰無以為也討賊吾職所當為幸而成功者聖天子其仁如天之福也兵部公卧護坐籌之勝算也况寧都之役時則有若府史危誠孚方泰亨千户法昌贑縣主簿巴延徹爾鄭秉忠道拉實興國之役時則有若府知事程瑞參謀郭鼎攝邑事孔雀努林昶雩都之役時則有若府史王尚文徐行攝邑事縣丞和卓典史胡思恭務使龔昂教諭吳溥等皆有折衝之勞供給先後之助焉吾何力之有衆皆再拜稱歎然卒以為不可已乃竊具功狀以文屬禮禮惟贑以伉健之俗雖治世難盡繩以法乃不敢乘昏濁自肆俯首聽約束效智力非兵部公文武威明臨照于上非侯經營于外以撫之未易臻此又嘗經其戰伐之地睹山川險壯聞父老道侯行事感其志節故不辭而樂書之侯名榮忠嶽州人繫以詩曰帝式萬國深仁久安蠢爾蔡穎猘狺其間民不知兵忘戰忘守言言贑城如虎斯吼長有大賢二克同心匪我王侯提師孰任閩險粵巖倚聲藉勢道逺應遲分府往治既往治之小大是倚爰誓旅徒勿怖勿疑維此羣醜乘時披猖侵掠我土誘奸脅良併力齊心我榮彼辱良者致歸奸者同戮汝搴汝旗汝伐汝鼓賞功聫曹罰過逮伍軍士私語凡言必酬各盡乃力毋俾悔尤斾旌揚揚㦸矛耀光竹矢檿弓洵直且强我師震之谷響川應執訊凱還風息塵靜逮我閒暇修我陴墉浚我濠池曷售其凶居安懷危頃刻靡懈衆人嬉嬉視我反怪遷治無常念亂若一弗問弗事民誰與恤子孝臣忠雅言所存行義或虧懼侯有聞山成其髙水就其深為民之氐為國之琛我作銘詩宜志宜史逹于帝聰用錫蕃祉贑州重修孔子廟碑贑通守楊侯稱叙興學本末遣文學金友德過廬陵以書屬豫曰贑學創于宋慶厯而再造于紹興宏麗甲於江右元元貞丙申復改作之癸未魯侯至道一新舊觀于是草有五年矣時艱事殊壞于兵亂丙午夏令中書右司郎中張公民瞻來參贑衛軍事始至謁先聖先師于廟見其頽弊弗支顧瞻太息慨然思以為已任明年四月即捐已俸鳩工庀徒由禮殿廊廡暨奎文閣撤腐易新蓋甃堊丹外之靈星泮池垣墉橋道內之冕服貌像㡩幕秩封靡不完美自先聖配享從祀而下坐列有序五月已卯始事踰月丁未卒工上不勤官下不動民視平時糜廩粟帑財以為文具者相絶矧今贍學之糧移資軍餉非公篤尚儒術營度有方夙夜匪懈曷克臻此䝉等免于勞勩而受其成思琢石視後子其為吾書之余惟古今治亂繫乎風俗醇漓風俗醇漓繫乎學校興廢方其治運休明家給人足固以學校為首政况乎師旅喪亂之餘綱淪法斁之日興學校以正人心豈非先務之急哉公之是役可謂知治本矣抑興學校守令責也公官在戎閫以武備為務茍兵戢民安即不曠其職乃能汲汲及此則材識過人逺矣使贑之士來遊來歌懙懙濟濟講遺經以致其知遵聖訓而敏于行興讓興仁為鄒為魯俗無伉健以不負興國美意實自兹始禮儒士也儒宫之成職所當書况請之勤勤又烏得以固陋辭遂為志之而系以詩詩曰於穆夫子師表萬世天地與參四時與契載瞻晬容有肅其地召茇猶思胡此弗治既曰治之曷又戾之侃侃士子行已是思四端五典大道孔夷曰權曰數冒邪抵巇興學之初崇美廟貌成德逹材聿觀其效朂哉士子知至思行步超賢聖見于墻羮章貢沄沄空同鬱鬱倬彼儒宫埀教罔極麟原前集卷一

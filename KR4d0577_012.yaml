body:
  text: 麟原前集巻十二元王禮撰哀辭王公敏哀辭有序公敏諱穎梅崗王氏之佳子弟也生於永和其父予隠之貳館在焉㓜聰慧讀書輙能記憶稍長下筆清麗可愛愈損抑期進年踰弱冠念山東多魚鹽漆絲之利遂求陶朱積著之理端木廢舉之術因賦逺逰以觀鄒魯聖賢之髙蹤燕趙豪杰之遺烈其志誠可尚也既而白雲在望定省情深方樂綵衣之娛俄有玉樓之召父子天性予隠其能已於摧慟之情乎雖然公敏有弟足以終其養有後足以嗣其傳可無憾也况修短隨化終期於盡堂上之戚亦宜釋矣士友謂古之順於父母足以解人子之憂則稱揚其子弟之美以傳之後或亦足以解嚴君之憂遂相率文翰以哀之禮又烏得不有以慰其親之心乎辭曰璜沉珮委兮瑤氣揜而無光蕙枯蘭殞兮誰與惜此幽芳所謂伊人兮階庭之良倐幽明其相繼兮行道猶為之慘傷親之望子兮其意孔長撫重服之逆就兮增老淚之浪浪明昔喪於西河兮或者謂其不眀嗟彭顔之前賦兮又何怨乎彼蒼衆萬之生不可齊兮終同盡而茫茫吾聞目不瞑於卒養兮夫豈無乎季方存而親者靡滯繫於懷兮已逝亦隨化而飄揚冀解弢而墮袟兮托遺響於九章髙州通守馮公哀辭嗚呼馮公之没也禮既哭之忽忽累日目忘所視手忘所持足忘所適非獨予思之切也士類慨鄉國之無人其眷眷不忘猶余也九原不可作百身不可贖則欲論次其平生庶㡬來者足徴每欲援筆輙懷抱作惡欷歔黯然以止噫可終無言而已耶公詠新人也父子自為師友延祐科興治春秋破去百家傳註發大義數十逆素王之志於千載之後庚申鄉試考官以義與胡氏小異將斥之圭齋歐陽公得所賦科斗文字以蟾兎問荅大驚賞曰大華峯尖忽見秋隼未足以喻竒俊以示麟洲龍公公時主試亦嘆曰空中起五鳯樓若天造神設竒哉亟擢之由是名動逺近試禮部又以不專主胡傳斥癸亥再貢亦必用己意叅先儒㑹試陽燧賦尤冠倫凡為文耻同衆見雖肯綮盤錯皆委折條達無難言者既及第丞漢陽遇事視理曲直雖權要不避老姦宿黠側目之大府知其才委同岳陽興國分修省署公親領官直與物對給不勞一民視二郡任富民司出納者費半而功倍遷鄂省照磨往海北與二司議鹽茶法衆皆悦服布赦恩於澧鼎辰沅靖思播所至無留滯悉却餽贐未一月而返帥臣敬禮稱嘆曰使乎使乎可謂不辱君命矣鼎有猾吏姊歸巨商夫死無嗣吏有其貲財十萬歴十三年冬廵率指為外帑省委督郡官遂直其事瘦其人雖積金不顧尹上猶有鄭廵檢龍泉尉者皆以偽楮事誣人枝開蔓引領吏卒近百人出入數郡民竄田蕪綿數十年不絶公涖政七日盡滌除之後以骯髒不獲乎上因事白而名益彰提學湖廣士恥名浮貳守高凉猺不豪植盖仁而不為姑息義而不為矯激故與人言必信謀必忠樂善疾惡是是非非直言不為吐茹詐者險者不敢迹公庭而疏通坦夷之士日宻姪甥之無怙恃者育而昏之所識窮乏者必有拯焉水忩劉先生著通鑑綱目書法公携詣京師而表章之遂大行於世嗚呼公之文學政事行義人所共知而今猶縷縷及此者感知己之難遇而無所寄其情也猶記兵火之後公還新居齋閣顯敞園池映帯禽魚飛躍顧而樂之謂禮曰來者不可知故舊懸隔在亡無誰語者幸吾廬尚存子時來談笑其中以慰衰老又嘗語其子曰周仲衡王子尚熊伯頴三人吾畏友也每聼其文令人豁然以喜汝善事之嗟乎自今以往善焉而無與識也疑焉而無與質也言何由而知其要徳何由而知其奥也有過西州門之慟有經眠食地之感而已也公諱翼翁字子羽生壬辰年六十三與兄子將先生頡頏科第叅政許公有壬字其堂曰䨇桂云余序其概而哀之以詞詞曰嗟至士之徂謝兮超虚躡空挟飛仙而為曹生無所累其𠂻兮返太初以逰遨風為車霞為盖兮芙容之冠雲錦之袍閔下土之難平兮叩帝閽而永號豺虎鋸牙啄善人兮冥冥磔之焉所逃顧亂濁而鮮歡兮靈剡剡乎崑崙之髙忱逍遙以自適兮我何為乎心怛忉啟後姪哀辭噫嘻慘哉秀而不實宣父深嘆予於啟後姪惡乎不為之䀌傷也啟後年甫弱冠為學知方容止辭氣雍容和緩藹然王謝家意象嘗謂家庭似此雖多奚厭三年三月以毒証殞於蕭氏之館衰老歸自郡城惟見新塚皋如惡乎不為䀌傷也耶既往臨之日邁月征猶顯顯心目不能自釋遂為詞以哀之庶以慰斯子於九京亦以慰其親桑榆之日也詞曰朝暾烜其離海兮隂霾勃勃以翳之嘉木蓊其增楙兮風挟雹以瘁之修短數固有定兮予遐欷歔而不自禁磨牙吮血聞於脱命之叟兮宜驚骨而折心地下塤箎咿嚘兮怜生者之影单莫之為而為者天兮亦何用此控摶知子目不瞑於仰事兮亦懸情乎破鏡之分牽衣之㓜幸堂上身其康强兮獨者自古而多夀反招魂反招魂為羅浮翁作也翁盛年歩蟾宫有子尚觀亦克踵武晚為諸侯賔客白髭紅頬陶然自適處亂日如平世不以毫髪世故經心吾意或者其散仙也一日無病而逝婣舊悲其永隔或謌招魂以歸之王禮聞而非之曰真誥言古聖賢忠義忼慨之士無不列天上官府安知翁不挟飛仙往來於無為之表而以超出險濁之世為快者乎嗟咨涕洟以招之滑其魂矣非出世見也於是為反招魂之詞詞曰君毋招魂天地之性人為貴些氣凝而來渙則鋭些星辰河嶽幽明更逓些昔歩蟾宫出凡類些嫦娥望予撰轡折夫丹桂些㳺戲人間嵗復嵗些下方不可以乆住日興替些人化為獸龍變蝘蜓些朽骨如山蟻穴蔓縈些紫騮文韉粉黛揚聲些兼鱉臑若蔗漿冽馨些困苦乞奴饑鬼伶俜些華屋層臺飾帷束組些沉薰蘭膏不知寒暑些立人簷户卒無抔土些白刄差差弱食强取些負乘揚揚冠履易所些君毋招魂翁豈能與並處些網罟日宻物耗民悴些狐嘯狸號䧟穽滿地些君毋招魂翁何樂乎斯際些嗟今之人瘠世肥予些不有陽譴必隂誅些誰如是翁經訓菑畬些苦淡如甘榘不踰些君子之澤有可怜些似而不似猶斬其傳些誰如是翁有子有孫些子孫既多又賢且能些君毋招魂翁死猶存些一屈一伸知去來些生全其靈逝也必有所為些蓬瀛清安何不可歸些回視下界有足悲些于嗟魂兮四方上下胡為乎招之些馮虚御空升降飛揚些無天可階無施可行些自然之門無為之鄉些返吾太初大且剛些從天不老凋三光些於嗟魂兮毋為聽彼巫陽些張氏五子字辭族弟有倩曰張伯玉果斷有為承家潤屋五丈夫子森森彧彧出就外傳秀眉清目求字請辭因以自朂我思聖門問仁孔淑其答子張五行聯屬今以命子鍚爾景福人之為人筋骸檢束心能主一容則嚴肅處事待人罔有傾覆孟曰士恭守此忠告恢𢎞大度君子之腹噐量褊窄致尤取辱於人有容人亦悦服次曰士寛無爾局促身立於信猶車有轂無轂奚行失信斯恧季路無盟片言折獄仲曰士信言貴可復經綸務勤并力為戮學在敏求機貴神速少有怠忽功遲勢䠞次曰士敏匪解夜夙仁者之澤如水滲漉利濟存心施於孤獨或飲食之或分金粟季曰士惠隂功可卜五者之義譬之竹木人資户用無間伯叔恭而信寛兼偹乃足非謂敏惠各專一曲以是求仁仁道愈熟㑹爾賔親招爾近局時出行之逺邇和睦懋哉懋哉予辭可讀紉蘭軒辭紉蘭軒者吾廬陵太守湯公曩居臨濠所葺也攬物㓗芳興寄髙逺有溪逸巖遁之趣廬陵王某慕其清風為作紉蘭之辭辭曰謇吾好此竒服兮集菲菲於衆芳采芰荷以為衣兮被薜荔以為裳惟茞蘭之為佩兮忱古人之所孰無滋而有刈兮樹九畹於沅湘年既深而日茂兮玉茁芽之琳琅豈藪幽之長處兮占托根乎帝之鄉曰嘉卉之聞世兮待重麗之大眀紉之以佩不負其香不紉於佩於蘭何傷纚纚蘭寔君子之良揚廷彚征邦家之光雲屋辭有引雲屋上人受業白下大雲院簡黙静重真方外士又於院事有所興作不愧佛者與予相好也作雲屋辭以貽之且邀能文事者共賦焉辭曰隂陽聚兮油油出山川兮被於九州其仁如堯兮覆我下土穀我氓兮有年以雨雲之歸兮密奕宿我簷兮依其屋極友方外之無心兮於焉憇息萬物自遂兮繄予何力有華者榱雲分半間號為雲屋何日而還湫有蝮兮林有虦與爾遯思兮無有後難雲屋兮雲屋山中兮多福世洶洶以勞生兮吾將從子於橋之隂於澗之曲陸氏四子字辭客有過予誦陸侯之賢曰兹非豈弟君子干禄豈弟者乎既又及其子弟之美曰兹非維其有之是以似之乎於是厯舉其名若字屬予為之説予應之曰字之有説未古也古者冠而字之三加皆有祝字之辭祈以成人之禮也予請倣其辭以繹其義亦猶行古之道歟客曰唯唯爰叙以辭曰有形有名品彚皆然人炙萬物字以表賢約情尊性毋使或偏顧名思義猶佩韋弦咨爾伯經理貴持循智貴流轉經則守常權則通變人之大經三綱五典入孝出弟堯舜非逺咨爾伯陽乾坤清明萬象開張陽徳君子純粹善良郊麟藪鳳惟時之祥自強不息無怠無荒咨爾伯瞻顒顒敬慎威儀禔身過者屬目㤗華嶙峋争快先覩卿雲景星望而弗畏茂譽曷騰咨爾伯凝道在吾躬學以聚之弗積於己用奚由施凝道之端實本於學俛焉盡力徳修罔覺嗟嗟四子陸氏之英必振其宗必洪厥聲吳有伯言才兼文武唐有敬輿參决可否將相之門必復其初無念爾祖以培慶餘麟原前集巻十二

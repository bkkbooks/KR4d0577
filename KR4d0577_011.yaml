body:
  text: 麟原前集巻十一元王禮撰説易字子讓説大江之南有士王禮字曰子尚以字行於世㡬四十年矣一日慨然曰君子不欲多尚人吾奚以尚為哉字之有改古有之也叔向而又云叔譽子産而又云子美矧禮之於讓其義孔恊讓之與尚又聲相近而易易易字子讓讓謙徳也顧名思義獨不有益於予乎客有聞而誚之曰子少之時内師周孔外渉孫呉濟經以權脱儒之迂壯志誠可尚矣迨夫事與志違時勢則然既不易其守胡字之遷且子所讓者何焉子讓曰今夫豐服美屋厚味姣色世之所欲也盡吾智力以求焉未必不獲其一二而甘讓之况其外者乎其外者無厭之性功名之累也古人有一國之讓有天下之讓况其功名之𤨏𤨏乎客曰吾子大讓如慢小讓如偽推而至於天下讓讓之至也終亦有不可讓者乎曰有天爵良貴之在我者不能推以與人也不能推以與人豈予之靳哉彼無待於予之讓而亦非予所能讓雖讓不屑予之有者多也客笑曰果子於人也讓乎抑人於子也讓乎予無以答遂次苐斯語為子讓字説賀子亨字説賀君嘉㑹以鄉先生之命易字子亨而問其説於某某聞而嘆曰先生之意㣲矣謂其以亨嘉期人者淺也盖君子之修於身施於事見於言必識亨之意而後可何也亨者陽徳之極盛者也於時為朱眀於卦為離於人為君子今夫人之為人也儲精毓秀繼善成性其光眀正大之體與天地曷嘗少異私欲汨之窒壅塞蔽眀者暗大者小於是君子小人判焉知養善端擴之使火然泉達反身而誠萬物皆偹則其為善也孰禦君子之修於身也若此可不謂亨歟由是處事接物宜厚宜薄宜隆宜汙宜弛宜張宜舍宜趨如破竹如决隄無凝滯齟齬左之宜之右之有之其施於事也若此可不謂亨歟以至論議古今盛衰得失曲盡人情作為文章咏物叙事莫不折旋恣肆辭逹理順探幽造微冥㑹賾到君子之言至於亨如此則其文不可勝用矣竊觀世之人性鑿情昏厚薄易置道不行於妻子吐辭如吃幽澁險譎至不可解若是者尚足與語亨之㣲義哉先儒言之亨者嘉之㑹也亨乎亨乎其君子成徳之時乎賀君為人光眀易直無崖岸隔限真韓子所為青天白日奴𨽻皆知其清明者詩文尤流動可快而讀於是益信先生所以字賀君者為有徴云王生伯温字説楓墅王與文甫恂恂仁厚君子也一日道書臺入郡過焉以予同宗之老命子姓羣從出拜就中長孫溫其如玉可愛旣而謂予曰是孫與予同生良月名之祖良年㡬志學而未有字覬錫之字而惠之辭使有所持循以為進修之地實徼福之厚也禮辭不獲於是揆名之良以伯温為其字進而告之曰詩稱温温恭人維徳之基而孔門高弟弟子之稱聖人亦以温為首邇之事父逺之事君皆在於和顔悦色柔言巽入而不可以粗暴所謂涵養氣質者政在於此故一言之善或可弭睚眦之怨一儀之恭或可得行世之名執事貴於温恭飲酒貴於温克一動一静之間顧名思義豈不大有益於人哉大父老人之所以期爾者至矣伯温其勉之詩云無念爾祖聿修厥徳是為説吳彦琚彦瑀字説居所二子既冠矣求字於予因念近世富家子弟類不能涵養徳性以合乎中和亦由古禮廢失學者未能講而行之之過也於是字其伯曰彦琚仲曰彦瑀二子拜而受之復求其字之説庶㡬聞古禮之彷彿遵而行之不猶賢於求之野乎予喜其慕上之意篤則為之言曰古之君子無故玉不去身其下車也以佩玉為度其制上有折珩下有䨇璜而衝牙則懸䨇璜之中皆貫以組綬上繫於珩又設組左右斜牽之使得因珩之抑揚而衝牙與璜自相擊觸然於二組相交之處用玭珠於其間交納而拘捍之謂之琚瑀故毛傳有云佩有琚瑀所以納間謂納衆玉珩璜上下之間以制其行歩之聲也然則有疾徐疏數之節有角徴宫羽之應趨以采齊行以肆夏所以比於樂周旋中規折旋中矩所以比於禮皆琚瑀之功也果奚適而非道耶春秋傳曰改歩改玉歩有不同則玉聲隨異矣由此觀之涵養徳性固有在於佩玉之功而佩玉之和又有在於琚瑀之力向無琚瑀其間以管轄之則組綬下埀者有不放蕩震掉而衝牙之韻且失之矣何取佩玉之美哉二子誠即吾説而繹思之吾知其能擇地而蹈矣有不為美士之歸乎勉之勉之無負嘉名之錫遂筆之以為字説云劉仲恂字説禾州劉君子衡宏達士也余獲交有年數矣其子實相接於邑庠尤宻與之語靡靡可聽既冠字曰仲恂欲聞其義於余余以踸踔之踪未有以告之茲行語及諾責愧負深矣於是告之曰説文謂恂信心也聖人於鄉黨恂恂釋者以為信寔之貎大學傳言恂慄釋者又以為戰懼故韻書或以為嚴謹或以為温恭要皆信寔之形之外者也予嘗以謂士君子之所以異於人者必有其基也基者何信實之謂也人能信實無徃而不恂恂矣有謙退無浮夸有持重無淺􅏥若人也吾知其可大受也人至於聖神極矣然功未有不基於恂恂之信實茍無恂恂信實之資則雖有賁育之勇儀秦之辨良平之智猶五味之本非甘五色之先無素未必有所就於天下也是恂恂雖鄉黨所當先而信實為徳蠻貊之邦行矣仲恂勉之吾告子者若是而已顧名思義他日所至到其可涯哉何俟於予言是為記吳良貴字説人之生也得隂陽之氣以成形健順之理以為性故有人心道心之殊理義道心之所崇富貴人心之所切仁義忠信天之所賦乃良貴也人不得而賤之故也公卿大夫人之所予非良貴也人亦得而奪之故也是以閭巷之人見夫旂旄揚飛車騎赫奕冠裳之輝煌宫室之壯麗莫不咨嗟而羡慕此知有富貴而不知有理義者也學士大夫則知有理義矣國家用之則安富尊榮子弟從之則孝弟忠信然亦有為貴富所移以其所輕棄其所重則惑之甚者也予嘗謂人能知在我者有得於天之良貴其貴無匹於天下非人所能奪亦非人所能賤千駟萬鍾有弗顧也三公九卿有弗屑也况肯昧其輕重以此而易彼哉孔聖謂有無聲之樂無體之禮予亦以為良貴者乃無爵之貴而天下之貴莫能或之先也此所謂天爵而非人爵所宜及矣學者可不審其輕重之辨與予友呉良貴故家才子有志於學其將效用於今時也有日矣故推其字之義作是説以貽之劉仲桓字説劉生健字仲桓問字之説於予冀以私淑其身可與共學者也於是告之曰子亦聞詩書言桓之義乎魯頌之辭曰桓桓於征狄彼東南牧誓之辭曰尚桓桓如虎如羆殆皆美其武勇之意云耳然武勇之為徳豈獨軍旅為然哉凡事莫不皆然士之進徳修業類非委靡柔懦者所能成而發强剛毅之資必能有以造夫道之極故知仁非勇無以終之為事之不力者人亦徃徃謂其不武觀大武之六章頌武王武功之成以桓名篇意可見矣易曰天行徤君子以自强不息噫君子之於學也可不以自强為務也哉雖然若仲桓天資予知其無愧也使之書筆勢矯然有奮㧞有骨力使之琴指法蒼然有發揚有蹈厲是皆自强之功也一藝且然况其逺者大者乎健存之中斯桓見乎外矣傳不云乎士何事曰尚志人一己百人十己千亦自强之道也仲桓懋哉懋哉嘉善字説嘉善名𠂻姓劉氏少事筆硯即聰慧過人迨長為郡府書佐練達明敏牘無留滯又喜從士大夫㳺樂聞經術嘗問其字之説於予予愛其恂恂謹愿於是進而告之曰惟皇上帝降𠂻於下民厥有恒性説者謂𠂻善也人受天地之中以為性故在人之性亦善今子名𠂻而字則嘉善宜矣雖然善固善也而嘉亦善焉將子之行已處事必求無往而不善然後為能盡人之道乎易曰善不積不足以成名是吾之善貴乎積也傳曰在止於至善物物之止在乎善也荘周以天下之所尊者富貴夀善也舉善而與富貴夀同稱則善亦誠可尊矣吾子知善之可尊又知善之當積物之當止晝之所為夜必思之誠善耶抑未善耶改其未善以從其善積之止之有不為善人君子之歸乎𢡟之哉顧諟天之眀命眀吾善以復其初也顧達道字説顧侯文質之戍鎮廬陵也疏通聰察右文下士閲武之暇惟教子為先務有子曰和謙重謹厚嘗從顔先生於郡齋於予有一日之雅别數年矣比者過門神完而氣清言深而慮逺以予嘗有聞於濓洛之學俾説其字達道之説嗟乎達道良友也予敬愛於言乎和也者天下之逹道此子思子發眀羣聖心法之中欲人喜怒哀樂發皆中節則道之見於用者無過不及矣然道而謂之逹者何也以其古今人物所共由故也使其在古可行而在今有所不行在已可行而在物有所不行則不得謂之達矣是道也豈由外至哉亦率吾性中之理而已矣斯理也天命之性也人率之道也有體用動静而非兩事也故周子亦曰中也者和也中節也天下之達道也雖然達道始於五典推而極之皆無乖戾其功用可勝言哉達道其勉之叔慶字説故人劉君子琚既殁之後見夣於其叔子觀曰吾字汝以叔慶觀受而遵行之非冥冥之中深知子弟之能立足為家之慶乎於今十又餘年矣而叔慶承家以來鋭於志敏於事膺門禦侮如霜隼摩天之不可覊臨機應變如轉圜决渠之不可緩户役之譴何身任其責而弗辭上以安其兄下以友其弟亦可謂難也已矣予嘗謂善覘人國之盛衰者以人才而善觀人家之興廢者以子弟子弟退縮委靡非家之福也孟子曰自反而縮雖千萬人吾往矣自反而不縮雖褐寛博吾不惴焉但視理之在我者直與否耳浩然之氣焉可餒哉易曰積善之家必有餘慶盖積善者集義也事事合理之謂也非退讓不較甘於罷軟者也洪範六三徳曰强弗友剛克而六極一曰弱吾觀人以此而自觀亦以此予觀叔也非劉氏之慶乎雖然尊卑長㓜之分不可紊也貧富窮達之機不可測也吾於家庭之間上下秩然安分寡欲和氣藹如則慶在於中矣詩曰豈弟君子干禄豈弟慶豈自天降者哉嘗讀甫田之詩以千斯倉萬斯箱為曾孫之慶皇矣之詩又以因心則友則友其兄為周室之慶叔慶於是兼得之矣故於其請字之義也作是説以貽之麟原前集巻十一

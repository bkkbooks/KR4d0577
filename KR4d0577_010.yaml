body:
  text: 麟原前集巻十元王禮撰題題芳宇弟繫思巻右詩文一巻乃王裕伯叔親友為裕而作也裕殁之明年其父芳宇每見此紙輙堕淚因喟然嘆曰吾若火之則影㓕跡絶日逺日忘又不能恝然以忍不若命工人装緝以為巻時舒時巻誦其詩讀其文猶見斯子於几席之側而吾孫他日稍能識字亦因此可得其父之平生而彷彿其性情也則是巻豈不足以繫其父其子之思乎遂標其上曰繫思而欲予志其後嗟乎父子之天古今所重一體故也見其有寸善則欣然以喜㣲過則戚焉以悲况於裕也有羣玉之譽無嘉賔之咎惡得不繫人無涯之思也哉予猶及芳宇之大父履齋翁埀老有㲻子之慟抱孫割甘以娛末路卒頼芳宇以終其身以亢其門今芳宇復踵祖武蚤失佳兒固人情所不堪然穉孫未及二齡已知拾寸莛㸃唾學書是必冥冥之中有相之道詩書之澤未艾祖宗之佑彌深孤孽之達於此乎卜之雖然予也於裕自不能無感於中者矣初喜其往教又悼其亡至是三秉筆焉則大耋之嗟又豈逺於芳宇矣乎裕字啟後有詩三四十首皆可觀并存於後云題龍雲瑞䨇雞圖兒時聞爾之鳴矍然而起噫今老矣右時夜將唱使墻下桑隂而多見此非王道之始耶右伏雌抱雛題王仲齊所藏小景小橋流水或後或先踈林平嶼或斷或連熹㣲兮似郵亭之夕照縹緲兮疑仙館之晨烟不知何處有此景亦欲往買二頃田噫我知之矣其王氏之輞川也耶題龍頭乘風雲上天平地三尺水四序以之調三農為之喜海内望龍頭於嗟今老矣題鷹熊圖鷙鳥之秋高摶擊與猛獸之山居冬蟄非動物之傑然者乎然擬之智過萬人之英勇冠一世之雄若張良韓信則霄壤不侔矣畵工托物以喻人其寓筆於彼以歸美乎此也歟亦意匠經營之善也題無詰沅蘭湘竹圖得𧦬公一幅如此懸之髙閣如行沅湘滿目幽致翛然意足復何用隙地丈尺藝蘭種竹哉題蘭擷衆芳而周流兮紛總總其蕭艾遵澧浦以回轅兮㣲幽蘭吾奚佩題蜻蜓螳蜋巻飄乎上也非㸃水伏乎下也非捕蟬如化而生如蜕而仙淡墨所至不自知其所以然此雲巢之筆入於神而出於天也耶題子猷泛剡圖興到舟行興盡轍改倘屑屑乎主人豈髙風於千載題竹林七賢轟飲圖書戒沉􅒬詩美温克諸賢曠逹之懷何用爾邪抑諸賢高致衆人未識而畵史姑托之豪飲耶希賢笑此有不廢事者哉孔碩藏之可與友朋同此趣未可使兒孫湛此樂題古木脩篁圖風月襟懷瀟洒者千尋之竹雪霜骨格傲兀者百圍之木托根巻石共此幽獨自常情觀之喜翰墨淋漓之娛目以余觀之殆猶荀陳之相遇千載之下令人仰髙風而慕遐躅也題鍾馗像尊吾瞻視儼吾衣冠正心以正一家則上下莫不一於正而相安復何有邪氣奸其間又奚事乎靈怪呵衛於門闌昌黎五鬼不足慮進士且返終南山題萬竹圖東昌李志髙之父竹所翁性嗜竹嘗得萬竹圖一見心醉賞玩以怡情有年於兹矣翁既沒志髙復命工人完理懸於中堂飲食起處不離其側謝君子方稱揚其孝思既而復徵予言吾想志髙見竹之乘風而軒舉也若翁之起坐而欠伸也見竹之雨雪而偃也猶翁之隠几而臥也見竹萌錦籜之環列也若諸孫綵衣之繞乎翁膝也盖他人視畵竹也志髙視竹親也其昔人思其嗜樂之所致歟余為題其上使後之登斯堂者觀萬竹之圖誦王謝之文有以知志髙之為人䟦䟦王與定所藏先府君賢賢翁遺訓吾邑王氏多祖金地長者而棟溪之傳譜系尤著楓墅一派又自棟溪而别也嘗聞其父兄之教子弟之率有典有則詩禮是宗未嘗不想慕而起敬昨過其里惕然淵眀長沙之感遂停車弛任而往訪焉遂識與文與定伯仲以及子姪羣從雍雍乎故家之遺風卓卓乎膺門之偉識又不特子春相知之舊而已也既而與定視予以其先府君遺訓無非舉辛勤孝友務本尚義戒其子孫為之掩巻以歎人之高眀祖父孰無詒謀善後之心然埀訓非難守訓為難故不羡剏始於前而羡繼承於後今其伯仲所自立可謂無忝先訓矣後來者益務封殖其徳則天之報施善人將振耀於鄉國豈獨宗黨之榮哉詩不云乎豈無他人不如我同姓有志者尚其勉之䟦張文忠公帖右諸公但思至公血誠以報國政自不必謝僕僕亦不敢受諸公之謝也養浩覆凡三十字張文忠公示初科諸進士免謝帖也欽惟仁宗皇帝鋭意文治舉百年之墜典設科賔興思盡得天下儒者用之嘗曰使其中得一人如范仲淹朕志願足矣於是慎簡徳望學術之臣俾司文衡而公時在焉進士及第謝座主禮也公之卓行疑其近私批報之帖辭嚴誼正如此某嘗求我朝科目得人之盛無如延祐首榜聖繼神傳累朝叅錯中外聞望之重如張起巖郭孝基文章之懿如馬祖常許有壬歐陽𤣥黄溍政事之美如汪澤民楊景行千文傳軰不可枚舉大者深厚忠貞小者精白卓犖所以黼藻皇猷禆益治道者初科之士為多雖曰一時光嶽之氣鍾為英傑沛然莫之能禦然亦仁廟切於求賢之念上格天心當時碩徳元老足以風厲後進所致也嗚呼於時四十五年矣楊先生之子顯始出是帖以示某某語之曰此先生藥石之訓也楊君其寳之友舊過臨時出以展玩使由科第發身者能銘之心則必自奮以報乎上職校藝者觀之必無美庄之論其於治道豈小補云遂識其巻末歸之楊君以為皇元科目故事䟦李氏族譜後西平李氏自唐至今三百餘年二十餘世而子孫蕃衍愈逺愈光皆前聞人立徳立功之餘澤也噫盛哉其孫尚敬父子猶惓惓有望於立言君子發揮先美何也其意固欲來者知之克勵克紹以無忝其先烈云爾李氏子孫其亦自貴望也哉吾於是乎有感䟦歐陽圭齋所作趙宜厚若愚字説後存心宜厚處世若愚是謂八字之符終身佩服而有餘至若陳言之縷縷豈子所望於予乎䟦中洲劉氏族譜後中洲劉氏於某為母族自安成運使紹之曾孫曰常昉居永福子孫詩禮淑身安於鄉里重於從政鄉稱善家有孫曰躍將繼警軒宗海先志荐修宗譜徴序其意須惟某也筆已老矣序何能為然觀從曾大父潮州府君序其譜曰族之有譜尚矣古存其義而隠其名譜名肇於漢晉盛於隋唐然多以門閥相髙得古義鮮盍思别生分類之訓肇於書不如同父同族之歎載於詩二禮有同姓異姓之述春秋傳言文昭武穆周公祚𦙍之詳是皆使人子孫不忘其初而知尊卑踈戚之叙某雖欲復出一喙豈有加於此哉劉氏修譜者所當知也又觀歐陽文公之序斯譜深幸勝國時江南未遭兵燹故冠盖之族往往治其家譜不知者以為一家私事知者以為升平之氣象可觀於此今劉氏子孫重修於今日其將復覩唐虞之治也乎姑書此於後以記觀譜之嵗月云爾䟦歐陽建寅所藏先世二誥建寅所藏先世二誥乃宋治平二年所贈歐陽文忠公祖偃太師中書令曾祖郴中書令之寵命也文忠以立朝之姱節盖世之雄文所以黼黻王度儀範百僚真大廷之柱石也故上之褒顯其先若此禮亦宜之建寅乃其諸孫收而有之珍藏什襲不啻南金大貝之重﨑嶇兵亂間輙嚢以自隨而他亦不暇顧孰知九江一變僅以身免此誥亦㪚於飄風自是戚戚於懷廣詢博訪日征月邁近始得於金陵蒋氏向非建寅惓惓繫念前朝舊物能復歸歐陽氏哉竊嘗以簪纓之後上之當思如文忠立身揚名以顯祖考次之當如建寅保先代之遺美守君子之餘澤不然何以自異於蚩蚩之氓歟噫大賢之後多寂寞故家喬木可感者多覧巻三嘆䟦馬融忠經後右忠經十八章東觀馬融所製以配孝經者也夫孝之與忠人之大閑而百行之元也違斯二者何以靈萬物而立兩間哉昔者孔聖以曾參盡孝因言其道遂為經而忠則未之及然有曰事父孝故忠可移於君是則君親之分殊故忠孝之名異而義則一也融始擬聖而作此亦有益於名教使人人得其説而遵之施於有政豈不大有可觀余既得朱文公及吳文正公所刋定孝經鋟梓今又得此文雖未敢便列之經然亦托工人以夀其傳誠欲學者玩繹二書之㫖庶㡬處而為孝子出而為忠臣則於國家化民成俗之意豈不深有所助發云䟦越國公鍾紹京像後嗚呼自古女禍之敗人家國可勝道哉於斯時也有能轉危為安真英特之士也嗣聖間韋庶人與武三思升御床博戲中宗從傍典籌唐之國事將日非矣迨臨淄王入誅韋氏劉幽求預叅大䇿翊賛聖儲震殄元惡以存唐室厥功茂矣於時苑總監任左金吾内屯田使鍾紹京以户奴丁夫之衆亦與有勞皆可謂社稷之臣也何可及哉孰知功大難容奸邪搆怨幽求初流封州再貶睦州死於道路而紹京亦左遷果州禮從越國公之逺孫煥獲拜遺像因嘆當時如劉如鍾者幾何人哉而朝廷未知大用為可惜也因題其像之後以致余之不滿云䟦棟頭王氏譜後往余先君子梅洲翁嘗修族譜圖繫以名賢所為諸祖墓志銘等作具載先世自唐仲舒觀察江西子孫因家焉亦以為自金地長者曾伯祖南安教授府君有序謂往在章貢嘗與居七里鎮者通譜而茅堂棟頭亦皆族也禮後驅馳鞅掌於嶺南有王同知者從事幕中詢之七里之族也迨歸章貢邀余至其家視余譜牒棟頭之譜乃亦有焉遂以歸我行李雖偪仄惟棟頭宣溪之譜不敢後抵家問譜於族人無一存者私竊自喜將謀重刋庶㡬後之人觀譜而知序之親踈觀記述而知家之閥閲則必有感嘆興起不肯自同於汙賤乃為同姓之匪人乆假不歸諉曰淪喪使前聞人累世之所樹立没没無徴其亦可悼也夫今棟頭族子志仲能保先譜及家傳因獲觀吾家潮州府君及南安教授䟦語感慨係之謹題所聞於此以志余過歸以復大年兄何如也䟦王子春名字説後禮近留楓墅子春所有一日之聞辱以其先府君及二守馮公子羽所為志伸説洎劉君雲章子春字説示余余閲之盡嘆其言皆可服膺而勿失父之於子也欲其志於學以求其伸之道馮公戒其毋以富貴利達得志為伸當知所以為志劉君則以人物同得天地之心以生天地之心在乾坤曰元在四時曰春在人則仁是也士之希聖賢者必曰求仁日用之間無一事而天地之心不存即無物而非春矣皆藥石之訓也雖然用功之要未有以告之不㡬汎言乎竊聞之格言求仁當自誠敬入先儒嘗曰無妄之謂誠不欺其次也故无妄初九之象曰无妄之往得志也孔聖答仲弓之問仁以出門如見大賔使民如承大祭則在邦家無怨至是非吾志之伸乎子春勉之與物為春實自兹始䟦小溪郭氏隠居記後予觀士之懷材抱藝而隠也或跡有麋鹿而心慕乎軒冕之榮或始居林壑而終簉乎鵷行之列出處寧無可異者哉此䨇清者之為難得也西昌郭君與諒隠居小溪之髙田其林壑之美禽魚之樂樹畜之遂則儀曹劉君國録蕭君濯濯文翰以黼黻之矣諒之言曰予無才與藝之足以用世也髙曾以来世居斯土耕食鑿飲使鄉稱善人足矣惡敢有所傲於當世哉與之語質樸冲澹無一毫紛華外慕其表裏如一者矣豈不尚有古人之風乎䟦劉復之雞肋集復之詩眼前景意中句而深穏有至味如王謝家子弟風流閒雅不失王孫故態如山農野老班荆而坐談桑麻話𠂻曲語語篤實可聽有詩如此何相見之晚耶吾家靖州府君有雞肋集三巻今君亦以是名詩謙辭也謂食之無得固不可謂不足以當尊拳愈不可姑藏之必有嘗鼎臠而知熊掌者麟原前集巻十

body:
  text: 麟原後集卷七元王禮撰記松坪隱記胡忠簡公之鄉沿溪十餘里許平陸蔚然延袤曰松坪王氏士逺家焉士逺聰警嗜學不廢嘗充江西行人之任白雲在天懇控以退築室于坪讀書而隱處焉因署其顔曰松坪書隱而屬豫記之豫問士逺之隱松坪也何居曰松花可以釀醪艾納可以聚香餌葉令人不老擷菌勝于美蔬脂之淪入地而歲久者為茯苓為琥珀皆足以娛我親而益夀暇則取其肪以代燭而晝夜讀書于其隂清風時來韶頀交作若與吾伊相和答于是外形骸傲軒冕一觴一咏不知老之將至雖驂鸞鶴而蓬瀛者之道無以過焉此吾有取于松坪而樂之也豫聞而笑曰人之心事固有不期而同者乎吾廬之背亦有松坪二三里蜿蜒沃衍植物蔥蘢爰作山齋其間聚童冠十數輩與講先王之道以待用因護是林數年之後鬱然蒼然新槱不可勝用矣角濈濈者以雌以雄牧之待其兢兢肥長則歲時烹炮斗酒自勞燕及朋友子前所云乃豫齒髮日耗者之所宜處至若懷竒才如子負逺志如子見松之凌雲干霄則當慨然曰在物猶然吾可不身為明堂棟梁乎見松之歲寒後凋則當毅然曰在物猶然吾可不身為國家柱石乎此則吾子之當務也異日功成業就歸榮故鄊乘興泛一葉之舟訪豫宣溪之上觀豫所營以相樂然後治子之松坪行子之素志不後奈何于今逆施乎士逺笑且謝曰命之矣得無松坪之樂老人欲専有也耶豫遂援筆録問答語以為記傳心堂記西昌塗君世傳構堂于注陂之上居處既順矣不虞負芻之警蕩為莽墟其子伯高繼志重葺宏壯顯敞視昔有加榜其顔曰傳心堂豫問其故伯髙曰傳心先子之號也今以堂名庶一舉目儼乎如接先子之音容也願一言以埀訓豫復之曰傳心之義大矣哉曲禮七十曰老而傳説者謂傳家事于子也傳家事于子千萬人所同傳心于後之人聖賢所獨堯之傳于舜也惟中之一言孔之傳于顔也惟仁之一問人能秉心無過不及執禮而行焉往而不達哉或讓于豫曰堯舜孔顔傳心之説子遽以語伯髙得無躐等之病乎則應之曰豫平生期人逺者大者有求豫言必樂告以第一之義若使聞下等之語是不誠于伯髙矣况孟軻氏不云乎舜何人豫何人有為者亦若是先正亦曰顔何人哉希之則是凃氏子弟以豫言思而勉之則無負名堂傳心之意槎軒記洪武十三年夏聖上念股肱之勞勩優在庭之臣四人放歸田里以佚其老于是劉君子髙得致其事既歸榮故鄉葺廬舊址朴而不雕雅而不俚字其顔曰槎軒子問客曰何為其然也客曰子髙子窮逹利鈍聼天所命方其讀書山中不自知其官于職方也逮其居職方也今年市駿于嶺海明年理舶於登萊泛泛東南漂搖靡定亦不前知其繡衣于北平也比者倐然而起掌禮于南宫忽焉蒙恩懸車以示後計其身之在天地間猶水上之一槎耳安能預知其抵止流行之故哉槎之名軒者此也豫聞而歎曰古今賢聖之若槎者可勝計哉魯叟之適周適齊適衛適陳過宋至河如蔡入楚孟軻氏之遊梁至齊皆欲明王道以拯斯民此載道之槎也蘇秦之趙之燕之韓之魏之齊之楚奮舌權變佩六國相印輜重擬于王者此權謀之槎也范蠡既雪會稽之耻乃乘扁舟浮于江湖變名易姓為陶朱公知計然貴上極則反賤賤下極則反貴貴出如糞土賤取如珠玉之䇿乃治産積居以與時逐屢散金以行德此貨殖之槎也張騫奉使絶域留單于亡大宛抵康居達月氐致天馬蒲萄之獻此開邉之槎也司馬子長南逰江淮上會稽探禹穴窺九嶷浮沅湘北涉汶泗講業齊魯之都過梁楚使巴蜀南略卭笮昆明以歸此訪古之槎也子高之槎將為鄒魯之鳴道乎抑將傾動列國使萬乘除道以迎之乎將挾粉白黛緑縱一葦之所如乎抑不辱君命窮天之涯極地之角張漢威德使尺地一民盡歸職貢乎抑亦車轍馬迹遍于朔南挹先王之髙風考賢哲之遺迹著之簡䇿以傳之後乎客曰吾觀子髙子道之不明常以為憂毁如臧倉其心休休遊説金多愧其妻嫂彼則恥之螙我大道翩然見幾西子娛樂罷神貨殖亦其所薄博望開疆固槎之祖黷武殘民尤所弗取或摩秦刻或詁漢志考古核今乃其所事槎之異同僕實未知樂天知命聞其庶幾豫聞斯言感慕油然爰緝其語以記槎軒于是復歌以揚之歌曰槎何世兮離富媪槎何歲兮赴流川杳不知其所自兮歷陵谷之變遷嗟惟爾之無心兮自靈自仙泛泛若鳬兮何有紏纒神交𡨕漠兮惟聖與賢招扶桑以為友兮晞余髮乎虞淵采菽軒記郡南周善政能養龍君子髙嘉之字其事親之軒曰采菽而謁記于豫豫惟采菽詠于詩乃天子所以答諸侯也今以名軒何居無亦以采菽可盡菽水之歡乎意或然也抑豫聞孝子之有深愛者無往而不用其情世俗謂三牲之養富者之厚也菽水之養貧者之薄也殊不知菽水而惟其甘有勝于三牲心乎愛矣雖菽水猶惓惓以奉其親况賢于菽水而不以奉乎等而上之若堇豈若薑桂若修瀡橘也筍也羮也魚也皆吾深愛之發見若必待三牲八珍為甘旨焉得人人而有之而親之養荒矣豈深愛之心哉善政知此則不負是軒之名矣竹逸記竹植物中之君子也挺直而不阿蔓抗節而有疏數逺近之殺柯葉冒寒暑而色恆青虗中若有容于物以故晉人多好之而子猷獨植其竹誠以無之則俗非君子之宅也吾宗子春家于楓墅種竹繞屋青青如簀可愛隱居讀書其中宛在塵外人咸稱之曰竹逸以其質直不阿世守節而固窮涉憂患而不易其􅋵謙虗自牧廓兮有容與竹似焉好事者又寫為圖而屬豫記之嗟夫詩人咏菉竹于淇澳勉君子以切磋琢磨尼父著蒼筤于震卦戒君子以恐懼修省子春味易與詩言外之旨則確乎君子之歸而無負于竹矣維其有之是以似之其斯人之謂乎老圃堂記永陽胡氏為著姓于吾門為世姻外弟德誠當承平時嘗作華堂以奉親輕裘肥馬以羣富兒肥肉厚酒以享佳客亦一時之俊也逮夫八表塵昏時移運易負乘驕而成市閥閲落而為墟德誠力雖非舊而志不替初凡豪家強族姦民猾吏之相侵凌漁奪無不白于公以直之亦人所難能也浮沉閭里荏苒桑榆乃闢圃以臨池築室以佚老蓮芰菰蒲彌其涯梨棗橘柿亘其奧抱甕荷鋤靡所不植而樂在其中因以老圃自道而索豫記之嗟夫士君子遭時不偶始終盛衰之際固有大異不然者矣若德誠﨑嶇兵亂間而能自立今年踰七十耳目聰明優遊以老于圃豈非天之福善者耶退密軒記與文父既賦斯干于堂後之東偏為燕息之軒字之曰退密以其深窈而安靜也天光斜臨飛塵不到委酬酢于兒孫斷紛囂于耳目或休偃于床或欠伸倚杖博山香動石鼎茶鳴屏嗜欲薄浮華尚不愧于屋漏非君子省身寡過之地乎雖然室之密易見心之密難知自未始有形之前洎四達無窮之外凡事物之衆必求其故心之用也及卷而藏于密則寂然太極之初而萬化之源也體用一原顯微無間非知易君子孰能與于斯文父淳厚典則省身如不及其必于密也有得矣甔麓記往年友人劉雲章嘗示豫芳洲堂記等作因問誰何則請板洲之蕭領學職者纍纍有焉已知其為士族于今十五六年矣一日子春語豫以其親時舉朴茂和易即芳洲堂後人也聞人碩士之至其家者必能用乎情以故文焉而黼黻之詩焉而宫羽之者成卷比聞成德之在于斯也慊然以公賦驅馳未獲承顔接辭又愳繼今以往金玉爾音而有遐心嘗葺屋數椽以娛賔親以貯經史以其接甔嶺之麓字之曰甔麓欲覬留一言半辭其間以少慰平生仰止之意何如豫諾而未有對歲晏請益切則復之曰異哉時舉之名斯所也異哉時舉之名斯所也其寄興甔麓亦猶詩人托興于旱麓者乎旱之為山也名素不顯于天下要亦去培塿未甚逺爾自詩人托之以咏豈弟君子而旱麓之名亘萬古以不泯時舉觀崔嵬以厲嚴峻之􅋵因平衍以廣寬裕之德安知甔麓不以人而顯乎子春喜而謝曰是足表甔麓矣于是復系以歌歌曰繄甔麓之延袤兮水白而山緑其澗伊廽兮厥壤伊沃可漁以羮兮可飲以粟山可樵兮洲可牧樂吾生兮無不足嗟權位之娛人兮榮不蓋辱岩廊兮岸獄軒冕兮桎梏曷若斯人兮雲山煙水娛心目優哉遊哉兮于甔之麓西爽樓記豫訪族潯源踰坡而北將遊上郫過所謂積溪茂林清池岡阜掩映棟宇鱗集一閧若市意必有肥遁之士樂其中因記友生劉孝力館授其地即而問焉謝君德和肅豫入坐情勤語洽傾蓋如故少焉觴豫新樓軒牖明敞几席淨嘉客有舉觴相屬請名其顔豫字之曰西爽客復請記其槩豫因念清爽之氣何人無之何旦無之而西為甚若乃大火西流商飈早驚草木色變蛩韻日生俯皓景于庭户洗肝鬲而澄清徽之看山而拄手板張翰懷歸而思鱸蓴其或皓月千里寒光素輝奎璧垂彩離離下垂蕭爽清人無復困迷劉昆之嘯逺庾亮之興不淺皆爽氣之所動也居斯樓者旦暮之間挹彼之爽入我襟懷非一時臨眺之勝乎德和為性爽朗遇事接物左右適宜無所留滯于名勝過臨必用其情篤義方之教待師友厚視世之齷齪庸陋等儒術于梓匠輪輿瑣瑣計工者大相徑庭矣非西山之爽有所助發耶由斯觀之臨眺斯樓不為無益不可以不記也龍泉縣寶福院記龍泉縣北鄉有招提曰寶福趙宋時長者王府簽理基創院買田飯僧峰列澗縈鬱為勝地而不知長者何所何名厥後歲敝歲修弗替益勤于今二百餘年至正壬辰劫灰墟莽過者興嘆其後九年庚子比丘曰顯護與其徒契元竭力修復購木于山範瓦于陶二師泊然未嘗強求于世而物情宗之逺近樂施如一人又三年癸卯殿宇法堂廊閣庖廩靡不完具既而門垣峻潔丹堊金碧輝輝煌煌塑像繪軸百器具舉則後人能繼前志者也其後十五年契元念先師之勤復有今日非托之言語文字何以垂後于是具本末請豫記之嗟乎喪亂以來故家世族門冷徑荒求其棟宇復新甚未易也考作室既底法厥子乃弗肯堂構世多有之况望其建一祠闢一孰以為宗族奉先啓後地哉視師之前規後隨過人逺矣因記七八年前校藝閩省撤棘之後縱觀鼓山禪寺登崱劣峰坐天風海濤亭上睨滄溟如鋪白雲琉球黝其一髮此身宛在天上老禪詗公邀豫留文山中歸計迫切賦一詩而去今姪孫俊乃力求記寶福之成而豫欣然書豈亦有緣耶護字常存元字如善云重修永豐觀記廬陵郡治之西二舍而遙有華蓋山上祀浮丘王郭三仙實臨川大華之别館也里之巨室胡公殿機始基之而命道士李敏中職祠事山之麓江抱溪朝風氣藏蓄宋咸淳己酉李君始即其勝而觀焉李君𣲖自吉文十華之雲怡堂式闢斯土請觀額于朝勑賜曰永豐歲修世葺繼繼承承百事完美元季山顛古殿洎于觀宇燬為虗莽內附初海宇輯寧觀之住持蕭與吾諗于衆曰吾徒朝營暮用曷嘗不給而吾教所事曰天曰帝曰聖曰真乃無殿宇以棲其神不有可愧者乎山顛縱未遑觀亦不可後矣于是咸韙之溫務立即貨已田市材與瓦以復舊觀吳元年丁未正殿成丹雘金碧聖像咸具明年曾日升又求衆施以建法堂而私補其費之半于是門廡廢庖幽室間院以次各就乃相率謁豫以記興復以勵後人豫惟昔年讀史見漢初苦秦苛法思與天下更始曹參相齊盡召長老諸先生問所以安集百姓言人人殊參未知所定聞膠西蓋公治黃老言厚幣請之蓋公為言治道貴清靜而民自定參遵其教齊國大治其後入相漢廷屬其後相曰慎勿擾獄市及擇郡國吏取謹厚長者言文刻深務聲名輒斥去之一遵何法日夜飲酒不事事有頃百姓歌之曰載其清靜民以寧一非得老氏我好靜民自正之意與陳平信有智矣亦嘗曰我多隂謀道家所禁吾世即慶亦已矣不能復起以吾多隂禍也嗟乎漢初挾書之律未除民間少見經籍聖人大道概乎未聞一時英傑多事黃老尚清淨務簡易猶足助成漢家四百年之治則其功用豈可少哉曹陳所語要亦孔氏尚德化薄譎謀之緒言耳然今之學老子者并忘其本而惟以禍福動人則末流之弊也而能修其宫以興其教又吾儒中或所未及豈不有可敬者耶豫言及此者欲其徒知教之本而後之治天下者倘有取焉黎民亦職有利豈敢以道不同而遽廢公論哉况先子岩泉居士嘗買田山麓仙侣至今猶食舊德豫執筆于斯惡得無情耶是役也其徒王大有周道誠胡悠久葉大觀劉大知劻勷其間是可書竹林小隱記深源頻年順適遂賦斯干葺屋于竹林之中以娛其晚俾豫從子穎來告曰吾廬將落成字之曰竹林小隱王生老人可不為我記之松茂柏恱聞之助喜命舟往賀見其棟宇峻潔櫺牖疏明背城而臨江臯濯纓而俯清流誠隱士之所棲也有竹百餘挺森立前榮可愛因問之曰桃李君家所種也今乃獨種乎竹何居曰思其中空吾則謙虗以受善言撫其髙節吾則抗義而守禮法見其枝葉四時不改色則足堅吾富不淫貧不移之􅋵是竹吾益友也可不敬哉嗟乎深源薄紅白粉華之難久喜蒼筤青青之不衰可謂器識宏逺矣然豫因之有三愧焉槐竹吾家所尚也曩嘗植槐數株其隂已滿庭矣而人心不同有如其面不能闔廬以受之一可愧槐花黃時子弟爭採以遺工人則有之驚試期之迫而忙者罕見二可愧連年種竹老手親移犢角之盟方苞方體不縱牲畜以戕之則狂童饞妾採之以菹洳而渭濵之植在胸中矣尚望其青青如簀哉三可愧此豫不特有愧于深源抑有愧于先世也惡得不樂為深源記之于是復系以歌歌曰竹林兮修修負郭兮幽幽青源在右兮鷺渚中流清風如濯兮良月如鈎良時勝景兮誰吾與儔百壺清釀兮歸與婦謀嘉賔戾止兮珍吾肴饈賞心逮暇兮以敖以逰光隂過客兮富貴浮漚緑鬒一變兮楊花滿頭胡不日以嬉兮懷千載之長憂我勸兮賔酬賔醉兮我謳竹林竹林兮吾托爾以優遊靜淵堂記郡城玄妙周以仁受守一玄丹之道有年矣元末亷使吳公伯尚以傳稱仁者靜篆靜淵二字遺之近以薦入朝授官道紀車蓋雜沓琳宇增輝霞步泉音道流欣羡可謂榮耀矣于是出靜淵之字以名其堂而屬豫記之豫謂至道之精窈窈𡨕𡨕至道之極昏昏默默皆靜淵之説也以仁素聞之矣何待豫言然豫聞張橫渠云至靜無感性之淵源又曰湛一氣之本是性之與氣本體皆靜淵也朱考亭亦曰淵淵靜深而有本也知靜淵之為本則知道為天地之本天地為萬物之本以天地觀萬物則萬物為萬物以道觀天地則天地亦為萬物靜淵微妙豈尋常所能窺測哉何時與子凌三光餐六氣招太和為友而躡乎淡泊之境細論之可也姑為之記三峯隱居記豫友任保康别六年矣辟地西昌聞其館蜀江歐陽氏以忠主人仁賢心竊喜之保康曰以忠尚儒術卓犖不羣而别字三峯將豫一言為之記豫觀蜀江平洲逺岸覽間演迤風檣沙鳥娛目賞懷不識三峯安在則曰蜀江在武山之麓歐陽氏之先有號皆山其後襲以峰者至以忠而三焉自其地而觀之平原沃野非有峯巒纍纍乎左右也自其人而觀之厚重弗遷聳拔自異則峯之似也豫何泥其迹而忘其意之求乎噫若然則五峯之胡九峯之蔡皆以忠師表也倘能求諸老所自植立者得其一二以修其身以齊其家以傳之其子孫則三峯之名將必籍甚朂哉以忠昭然堂記豫嘗過道昭之廬愛其軒豁鬯達髙朗洞開山容水色獻于階庭天光雲影入于几席客有謂豫曰此堂之所謂昭然而道昭之别字也常欲得聞人記其概而未遇今幸耆德之臨于斯也敢請則因語之曰子知天人相與之際乎感孚甚昭然也人稟于天以生以理揆之一貫也天之昭昭日月星辰而所以昭然者不在三光而在主宰也人之神在乎目猶三光也然目之視非能有光必因乎日月火焰而後光存焉晦而幽者目有所不能燭也故以目視以粗而得粗者也以心視以微而得微者也人之昭然者非此心主宰之微乎天之與人猶影響耳禍必以罪降福必以善來若有物的然以主宰之者則凡主宰于吾身者可不使全其夲體之明善善惡惡以契乎在上者哉懿德茍昏則彛倫攸斁而事物之衆亦不能察其邪正矣雖然自昭修已也用晦處世也皎皎者易汙水清無潛魚其括囊斯無咎乎詩曰殖殖其庭噲噲其正斯堂之今日爰居爰處者宜之昭兹來許繩其祖武斯堂之後日善繼善述者宜之客喜而謝曰仁人之言其利漙哉聞之昭若發矇矣請筆授之俾無忘嘉言之貺于是乎書樂隱堂記族弟元善少長于母家距故鄉一舍而近雖典刑文物耳濡目染浸以踈曠然辛勤稷稼立身持家堂構翬飛子孫繩蟄要亦兄弟中之卓然者常曰人之生世也弗仕背君必仕背親二者將安取𠂻哉惟自量其才力何如耳僕觀後之仕者書律未精印綬已綰惟聲色之是務惟貪冒之是思吏胥縱橫而弗禁黎庶愁嘆而弗恤若是者雖萬鍾九遷僕無樂乎此也况可食以酒肉者可隨以鞭捶可授以官祿者可隨以鈇鉞將能免于患乎吾豈若闔閭足以庇風雨田畝足以供伏臘妻孥主饋無飢渴之憂賔朋輔已有啓沃之益兒孫課之以詩禮僮僕督之以樵蔬洽百禮于歲終蚤輸稅于官府雖無贏餘亦無不足逍遙一世之外優遊韋布之福此僕所以甘此之熙熙而耻彼之碌碌也于是客有舉酒祝之曰翁其樂于隱乎殆亦吾斯之未能信耳遂咸稱之曰樂隱翁既以此名其堂又三年而元善捐館既而其子某曰先父與伯父齊年而存沒異趣忍無一言記樂隱乎聞之不覺愴然因思少年攻苦毄淡拔身于場屋數千人之中近年振翼南溟掄材于閩粵數千里之外士類雖或豔之然白首無成與物多忤視元善所就以裕其後者有弗逮矣然後知其樂隱之髙非惟庸俗罕及老邁亦且瞪乎其後故特著其平昔之言于此以為之記麟原後集卷七

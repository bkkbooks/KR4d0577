body:
  text: 麟原前集卷四元王禮撰序贈伯通甫序雩都監邑伯君既上之三月政通民宜譽洽逺邇贑府俾貢方物于京師余來茲邑聞分府捴戎于此者曰使監邑在職則必民事之不我瀆也市井之人曰使監邑在職則必力役之可均也田野之民曰使監邑在職則必粟米誅求不雜然而至也及聞其將返躍然以喜交焉以問若子弟契濶于父兄豫竊異夫君所以獲乎上下有若此者時其歸也亟往訪焉語實情真藹乎其厚知其得此于人有由矣退考其私杜門自守請謁無迹凡有不得其平白于公者君究詰得實即令兩辭具對務盡其情曲者立罪之略夫按牘曹無所為市豪民有悖官府者誣史胥者即召語之曰汝有冒憲罔尚何辭汝毋耶費軍儲若干某備孔廟圮壞某修各歡然奉命無拒色梅獠侵境援師雲集君酬應適宜恬無侮拂身先士卒攻守不懈晝忘餐夜忘寐視公猶私皆余所目擊者昔張敬夫嘗嘆世之從政號為能者以察為明以刻為公以不恤為能任而號為賢者以姑息為惠以縱弛為寬以摸稜為善處適以賈怨基禍伯君明不苛察公不褊刻以能恤其民惠不姑息寬不縱弛而善處乎事其過人也逺矣雖然邑之佐有史史者承上而通乎下者也而其輩每相比焉余見其掩人之明而蔽人之聰者富矣伯君致審于斯庶絶鮮終之議茍報政不異始至則必有勒金后載信史將無愧循吏于古矣余也樂道人之善故叙所聞見以為從政者勸以俟夫舉賢才者之採擇云贈張仲溫序兵興以來郡有凶嘯必分府從便宜以治之任重事煩非咸得其人不足以集事至正十二年蔡頴道撫冦贑逺近震沸郡守尚書公以判府王侯討之既平留侯分府雩都撫安反側凡上流州邑軍旅事無大小得悉制之置史一人任簿書期㑹其骫骳不事事者應捴府或爽其意待屬邑或乖其宜上緣茲而速謗下因之而召殃懼亦有焉及張君仲溫之蒞斯役也練逹明敏周旋捭闔大者咨謀小者立决以已之能承上之賢時雖紛綸而事無不集者矣余視數年間捴府詞訟之科十無一二所急先者錢榖甲兵而已然幕佐者幾人案牘者幾人史之員外設者又幾人智效謀勇效力宜其酬酢從容鮮有敗事乃若分府之為史上缺佐政以提其綱下無共任以分其憂禍福之樞機治亂之槖籥豈不誠重且難哉張君為之三年如一日可謂能勝其任矣既代其徒黃輔曽賢念遊從感離索求余文以張之其誼有可尚者豫言雖不文亦竊嘆君之難能而強叙其概以别云某年月日王某序贈劉桂材序十七年春袁冦陸梁于吉贑郡守慮唇齒之勢日募士練卒以備而經用弗支乃屬其僚友而語之曰計將安出有議于列者曰楮幣滯壅咎原于商厥今嶺海之醝經于章貢以逹鄰郡者舳艫相銜若收其什一償以楮幣誠養士之權宜也守是其計于是擇亷幹即各隘以知其多寡之數而上于府余訪舊雩陽維舟峽口前尉馮君久戍茲土實兼斯役而府史劉君桂材督焉馮以余久别斗酒相勞飲酣不覺慨然嘆息語余曰瑣才守茲峽五年矣漁樵與友鹿豕與遊知我者謂我心憂今又重𣙜醝之禁少有逋蕩罪不旋踵自劉君來監斯役也奉法嚴待物恕樂易周密知人艱苦對雲山煙水風檣沙鳥時有句陶寫其胸次又常若恨余之不邅時久淹于此余亦感其相知少慰于寂寞也然監者率三月一易代將至矣而余無以贈之子為我叙其事使得藉手以别嗟乎余聞劉君為故家才子久矣今覩其質濯濯乎玉樹之臨清風也觀其才恢恢乎遊刃之有餘地也察其志殆將卑以自牧思成其大就其深以不墜其家聲者若人也恨相遇之晚雖無馮君請猶將云云以致余意况聞命矣其敢有愛于言乎劉君勉之余之期子也逺贈劉桂材詩序贑府史劉桂材㑹鹽賦于雩峽三月得代去馮尉得淵徴豫文贈之矣後又三月代者且去儒生楊維中輯士君子贈咏詩若干篇寄之復索余序之辭之弗獲則問之曰桂材何以得此于人人哉惟中曰斯人也交君子敬且和待小人嚴且惠其奉法也恪不挾勢以驕其賦民也公不茍利以刻前乎桂材未嘗無人求一日之思如桂材無有也後乎桂材未嘗無人求一言之譽如桂材無有也好德之誠由中播外烏得以幸致哉余聞而嘆曰詩不云乎涇以渭濁湜湜其沚桂材之謂矣傳曰人之有善若已有之諸君子有焉贈楊維中詩序白下楊生惟中館授雩都峽戍官馮德淵所扁舟㳂洄常常而見之一日出所吟示余欲聞評洎觀其卷中如客添江外歲人改鏡中顔羈愁老恨備至若古人常道者如烟中踈密樹橋外兩三家得之真景漸近自然如倚松看子落隔竹聽泉流又髙人間趣超然物外瞑失林間樹凉添塞下秋亦清楚可愛他如行路難遣興等作皆非餘子所能及因喟然歎曰生寄迹山巔水涯非有名師勝友以相與而刻苦自修猶能如此使其得詞林尊宿而親炙之其所就又奚止如今所觀乎必且有大過人者矣雖然生惓惓于余蓋欲求益者也余可無一言以對生之心耶詩自真情實景便異凡俗然情雖真而不髙景已實而猶濁亦非吟之善者也生以余言思之必有得于景趣之內得于景趣之外矣逺烟空翠亭詩後序右逺烟空翠亭詩若干首參政全公與其賔從咏監郡一軒公投老之勝也一軒公昔監章貢得壩上為游觀之地及參政公牧茲郡遊而樂之納爽氣于山間攬秀色于江上朝嵐夕霏引素繚青不可殫狀遂字其亭曰逺煙空翠誠一郡之勝概也然以余觀之林泉之勝遇而樂之者非難專而有之者為難蓋遇而樂之者人專而有之者天也不見夫昔之遊此者乎畫㦸晝森繡筵時肆携謝傅之名妓領桓溫之詞客飛觴賦咏明白傳誦詎非文章太守一時之盛哉今焉奉將天討川屯野次憂先天下任重事嚴回視曩者臨眺之美為陳迹為舊夢矣而壩上依其如昨風月主人耆艾豫康此天厚之非若一遊一豫之遇者也若乃易而視之使鶴怨猿驚豈公之心也哉廬陵王禮用序其詩後雪洞圖詩序十二年淮孽蔓延江右平章教化公奉㫖南征天未矜民兵威始奮而年弗克永于是行中書以都事吳公領其軍受任以來有張無弛由清江而上如長興諸怙險跋扈不軌者或肆伐或附致達于廬陵公之力也行省擢升員外輿論韙之公所乘戰艦皓白晃朗顧謂賔從曰猶雪洞也由是咸稱雪洞將軍舟名雪洞亦猶齊名畫舫云耳或曰公為斯名欲人以寒苦為心卧薪嘗膽意也蓋陽和之氣易流于驕逸寒苦之性必至于堅忍昔田單攻狄魯仲逹謂其在即墨織蕢杖鍤為士卒倡所以破燕今有夜邑之奉淄上之娛黃金橫帶而騁乎其間未易勝狄此能以寒苦為心與不能者之異也故曰孤臣孽子操心危慮患深故逹余應之曰是或一道也然天下之理生機伏于肅殺方冬寒氣嚴凝則來春動植必至蕃育歲臘溫和雪霜不降則品物不暢其生惟人亦然罰一人千萬人懼所殺者少而所生者衆是罰乃生地也寒谷而春貞下而元雪也者翳萬物之大德而一歲之成功也歟是故采薇遣戍也曰今我來思雨雪霏霏出車勞還也曰今我來思雨雪載塗古人咏戍役之功必歸于雪公之志無亦寓至仁于至慘睹歲功以思戎功之成也乎已而范明理來章貢一具道吾廬陵百姓所以留公者因憶去歲冦由安成永新卷土至城下微公力戰郡城有不為墟者乎宜斯人感之深也又數日范出雪洞圖徴言為之展玩而歎曰雪洞者寓言也今乃形似之鑿矣况公事業又豈畫史所能倣佛哉因書答或人辭于圖後俾覽者相繼詠歌以祈戎功之有成也送馬時憲還維揚詩序西域馬君時憲以胄監弟子員舉進士為翰林編修官志不屑也南遊九江泛彭蠡踰梅關拜外父宓公于南雄回棹章貢訪趙蘇諸老遺跡因翺翔而弭節焉性重默無泛交跡絶權貴之門衆以是竒之一日聞有笑笑道人者何笠披紙衣擊笻行歌于市憩江東雷岡亭飛舞而上馬祖岩歌聲若金石悲壯激越林木為動田翁樵子棄業而衆觀意其散仙也怪而察焉則時憲耳噫其果于忘世若楚狂接輿者耶抑猶豪傑不偶之士雄才莫施輒佯狂詭其迹輕世肆志以泄憤悶無聊之氣耶矧燕趙素多慷慨悲歌之士安知不猶有曩之風烈耶余有以知時憲倜儻不羈之情矣既而道里無虞將還東淮之僑所余友馮詠索士大夫詩歌送之而屬余以序余言何足為君贈哉苐于時憲不能不為當世職于薦賢者興舉而不能先之嘆也馬君行矣見今時任方叔召虎之事者為我懇切諗之曰生民塗炭極矣聖君如此誰忍負之賀贑守海公拜參政詩後序詩若干首贑府佐屬曺掾賀大參海公拜命之作也公以朝臣出守章貢政嚴盜弭邦域完固事聞于京天子嘉之念贑之為郡遙扼閩粵數千里之衝要實為雄藩于是即授中奉大夫江西等處行中書省參知政事兼贑州路捴管府逹嚕噶齊兼管內勸農防禦使以鎮護之仍賜內府織文光祿上尊以示惓惓注倚誠內朝之寵渥外廷之榮耀睹茲盛美有不舞蹈咏謡也哉雖然春雲藹空繁星麗漢使人耳之神怡目之心豁固諸賢愛敬之至情然公大人也位尊則任重繼茲以往一號令一設施國體之大係焉非郡國錢榖甲兵庶務比也凡左右先後者計有所當用婉辭以進之議有所未安頓首以請之使大人治績愈章義聞愈著以無負天子美命庸非愛敬之彌至者乎咸曰唯唯遂摛其說于群言之左為後序贈通守王公祈雨詩序天下之事有適然遇之于天者幸也初非有可必之道也惟其屢試而不移既久而愈驗則其信于天者非偶然矣贑通守王公祈年于雩陽也前三四年余嘗過之睹士類喜雨之什而序之矣然猶以為是適然耳其後凡禱莫不孚應今年夏不雨公蹙然曰爽報非我憂不雨則無禾深可憂也即具香幣遍走群望俄而風雲隨興甘雨竟日既霑既足近恱逺安然後知公之所以信于天者非幸也有可必之道也若夫適然之感一遇之已耳未嘗有至再至三者至于再三已非可以幸致况至于五六至于八九而無或一爽者乎公之大過人者于斯乎卜矣然嘗觀之信于天者每不諧于人不能不致疑于有物夫以公之連年討賊功亦茂矣而爵不過初命之大夫無以慰國爾忘家之心而棄城全軀之臣秉鈞衡列台鉉比比有焉噫人無不至惟天不容僞彼諧于人者又果能一信于天乎信于天者數數然也則其不諧于人者無足慮矣朱子有言不求人知而求天知公之心也友人吳伯淵得諸賢頌詠獻于公而徴豫序余故表公之所以信于天者以告夫庶民小子云送雩都馮縣尉序雩都尉馮君德淵既代贑府委戍雩峽又五年屢狀求代久始得請去一日府史吳自得劉桂材李君茂等咸集語及君之為人莫不稱歎或曰君之防戍也保甲役丁更休迭用者有警約期畢至無一跡敢後舟楫往來驗詰無他不使稽滯人咸德之或曰水陸通衢過者紛若君無貴賤小大無敢慢以故來者曰馮君馮宰率歡然有頃而去其未及杯酒殷勤輒慊然終日將校騎卒絡繹無虛日君酬應盡情各相安戒飭母譁以拂君意民按堵如故或曰君平生敬畏慮譴謫及躬將貽前人羞栗栗如奉盈如履險故善于其職而有令聞或曰聨事者橫而多欲馭下峻法不近人情君憂其蔓己也力求退退踰月聨事者以賕敗其知幾有如此者言人人殊而為美則一余不能盡記也已而君赴行省聽調庶人在官者俱來求文依依不舍因詢其行事皆與前言契最後府史諸君又持巨軸合辭來請嘻馮君其所謂平易近民者耶將存心愛物于人有所濟者耶抑無惡無斁以永終譽者耶自是脫下僚而升顯要宜矣余奚言哉雖然疇昔諸君之談公論也公論焉可廢乎余輯之為序贈㑹昌常侯方壼序湘江賴惟賢僑寓雩山之陽時過從宴語偶及今之為政者惟賢作而嘆曰若吾州常侯真百一者也曩全公牧贑時于侯敬愛不解常語左右曰古有建功絶域垂聲來世者今伊邇洪省音耗窅如欲單舸中流往覘偵之誰足辦者咸曰非侯莫可使者于是㰕十八灘選蒸徒峙粻用遙遙馳千餘里如山隂道中四顧悽斷而壯肝烈膽無少栗必逹使命及官㑹昌也亷正自持噓枯起萎雖深山長谷愚夫蠢婦咸安信之若父母然招降符下受任弗辭凡怙險不軌道者理諭誠動轉移其非心不兵而解秋毫無所利若安逺若信豐若㑹昌若瑞金石城以至循梅遐壤聞風從順者寨三百有竒逮府委往鎮寧都則蒸庶怨咨遮道猶赤子乍離襁褓無所安其身必止斾尼轅始翕然以定此其槩也他非枚舉可盡余耳熟其言嘗恨有官君子不能皆侯不能不使人寤歎也其後惟賢將還其鄉求余文著侯行事余不能辭也姑序前所聞俾得藉手以事其賢大夫而余也猶將托四方緯績昂首信眉陳于繡衣玉節進退人才者之側則常侯在所不可略云游羅田巖序雩都邑南山行五里有岩曰羅田自濓溪周子來遊來歌名聞于後至正乙未余留茲邑數月欲一往未果丁酉重來憂患中念不及此明年夏允匡以使命抵掌思至其地司征宗楚故家才子友誼尤厚欣然㰕航領客以渡步至寨近松隂可愛班荆且焉少息峭壁環抱若獅若象若牛馬然入谷清涼襲肌循石徑梯梯而上洞口谽谺湥窈邃若堂奧益以人力佛宮幽敞中有石鼓扣之隆隆外聞折而西五十餘步有濓溪書院僧以祀西方之教而周程之像置其隅又折而北四十餘步仰鐫濓溪聞有山岩即去尋亦躋雲外入松隂雖然未是洞中景且異人間名利心二十八字于其顔其趾石渠九曲則邑人孫氏之先鑿以娛客渠旁泓渟崖溜為小沼佳木異竹樹埀隂相䕃于是序齒列坐命少者從者挹沼注渠流觴而宴用前詩首句分韻賦者六人餘一字則聨句成之于時有苦思者有行吟者箕踞而飲者披腹而卧者㸃筆石角者髙情逸韵雖晉賢無以大過惜乎無畫史倣佛之詩章既就僧茶亦熟歸客于舍子安洗爵緝飲拈題雜咏期客于醉亦狂士也既徹巡簷而東乃履危磴躋絶頂萬山紛其如葉江湖極目傷心問僧所謂虎穴安在則云榛塞不可詣矣因記嶽武穆至斯岩嘗有詩云手擕竹杖訪黃龍舊穴空遺虎子踪雲鎖斷崖無覔處半山松竹撼西風恨山間無净壁可書以示來者歌罷黯然不能不為異代頗牧之思也已而餘景度山嘉惠濡翰題同遊名氏于石壁有言于列曰有宇宙即有斯岩至周子而名斯彰其後遊者何可勝紀俱無稱可嘆人生清逺逰實難在平世尚愳知己乖晤矧戰爭未息勝迹名流暢情邂逅豈可得耶復欲重集參差多矣異時回思斯遊恍若隔世昔人俯仰之間為之興懷良有以也盍序遊岩之樂使九疑陽華名稱于次山西山石城譽顯于子厚亦千載佳話也豫不得辭遂著所歷如此是日遊者余同郡梁材允匡嚴𤣥子安豫章龔昂宗楚汝南陳罃嘉惠暨允匡猶子助豫掃苔引渠行酒磨墨則生徒劉長安楫師劉元海書之報功也至正十八年四月八日廬陵王某序伯顔子中詩集序子中既斷髮自廢為民忠憤邑鬱仰屋浩嘆付之無可奈何而心不能自平時時以其慷慨之情憔悴之色一寓于詩又記其舊作輯為一卷俾豫序之余三復而歎曰美哉渢渢乎殆有唐之正音而陽明之氣也夫文之在天地間二氣之為也蓋陽明之氣在天為日月星辰在人為剛直為朴厚為豈弟君子其于物也為金為玉為麟為鳯為龍為虎為後凋木在地為原為阜為岡陵發為文章也英華俊偉明白正大如春陽如海運神妙變化而光彩不可掩抑隂晦之氣在天為雨雪為雲霧在人為諛佞為殘忍其于物也為鉛為石為梟為烏為虺為狐為葭菼在地為汜為巷為窪藪為沮洳得之于文也淺澀塵濁暗昧骳骫如寒螢光如焦穀芽讀之無足快人意者則是氣之為也然二氣升降無常而人之氣質可變而况于文乎自科舉來致力程試之文者雖一詩歌一尺牘往往如吃是小技之末且未能變况其大者乎由是觀之子中天賦髙學力至其過人也逺矣雖然詩之為道似易而實難言近指逺者天下之至言也先輩有云詩如鏡中燈水中鹽謂之真不可謂非真亦不可蓋所咏在此而意見于彼言有盡思無窮非風人所以感物者乎子中與余同舉于鄉知其業三百篇者日與上下論議故以余嗜好之偏陳之子中今無民社之責將翔于青原白鷴之間肆其力于文字則余也葛巾野服陪乎杖履之末尚取新作玩繹之東野之拜有日矣始書此以志讀稿歲月云時戊戌日南至也嘉林髙氏族譜序先聖王之勤民也井牧以食之比閭以居之庠序以教之德行以舉之使之安其田里服其教訓出長入師無轉徙無遊宦故族黨昭穆秩然其不紊自里選廢而井地壞小人失業也或受廛為滕國之氓君子出位也或留滯于桐鄉之愛同源分𣲖人異世踈問其所自三世希不失矣嗚呼此有孝弟之心者所以油然于譜牒也而况名賢之後乎安城髙氏謂自韓王瓊以下歷歷可考遷其近地嘉林則如心𣲖也如心以里老生所為譜序示余載真宗御製韓王之贊曰冠佩儼然肅以生敬氣貌毅然靜而能勝邦家之光社禝之鎮澶淵之功齊名終慗文信國公題其家云澶淵却敵功臣裔元祐簾垂大母家及安城之有髙家井猶魯國之有顔氏巷若然則為簮纓世族信不誣矣抑余願有言焉凡在斯譜者思吾身名賢之後則必仁義存心而不事于鍥薄詩書淑身而不流于庸俗耕桑以殖業而不為遊末之民使人見之而起敬曰此髙韓王後也信乎合抱之木千金之子非步仭之丘三家之市所有也斯為不辱其先矣若夫視禮法為虛文議問學為迂濶而諉曰此先訓也則非余所敢知如心作而謝曰吾家子雲老不曉事敢不敬共朝夕以無忘先王之戒詞余也䔍鄉曲之愛與如心邂逅于岑南見其﨑嶇兵亂猶能以譜牒為事既勉其歸復叙其譜而不能不致王道不明民志不一之憾于後世云仙館春集序至正十八年秋有若南霽雲之求援賀蘭者事已無可奈何寄跡嶺南真仙觀觀在岩谷間上有神女祠相傳秦避世而遷者谷中巨石磊落如獅如象如虎豹蹲者如龜出暴如蟾蜍如筍立者或字之曰步蟾曰書林碧蘿蒼蘚間石刻猶可辨有因其髙下鑿而級之乘其坡琢而席之以為憩息之所泉㶁㶁絡石趾齧樹根隱見而下為瀑濺濺鳴水為樂看雲之朝眺月之夕往來嘯傲其中隱然如散仙而忘其為人間世也明年春末值雨餘霽後嘉木沃若可愛幽禽下上微哢生香時來飛塵不到正月既望壇前杏桃盛開嘉客咸集因觴咏以為樂用傍花隨桞過前川為韵半酣章或就或不就復掃苔展席樹下幽興愈暢不知日之將夕子中慨然謂豫曰鄉也與子躋層崖歷絶谷出入茅葦煙霧間跋涉數百里銜枚夜渡惟刀劍朔朔有聲曉睇神州青山一髮紅塵莽莽泪墮馬首壯志視馬伏波何讓今乃垂翅飲恨于此忘形爾汝陶情杯酒聊自遣耳非子孰有知吾心者乎不知明年今日與子何處抑馳驅河洛之間輦轂之下有不回思嶺南之跡者乎况昔之肥遁君子登臨于斯也烏知後來有同其趣然求遺風餘響已漠然雲關岫幌之外矣千載之下有如我者乎不馳情而遐思者乎子序溪壑之姿宴遊之興俾詩繼其後亦佳致也余遂叙其槩而志之曰伯顔子中四舉再魁于江西為分省都事勤于王事者也余則廬陵王禮忝任帥幕與子中同年而同志者也髙恕如心胡坦文奎皆斯文之彥劉厚尚德始興教諭李敬仲考信豐令尹同寓是山適出城而歸亦賦詩者先輩富州太守梅南劉中孚皆禮同郡也慕吾徒而共樂者里人李國明陳思誠羽士則有故而他適後十日命李敬書于壁俾來者寓目焉麟原前集卷四

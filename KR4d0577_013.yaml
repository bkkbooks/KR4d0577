body:
  text: 麟原後集卷一元王禮撰序白雲圖詩序嘉興王君可及之丞永寧也政清事簡時娛情翰墨形諸咏歌率多懷親之作古酃二令張君宗顔為作白雲圖縣之官署以寬其離憂而徴言於余余其將何以輔仁哉昔狄仁傑授并州法曹而親在河陽及登太行反顧白雲孤飛曰吾親舍其下於是仕宦而思親者千載以為美談噫吾意梁公於斯時也身縻爵祿而心切定省懷哉懷哉極目天末其思親也當何如哉卒之勳業昭於時聲稱垂於後赫赫在人耳目如昨日由此觀之士君子之含悲茹辛離親戚棄墳墓以效用於當時者志必有在非徒干升斗之祿而已也今王君以儒術起家作宰巖邑偕偕朝夕違親於二千里之外衣冠枕簟之適其宜羶薌滫髓之備其養者皆不得以躬眂如之何勿思雖然忠孝一理也能忠於君者即孝之移故蒞官不敬曽子以為非孝可及勉乎哉異日使國人稱願曰幸哉王氏有子如此庸非孝之大者乎逺邇之士得於見聞者咸因圖以詠其孝思余故序其概以為勸云白沙吳氏族譜序大傳曰親親故尊祖尊祖故敬宗敬宗故睦族說者曰人愛其父母則必推其生我父母者祖也又推求其生我祖者則曾祖也尊其所自來故敬宗敬宗故睦族窮困者收而養之不知學者收而教之此宗子法也所以管攝天下人心厚風俗使人不忘本耳今宗法既廢士大夫家亦惟明譜系辨昭穆以廣親親之道而已嘗觀虞夏商周禘郊祖宗其推而上之報本或至於數十世之上推而下之廣骨肉之恩至於無窮故周公兼制天下其稱兄弟之國者十有五人稱姬姓之國者四十人皆爵命之使傳國於後世當其時也有分封之榮有錫財之厚未有專享前人之澤者也欒郤胥原狐續慶伯降在皂隸叔向亦以為晉憂今之欲明譜系表世族者可不以古人之心為心乎西昌白沙之吳源於禾川其為顯族也舊矣名賢之序其譜者衆矣逺孫茂卿又合禾川之譜而重修之此尊祖敬宗之心也茂卿崎嶇兵亂間埀三十年一還故里卓爾有立以無忝所生族姓之在俘虜者悉收完之此叔向之憂也窮乏之不能自振者因可利而利之亦成周分錫之惠也易墓祀祖無間於闔族之間不遺乎數世之上非三代報本追逺之遺意乎茂卿不有古人之心也哉雖然在其族者茍能以茂卿之心為心謹其身亢其宗吳氏有不復興矣乎某於吳姻戚也故序其後以規魏德基詩稿序古者風俗淳美民情和厚故發於聲詩雖下至閭閻畎畝羇夫愁婦無不由乎衷素當歌而歌當怨而怨其言皆足以動人是故髙者黃河太華低者寒泉絶谷大者鈞天廣樂小者幽琴遺響遇之而神怡聆之而興逸非若後世摹倣步驟仰探乎風雲月露之滋華俯掇乎草木魚蟲之品類及玩而味之求其戚戚於我心者未之有焉何也發之者非其真心也嗟乎安得能吟之士與之誦詩三百以涵養其性情之本哉錢唐魏德基以清才茂譽出仕於時司征於吾里之永和其為人也一介不取豫氷有時而讓其清蘖有時而畏其苦進思忠君而退思報母若是非其本之既立者乎故其為詩也隨意之所欲言而非衆之所能言無摹倣無蹈襲異於世之愛惜情思者逺甚使因吾說而推之涵泳乎國風雅頌以為之本沈浸乎漢魏晉唐以為之佐豈不愈有過人者哉德基數以詩視余余既得其詩且慕其為人方將采之以觀而余友夏彥琛又以序請余故序其稿如此而深以詩之大成者望於德基焉贈劉學雲序古稱王謝家子弟蓋風氣自與常人殊其階庭之間聞父兄談經訂史評論人物商略世事以至醫藥卜筮衆技之說莫不入耳注心視齪齪之士敻異吾廬陵須溪劉大博從子雲西先生經濟之外雜學尤博洽晚以利濟為心富蓄良方嗣子學雲以前人心為心多所記憶余友李夀朋嘗患疽腰脅學雲用藥治之拔毒荄去死肌不數日奏功而不伐善因記學雲嘗與豫談其尊父以暖木杖贈虞閣老篇章往復前輩風流依約可見今又因其一技之善而知其他美之得於階庭者有未易窺其涯涘也或曰昔人以主癰疽譏宣父子於學雲何與之深耶余曰否否是疾也豪傑之士懷忠抱憤往往有之不遇良醫飲恨以沒使學雲生於楚漢爭雄之際而范亞父得一遇之則亞父之生死未可知而楚之存亡未可决可謂其一技而少之哉蘇子曰增不死項羽不亡當時茍有良醫能續一賢之命脈則一賢能續一國之命脈世稱上醫醫國殆此之謂歟夀朋德之而徴言以報豫故著故家子弟之所以異於人而非世俗之以醫名者比也學雲一字龍淵云送王𤣥石序余觀古昔英偉特達之士其乘時立功雖事之至難至重攬為己任而不辭逮夫機㑹既殊察微知變則一切棄而去之如委蛻此非識趣之髙深謀逺計過人者哉鴟夷子之寄跡五湖留侯之從赤松子遊可謂晚節末路能自全者矣當斯時也想其視富貴如聚沫視功名事業如石之藴火擊焉而暫發其來也適然其去也脫然豈有幾微遲留顧惜意哉袁之古蓱有簮纓之裔曰王氏往余舉於鄊其族𤣥石為江西行省知印邂逅鍾陵逆旅知其意氣奮發志於功名者也後乘時積官至理問人服其能而風塵澒洞不相見者二十餘年矣近嵗乃聞有以地理之術稱於吾郡詢之𤣥石也其貌蒼然其鬢皤然而胸中耿耿者尚在也嗟夫謝圭組之榮樂林泉之趣其登山臨水悠然遐矚不過寄其泛五湖從赤松之興耳時之人豈真知𤣥石哉今年夏留余溪上踰月將歸古蓱贐以言者浮於貨顧何補於𤣥石而猶若有望於余者余故嘆其識趣之髙同符古人因序以贈雖然秋髙氣清尚當攜一筇與子履羣玉之峰以觀乎曠邈㟝嶁之融結也子姑往石門隱居序豫舊聞汶原王氏在宋有胄監弟子員曰梅邊先生忠義孝友人也誦其文想其人恨不同時執鞭焉後嘗過其里樹林蓊藹雲烟相滋蔚乎在望知故家喬木尚無恙也又恨階庭蘭玉未嘗挹其清風雖欲訪斷簡遺編以證文獻其道無由近留郡城始識其諸孫子琛溫乎其容藹乎其言令人益慕其先內附初帥帥師至安成多子琛之才俾籍民為軍而授之長子琛曰下里喪亂之餘民存者半若復驅之從戎則田卒汙萊閭井為虛推所自來咎將有歸矣吾可貪一日之浮榮而使一鄊受實禍乎於是力請於帥願輸資以助軍儲以寢籍民之論里中今日耕食鑿飲長子老孫弗離土宇有不德子琛者哉洪武八年築室於故址既成命其子曰室幸茍完持家詒謀在汝而已石門馬峰先母有丘焉其下山崇而水清境幽而趣逺别營環堵之宅吾將佚老乎其中既又擷其景之勝者有八而賦咏之士友相率遂歌以揚隱居之美而徴余序之豫觀子琛志行才業使效用於今世豈無可觀顧乃崇恬退之風以利其鄊人篤孝友之實而繩其祖武若斯人者吾見亦罕矣又惡得愛於一言哉遂為序其槩而復歌之歌曰石門兮崇崇我所思兮在於馬峰緱山瀑瀉兮夏沍桃源花炫兮春融啓逸思兮樵夕唱發深省兮寺曙之鐘山雪霽兮嵗又冬密賽北嶺兮有梅有松何所獨無佳趣兮我奚逐乎塵蹤于嗟軒冕兮戕子之躬彼咸闖夫寵之門兮孰知余之所從攬勝取適兮隱居以從容離世之士兮逸民之風夏𣲖劉氏族譜序民之初生得姓受氏以來不知歷幾百世顯之極者其後必微微之極者其後必顯宗法既廢譜系不明雖身為名賢之後不自知也顯者果可羡而微者果可忽乎近時勃興者多畔本生而援世族以號於人曰是吾宗也尊者叔之兄之卑者弟之姪之而世族之後艷其勢利而甘於自鬻者亦以為然於是譜牒閥閲有不足信者矣吁可嘆哉夏𣲖劉氏原於安成固岡始祖偃南唐保大間徙廬陵夏𣲖於今四百餘年矣學者薦者纍纍不乏而仕者類二令而止仕宦不甚貴業産不甚豐同姓之勃興者鮮有羡而援之而其子孫多嗜學亦不肯艷於勢利貶損以下人譜雖不修吾知其不混淆也審矣其孫述以其尊府楚山公有志未就遂繼述而修之深恨名賢序語燼於宋元之季既而逺宰山陽書問必以徵余序譜戒其弟今山陽又遷洋縣而余未償宿諾愧負多矣雖然族在於廣孝弟之心而不在於譜譜在於明昭穆之次而不在於序豫之序斯譜者不泯山陽尊祖敬宗之誠亦使世之人知畔援為可恥而艷於勢利甘自鬻者為可僇也嘻湖山雲隱序南昌為江右雄藩湖山之勝甲於他郡然古往今來攬其勝者則殊尚憶承平時東湖百頃泓澄淪漣埀楊匝堤烟雲縹眇亭榭隱映如畫宅其幽者婑媠充於後庭絶塵實於外廏聲樂不絶於堂廡烟火不熄於庖厨雖古金張無以過之然去之二十餘年白紛重遊蕩為虛莽新人無復有知之者逮問孺子亭祠兒童咸指以相告棟宇年深勿替益修因念孺子知漢厦將傾非一木所支躬耕湖畔以食其力與株塊何以異而聲稱至今過其地者挹髙風千載之上思見之而不可得輒遲回俯仰久而忘去湖山亦以之而重此其故何哉同邑有曰升雲者豫同姓也僑於南昌攬湖山之勝而搆室焉湖光雲影郁然几席於是字其顏曰湖山雲隱大夫士亦有以咏歌之豫雖未識升雲而知其志有可尚矣雖然鄰湖山而攬勝者非一人也升雲于豫前所言者抑知所決擇哉其友庭賓言其善事親喜賓客又繪圖以遺之豫故樂而為之序送李學則立孫後重遊㑹昌序曩勝國承平時吾郡儒士之盛往往散而館授贑之屬邑若㑹昌又閩貨之所趨其物産服食資用甲於他邑俗稱小福州士之留滯久而忘返間亦有焉豫嘗於方壺常侯座上識吾郡李君學則恂恂信厚士也時李職教湘江與語數日别去自是八表塵昏友朋聚散雲收雨絶邈不相聞者動纍年各奔走性命不暇豈期有今日哉丙辰之春豫以訪求遺文至積阜歐陽氏其孰賓仲𢎞來見詢之學則從子也能道季父館授湘江如故前年歸葬母與兄於先人之兆今年復歸命允毅之子為其姪兆誠之後命從弟近仁之子為其子柔之後不以卑踰尊疏踰戚秩然天叙之不紊雖桑梓繫念然湘江人事之密且久豈能遽置於懷哉重遊驪駕發有日矣願先生序其行也豫聞惘然既喜學則亂後能歸異乎留滯忘返者之為又喜學則立後協於禮異乎世之以逺間親而啓紛爭無窮之事者然後知儒者之處置得宜非流俗庸衆人所可及也蓋韶州府君蕡者首以科第開李氏之祥則韶州而下枝枝葉葉孰非其根幹之所發但使生意續續不已益滋培之異時惡覩不凌雲干霄如韶州者乎必復其始實兆斯今豫於學則昔有半面之雅而今有交臂之失得無懷舊之情乎故山松楸鬱乎在望階庭玉樹璨若成行學則北還之斾不可不早計也豫日望之允毅即仲𢎞云送沙本中入蜀序沙君仲良往尉吾邑時以公委至吾鄊相與往還論議其子本中侍側尤疏通可人意世情轉燭於今二十餘年而仲良不可作矣本中涉世艱難謙重有守卓然自立可謂難也已矣去年以季父官於長夀不逺數千里往省死生契濶感嘆何極倚門在念急急遄歸示豫以季父訓戒之辭猶足以見世家餘韻曽幾何時又以入蜀來告且求一言以自壯豫謂蜀道之難天梯石棧百步九折黃鵠猿猱尚憂難度而趨者日衆履馳如夷何哉利欲梏之也本中處有竹林之思出有白雲之想行邁靡靡中心遲遲必聚廬完處骨肉相依而後跋涉險阻之志定則斯役也義也非利也行以利吾無取焉行以義君子所尚也于是序其情以道其行章氏家乘序晉唐以來最尚門閥故當時士大夫家惟譜牒為重以豫觀之門第高者初不係仕不仕也孔門四科德行優於政事氏族而有顔冉之徒則天下古今之論門閥未能或之先也是故荀叔慈陳季方以先生處士班於司空鴻臚譜中而不怍向使司空鴻臚非其人有不自愧矣乎顯者之為榮隱者之為高其重有所在而不在仕不仕也金華章氏之譜逺者不可詳而可徴者今二十世矣在宋得象子厚以仕宦顯其隱德弗耀可師仰者具於景行篇是章氏之為望族不専係於有官君子尤以第五何必減驃騎也豫竊以為顯者必司空鴻臚始無愧於先生處士之高隱者必𤣥行獻文始無藉於司空鴻臚之榮不然則衡門棲遲而已耳富貴利達而已耳奚足起人敬慕哉嗟乎士君子之所樹立在天下後世孝子慈孫百世不能易也若章氏者可覩矣其逺孫道庸丞於吾邑溫厚有守示豫家乘億其辭色似欲得豫言者故以豫所見者書其後若其系次譜圖之詳則有諸賢之序在奚容贅義濟方選序醫者所以明一身之造化血脈流行之所以合於隂陽五行者何故非儒者不能通也古之醫神聖之妙雖儒者且不敢企及後世醫乃流於方技出於儒下果何望其明於理以濟人之病哉不明於理而惟方是據則本欲濟之而適以費之矣豫友蕭志通儒者也懲創少年不知醫致親誤於藥抱終天之痛發憤參訪奧論廣求良方濟疾苦期於無憾名其集曰義濟方選凡四十八卷蓋有所激而為也天下之事凡有所激者其操心必切其用工必深而收效必逺況志通儒以明其理醫以精其術又兼針灸以佐其功其於利濟豈不博哉方將類其書鋟梓以傳則惠澤且及於天下矣昔東坡居黃岡與蘄水醫龎安常游亟稱其醫由是名與東坡俱傳龎亦儒家豫與志通無能為役也姑述其志以序義濟方選云贈劉本和序古者二帝三王之治天下也一道德同風俗而已及其教明習成之後雖九有之廣千嵗之逺斯人所守者一道詩書六藝之外豈有他說哉及周之末世則有戰國之游士謀詐用而仁義之用窒先王之遺文遂廢而不講逮秦之禁大道榛塞固然莫知也漢興百氏雜家怪奇可喜之論蜂起於世於是人之嚮末而遺其本者衆矣晉唐以來士大夫多喜游於藝或書或畫或嗜音律自謂清致然視古之為學者愈逺豫嘗論之游藝者貴乎動息有養茍朝夕從事而無益於己雖工矣不幾於玩物喪志者乎夫書之與畫於儒者翰墨為近琴之在音律於樂器為古常有志焉而未之能也豫友劉本和詩書餘力學琴以養其性而箏笛哇淫之聲不接乎耳畫蘭梅竹石以厲其操而人禽山水宫室器用未嘗寫其形可謂善擇藝者矣豫既喜其游藝之精皆時之君子所尚而猶舉古人之所學者告之誠欲其本末兼通內外交養以入賢士之域豫之期於友朋豈如斯而已乎送子芳歸隱黃嵎序族孫子芳幼孤而立稍長以推擇為吏奔走承順於長二於今三年矣廬陵素稱劇縣又附郭供億煩重子芳耐以處之事無不集一日悠然解去歸隱黃嵎之野為邑者留之不可字其室曰嵎隱若將不求聞知以終其身焉問其志則曰人豈不自知才各有能有不能耳不肖之從事於斯也自顧謭才不足以勝叢務猶以壞檣短纜駕小舫於風濤浩渺之中其能必其有濟而先登於岸也乎今不忖量後悔何益況太母髙年八十先人不幸蚤世終養之責在於季父季父又不幸逺役於外太母餘年晨昏疇依奈何舍己所事而汲汲藝人吾懼貽譏於賢者深矣豫聞其言而欷則語之曰芳也爾之見加於人一等矣知才之不足以剸繁而退之可不謂一事之智乎知太母之養不可以他屬而思娛不可謂非一行之仁也仁智之不昧謂不為君子之歸吾不信矣芳力行之亦以觀子之確豫宗人之耆英者也獨嘉其歸隱作序以贈林泉生字序由宣溪而上入永新之境有林窅鬱而坡陀是曰坪上有泉泓澄而流波實為西江里之劉氏居焉季琳吾故人中子也承家膺門綽有令譽一日謂豫曰昌黎韓夫子謂大丈夫不遇知於當時坐茂樹以終日濯清泉以自潔歐陽公亦云䕃長松藉豐草聽山溜之潺湲飲石泉之滴瀝此山林者之樂也每懷此境泠然如執熱而御清風常欲以林泉生自名先生以為如何無亦因是𢎞我以大道可乎豫聞而喜之則告之曰子知木之為林者乎其始也方苞方體或條或喬茍無牛羊之牧斧斤之入則其天者定雨露之所濡風霜之所固斯有干霄蔽日之勢而為當世之大用矣君子之才力似之抑知水之為泉者乎其始也方毖方沸或檻或側茍無泥沙之混蛙黽之汨則其原澄徹妍􅑦之可鑑毫髮之可燭及夫合長淮清渭之流而為天下之至潔矣君子之性分似之人能逺取之物以明其理近察之身以盡其道則林泉之微妙不在物而在我矣之二物也庸非我進德之機乎况托生於林泉之下庸非天下之至樂乎季琳聞之津津然喜形於顔面充然若有所得請書其語豫惟季琳實進士左君介之倩左氏於豫為世姻進士於豫為心友故期望季琳為尤切而非常情作林泉生字序以遺之麟原後集卷一

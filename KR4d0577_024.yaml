body:
  text: 麟原後集卷十二元王禮撰雜著王氏典郡楷法述竊聞生日稱賀三代秦漢未聞其禮至有唐之盛昉有之蓋當是時海內清寧民物殷阜上自宫庭國都下而州里閭巷莫不遇初度崇晏樂以相媚恱沿循至今以為常典于是王公大人之生日門下士爭為賦頌以贊功德四方部屬競為瑰竒靡麗之獻以希寵幸果何義哉吾廬陵守相王公嶽降之辰實六月六日也伏惟登門墻辱顧遇亦一年于兹矣于斯際也道古今而譽盛德既非固陋之所能為而饋儀物奉殷勤又非事大賢君子之道夫以公篤實英偉之姿正大亷介之􅋵則為此者將寵幸之難希而譴呵之易召也然舍是二者獨無一言忠告之可獻乎自漢而降郡太守之賢者未易枚舉而吾王氏之任郡寄足為二千石楷法亦自代不乏人姑舉其所記憶者為守相誦之王尊為安定太守到官出教告屬縣曰令長丞尉奉法守誠為民父母抑強樹弱宣恩廣澤甚勞苦矣太守以今日至府諸君更宜勉力正身王堂拜巴庸太守巴庸清淨吏民懷惠為之立生祠王朗為會稽太守舊祀秦始皇刻木為像與夏禹同廟朗到官以為無德之君不應祀于是除之王導遷丹陽太守加輔國將軍上箋曰今日臨郡不問賢愚皆加重號輒有鼓蓋有不得者或為耻辱天官混雜朝望頺毁導忝荷重任不能崇浚山海開創亂源謹還鼓蓋加崇之物請從導始庶令雅俗區别王况為陳留太守以德化民永平中蝗起彌山遍兖豫至陳留界蝗髙飛不集王居正知婺州大將張浚請于上有田在諸郡丐免征徭居正言兵興以來士大夫及勳戚之家科敷與編户等蓋欲上下同力一心共濟國家况將相之臣乃不能體此乎王堯臣知光州歲大旱群盜發民倉廩吏法當死克臣曰此飢民求食耳荒政之所恤乃請以減死論其後遂著為令苟守相行事光明磊落皆如前人則他日名繼一王之後傳之無窮其為夀祉不既多乎因思昔者開元之際千秋令莭侈矣曲江張公不以貴戚近臣之所説者獻其君而以治亂存亡之鑑獻其君端平以來達官慶夀亦云盛矣西山真公不以四方牧守之所獻者賀時相而以諸葛武侯開誠心布公道集衆思廣衆益之説為書以獻自當時觀之疑若違衆自異者由今觀之彼衆人之愛其君相者與張曲江真西山之愛其君相者孰為至耶某之于真真之于張時之相後若此其久而君子愛人以德之意其揆一也守相誠能即前人之所己行益推其類以盡其所未行則太平盛治將由一郡而放之天下豈不赫赫在人耳目哉詩曰心乎愛矣遐不謂矣禮之謂也又曰樂只君子邦家之光樂只君子眉夀無疆守相其有焉故述夫羣賢當世行事之迹揭于公堂以為蒞政之助云爾太守雨辨洪武七年夏四月不雨郡太守徐侯嘆曰頻年豐裕民猶無以供賦今禾荄初行而四野塵稿後將若之何遂偕廬陵王君道亨由青原遍走群望詰朝一雨三日優渥沾足于是歡聲載道咸曰此太守雨也或疑其佞王某聞而折之曰是實太守雨也名之者當子惡乎知惡乎知今之郡守古之諸侯也先王疆理天下畫界分境諸侯各祭社稷及境內名山大川是故太守賢則山川鬼神莫不從令蓋千里履封之內鬼神民物皆其管攝氣機感通分之所至也太守賢且誠山川之氣有不聚而應之乎况出雲雨者山川之職也太守賢且誠斯山川效職雨暘順序而民物鬯遂矣雨而歸之太守豈佞也哉昔宋均為九江蝗不入界劉昆為𢎞農虎北渡河皆山川之靈郡守之賢也物之妖者有以拒之氣之祥者有不致之乎作太守雨辨縣令針廬陵劇邑也平世號難治况今日哉兵亂以來田萊而賦弗寬民匱而用愈急舒城吳侯為邑長于斯也子視其民衆咸德之于是徴丈于邑之庶老以寓美報某不得辭賦縣令針一首粵惟縣令擬男于古奉宣德化以作民父母和寧慈君汲有信父謂子懷群黎載摩載撫能名赫赫循吏所弗屑為潁川四長並仁善篤誠人自不欺矧茲甫輯宜綏靖是思譬赤子啼飢而乳之以時猶牧牛求芻鞭服少施是用弗轉于殘羸嘗聞醫師療人病既少差又慮夫元氣之微猛劑不蒸惟參术是資洵美令君蘇枯起萎志在養生得時措之宜允恕且恭民以弗病匪惟上之供而下焉是浚宜此永譽昌于世胤爰記諷詞庶朂從政平陽王氏世次志王氏之先出自周靈王太子晉後為太原琅琊二族太原臨于平陽平陽王氏太原之支也平陽之裔宋季因仕家三山有曰復字子陽洪武三年皇明設科求賢閩省欲得公正耆碩者較群試之藝子陽奉命乘傳二千五百里至禮之廬而委幣焉辭不得命至閩既事子陽乃請曰復系出平陽家乘逸于兵亂念纍世單門旅人無宗屬父兄可訪往事惟復粗記其槩願一語以志源委俾後無忘某忝同姓不敢以固陋辭敘曰復之先可考者六世祖諱伯大宋某年第進士積階至金紫光祿大夫太師資政殿大學士有學有文人稱留耕先生配姚氏封永國夫人繼鄭氏封榮國夫人值國難太師薨于閩諡忠文公葬福寧子男四人伯諱積翁字耕存元初內附授榮祿大夫江西行省平章政事政尚簡靜尋歿于王事上嘉其忠諡忠敏公賜田三千畝蘆蕩一千畝優其後人建報恩寺主其祠事俾其子都中襲父爵丞相伯顔奏都中年財十七重任非所宜宜使臨民習政于是授平江路治中改浙東副元帥歷福建海北憲纍官至正奉大夫江浙行省參知政事亷介自持篤學下士令譽翕然既殁諡清獻公父子俱葬姑蘇子孫因家焉仲諱某仕至朝請大夫循州路同知號竹窗歿葬懷安叔諱剛中由提刑按察使改婺州慶元總管兼府尹升中奉大夫江東淮西福建三司宣慰晚號中齋娶洪繼陳亦葬懷安季諱光祖中大夫寶慶路總管號南湖散人殁葬晉寧循州寶慶之後寖以微絶惟宣慰公有子曰畿蔭授福安尹改永福尹字雪屋娶黃氏封宜人歿葬懷安永福之子曰讓字仲恭蔭漳州務提領歷閩安髙泉巡檢長泰簿福建鹽運司監運除敦武校尉上杭簿娶蘇氏祔葬懷安子男二人長即復蔭建寧倉官歷泉州市舶庫提領侯官務大使福州路録判而世易矣次曰友諒兩浙鹽運司奏差早世某惟平陽之族盛衰于漢唐五季之際者不可知而由宋逮元簮纓烜赫在人耳目猶尚如此嗚呼非世德之隆曷臻是哉子陽謙厚篤實有鄉曲之譽無勢利之競兢兢焉懼隳其家聲惡知漢世以清亷著名者不復見于今日某故為著述平陽王氏世次志一通俾藏于家使後之覽者重本原之思懷笏組之舊力學以發其身作善以亢其宗異日將門有將相門有相不在兹乎不在兹乎瘞犬志余任贑時寓家于雩有餽黑犬雛者稍長代貓有功動靜率解人意主適外必隨叱之返倣徨帖耳不忍去回數十步駐足目逸逺不見冠蓋始還舍逮歸俯首俯伏若拜不自休後二年浮家東歸家僮搖樵艇載雞犬器皿尾余舟行下皇恐灘縱之岸忽風順湍駛不得收自斷必失乃穿灌翳望舟疾馳百餘里舟至亦至嚴霜必卧篷上若防警然過家家久墟矣狸獸交迹雖無雞無能畜者自是巷曲晏然時夜繁滋親戚有及門者曰斯犬目深銜濶趾密而尾輕獵材也惜無人出之負其駿耳假以合圍不獻其技而逃歸數日復求易之余止之曰彼必不肯違舊以從新歸而有阻利他人矣是冬復辟地曲溪永和書畫米粟悉置樓上犬未始登樓鼠引幾夜增竹柝驅之卒莫能禁犬在下呌噉不勝其忿于是令童豎掖之以登樓次夜即不待掖已而升降甚習聞影嚮即至捕獲無遺囊橐不廢壞皆其力也近病癬赤立憐其寒命女僮衣以廢襁越數日將斃適有山農艘槱至者願輸數擎得之余曰斯犬相從危難之間有功多矣忍令人烹食之耶斃即深瘞墻隂實壬寅臘也嗟乎受𠂻秉彛以生者食君之祿不肯致身以除害又安然違之余惡乎不悼斯犬之喪豫惡乎不悼斯犬之喪作瘞犬志䇿問問仲尼洙泗之教陶冶賢愚初無厚薄增損于其間然觀其異同之際去取若有可疑者其使漆雕開之仕也開對以吾斯之未能信則恱其論乘桴浮于海子路聞之喜則曰由也好勇過我無所取材夫漆雕開拒夫子之言是與夫子異見者也而夫子反進之子路喜夫子之言是與夫子同趣者也而夫子反貶之豈聖人于群弟子不欲其苟同也與然三千之徒顔子最善學夫子者也步亦步趨亦趨終日不違于聖言無所不恱是亦類乎苟同者也聖人又何為而深取之耶其必有説願相與辨之問聖學之大原夫子以一貫授曾子盡之矣而曽子之語門人乃不曰一貫而曰忠恕何與子思子親出曾氏之門而其言則曰忠恕違道不逺豈忠恕自忠恕而道自道與師生之説若不相似然其旨安在夫子亦嘗告子貢以一貫至答終身行之之問而蔽以恕之一言而忠不與焉其去取殆必有説也孟氏願學孔子而紹曾子子思之正傳其論自反則釋恕而言忠其論求仁則釋忠而言恕忠恕果二道耶果可分而言之耶凡此皆疑而未諭者願明以告我問若聖與仁則我豈敢是其道至大雖聖人有所不敢居豈他人所能與而周公之制禮列仁聖于智義中和之間並舉以教人且以此待天下之學者而無所輕重周孔豈殊道耶孔子答子貢博施濟衆之問曰何事于仁必也聖乎是仁之與聖有優劣也且仁之一字夫子所罕言然其立言其問答及于仁者不可縷數至于聖初非夫子所罕言而載于論語反不若言仁之多又何也夫子許伯夷以仁止目之以賢孟子許伯夷以仁遽目之以聖其説復安在耶問語曰窮經將以致用所貴乎致用者必儲實理育實材而求實效也今之學者論學則宗孔孟論治則主三代論保民則曰發政施仁省刑薄斂論律身則曰孝弟忠信禮義亷耻發于言筆于紙非不粲然可觀也就而索之則冥然而昧也枵然而虛也意者騖干空言而未嘗從事于所以言而求實用耶今姑與諸君商之孰不言聖學之當明也諸君各指實見志當何所期力當何所用孰不言王道之當修也諸君各條實事何者而為綱何者而為目佛老亂真者也勿徒曰清虗寂滅盍的言其亂真者安在申韓害正者也勿徒曰刑名術數盍確論其害正者孰存凡此數端具以實告母徒襲先儒之遺言作書生之陳語以仰稱明天子教養之實德斯無負諸君之實學其悉心以對問科目之設三代以上不可詳經典所載莫盛于周大司徒以六德六行六藝教萬民而賔興之可謂本末兼該內外畢舉矣漢興有孝弟力田之舉有賢良方正之科自時厥後秀才孝亷二科常行唐則秀孝衰而明經進士獨盛宋因唐舊至王荆公始變其法罷明經而取進士其法果可常行與或謂漢之選舉有以啓西都良吏之盛宋之科目有以成慶厯諸君子之風然與否與歷代制科所以待非常之士將非常之士必待制科而後出與近代安定胡氏教法則有經義治事二者之分明道程子奏疏則有經學性行才能三者之目考亭朱子貢舉私議則有所謂各處解額半取德行半取經學三先生之説同乎否乎將安所折𠂻而可以合于古宜于今願相與究之激孝永新龍潭洲有業􅋵舟以食者周其姓酉一其名元季之亂辟地廬陵篁灞有父年近八十不敢須臾離有所適無逺近必稟命乃行歸期無敢晷刻爽父不見即呼之既至了無所云而酉一恂恂侍側無幾微厭怒意隨所得必市甘脆以養常戒其姊與妻曰老人體猶枯樹不能飢寒飲食貴及時且宜燠姊與妻亦遵其言而酉一有未及親視猶慊然于中其後父益老病且殆時酉一受人直擬運糧入郡城或勸其留老病者于在岸之舍俾姊與妻時其藥餌在舟倘不測懸隔纍人酉一曰吾一時不在親側將親之心與我之心俱有不得其寧者焉遂載以俱至郡城外夜必望斗拜且籲曰細人有父艱食矣度命在朝夕願少延餘息俟歸至篁灞則不子之罪庶其寡乎果如其禱歸及灞岸始絶衣衾棺斂順便以葬之人謂其孝感左君齊賢每見豫輒道其事亟嗟歎之且曰今世簮纓之門詩禮之族其宫室妻妾車馬佩服之奉下視酉一之微賤曾不若土芥而盡孝不愧于斯者幾何人哉又曰人之不能事親者多諉曰失學酉一曷嘗讀書而純孝若是讀書者或愧之豈讀書者騖于空言而忘其實踐耶又曰父子天性惡有後其親者無亦古人所謂孝衰于妻子歟齊賢永新簮纓詩禮之裔亦僑居篁灞三世矣故悉酉一之孝行而言之若有所激嗟夫君子取人之善豈以門地哉豫特筆之以愧夫蒙鐵爐步之名而甘落黃帽郎之下風者且易酉一之字為益友以進之云送吳茂卿東還引茂卿良士吉郡名家少負不羈之才蚤有逺遊之興三十年豪族豈能局促如轅下駒千萬里歸來但覺回翔似遼東鶴孰兩東門之蕪可覩或三荒徑之菊猶存報本追逺而事鬼神尊祖敬宗而修譜牒卓矣超群之見藹然懷舊之心奈于帝王之畿既以占籍是以父母之國亦許駐襜望并州而是故鄉思潁水以償夙志但親戚慰恱初盍簮于契濶之餘而僕夫倉皇又艤舟乎炎蒸之滸于兹分手亦難為情爰各咏于離聲庶少光乎行色鳳城朝雨不須唱徹于陽關鷺渚秋風更兾有懷于杜曲一言為引多士遂歌訟齲齒文江南生久入耆齡忽患齲齒遇羮虀而俱拔犯酸堅而輒死飲則釁生飯常中止風耶蠧耶厄我如此昔也排拶今也砑豁齪齪孔開齾齾鋒缺坐觀狼餐枵腹其側骨鯁之舊久踈魚蝦之侣新接當喜而憂不瘖而默淳于傍觀袖手無䇿生乃齋沐斂襟叩身之神再拜肅穆兾其垂聼若曰物稟氣偏牙角翹然人靈萬物數齒弗堅厥咎伊何內省其愆豈若豪奪之家弱肉強食弗安其分獨肆已力惟思我肥寧恤彼瘠致天之罰使至斯疾豈若貪冒之吏饞民膏脂掊剋聚斂並緣為欺磨牙張口如虎如貔溪壑難滿節齫髓捶召身之殃使阽于危顧生所事出入文字非義弗由非禮弗履何罪何辜遭此禍盩明以語我過不可式毋苦微躬末疾淫滯時夜將半有風颯然靈兮神兮恍惚言傳謂生之微志行莫先齰經嚼史啖英咀妍逺遡太古旁搜百家唇腐齶爍搖其輔車談王説霸守正斥邪子之疾惡奮怒穿齦子之厲􅋵潄石求清皎皎者易汙容容者葆真人之致疾亦各有因胡不此思而忿云云吾將以爾之誠上逹于帝增爾智牙錫爾兒齒使既有年亦受繁祉勑爾天君飽爾仁義播告天下飫爾甘脆生聞是言深省潛砭舌利速殃齒剛有玷懲違改忿形迹靡見閉口藏舌沒齒無怨遣瘧鬼文疏放翁系出太原世為清門總角讀書無他伎能生産不事淡泊無營今者痁神倐爾下顧先寒後熱汗液如注沾衾涴席飲食錯忤顧惟老身何堪頻數敢告尊神試聼吾語牲醪非吝我實寒素謹偹潔粢𡨕錢一筐用訴愚𠂻遣子以行我居此土兔處狼窟初喜民淳今苦蟊賊外則強佃田不稅納年深月久報為己物里役受私掩蔽其册內則強類盜貨産業詭詐百端非罥秦舌恃其裕美欺我老拙暮景艱行蹇驂代步耕圃不樊獨見嗔怒時夜出間澤彼鬵釡彼惡弗尋顧我實誤隂府甚明豈容火度吾辭已殫各問津路登船上車請從此去題蘭竹蘭葳𬎼而下埀竹回薄以斜起淡與泊其相遭保幽貞乎終始贊紅梅障春動芳郊時莭默染胭脂香雪休疑冶杏夭桃猶帶氷霜標格贊彭志髙行樂小引其昔也有凌雲之志謂功業為可必其晚也有傲霜之姿以詩書為燕翼脫略風塵徘徊松石羽扇竹冠逍遙自適使邂逅乎山澤之臞未必不以為竹林之逸也贊龍圖潛則在淵見則在田德施之普擬聖配乾于嗟龍兮贊虎圖藏或負嵎用或守關感德渡河叛夫膽寒于嗟虎兮贊忠孝圖道是葵萱障也得道是忠孝圖也得莫言草木無知也具人生大節噫人見此花鮮無慚色羡爾傾心向太陽羡爾忘憂樹堂北贊貓犬圖維貓維犬維家之寶鼠竊穿窬莫我敢暴或無寐以防姦或素餐而忘報載繪爾容非資玩好昔圖功于麒麟託久逺乎丹青念爾勞之交修爰用播其芳馨重為告曰有形必神有功必祀蠟典可推有引無替各聼誓言勿荒女事我服我器暨我書契舉切吾身一不可廢毋使嘐嘐聱聱祗攪我睡于嗟乎蒙貴踰垣沃樞栁下之弟罄人所藏欲忽以遊遇則盡死以囓毋徒聲吠于嗟乎善噬犬曰善噬詞喜鶯遷甘霖停霤喜浩蕩湛恩躋民仁夀戌栁拖金海棠染綘報道宰官移綬轉眼積勞三考犬卧更深猶晝最好處似氷壺玉露十分清漻難有看里巷此日壯夫都是來時幼笳鼓迎風旌旗耀日旋築草堂完就自今四時納福遙對溟山如繡願嵗歲共桐鄉父老一巵春酒百字令夀老妻八十晨看婺女正流光垂照耆昌堂裏只為佳人延眉夀影入玉杯迎喜莫道春秋八千八百玄逺都難擬人生稀七古來登八能幾眼見繞膝孫枝烹羊膾鯉也有些肥美淡飯惡衣聊自足多少何能如你夫是謫仙金鑾待詔妻亦尋常比隨緣相守安貧况是王禮題疏華蓋山題鐘疏永陽之上曰華蓋山實萬姓祝釐之所革命以來缺蒲牢物昧五更深省之時况逄道宇之苟完豈有異氣之可掘敬資檀越謀就工倕結千人緣庶洪爐之一㵼成九乳器將遠韻之咸聞警塵世之昏迷作神天之供養春生筆下霜動人間謹疏東山題疏為無詰長老作伏以東山勝地實野史翁之故基龍衮七舉不第著江南野史西域法源有達奚師之遺迹記明月清風之舊寺有明月閣清風橋兼茂林修竹之幽豈期大地黑灰空慨前朝黃葉遂歸天竺庶見雨花事有大謬不然乃鵲巢而鳩處退將修吾初服或鳥革以翬飛叩諸賢豪發大歡喜莫令龍象久泣所望給孤將見金碧交輝真如兜率謹疏題東陂甃砌橋疏東陂石橋利便非一日矣年深月久橋屋盡頺磚亦散落過者危之習溪菴僧廣無量與東陂橋鄰謀擇殘材作亭其畔以休行者而化緣磚石重甃補之整舊為新方便苐一豫聞盛舉遂贊一言伏以東陂一派實會梅花水源千澗之流此路兩頭逺接茶陵湓浦數郡之境日千萬人商旅願出歲十一月徒杠乃成長者後來遂建石橋為千年之計遐哉深慮孰知屋瓦亦歷劫而飛今欲磚甃如砥之平必須工徒如雲而集非資乎力曷底于成况擬擇破毀之材作亭于其側庶往來困􅉵之客弛擔乎其間苟于財榖傾囷倒廪而惠然將見子孫髙車駟馬而過此好事好事大家大家謹疏上元院題鐘疏上元為院二百餘年矣代遷世易涉難摧殘近來竭力修葺雖近苟完而奉佛無鐘實為缺典用持矩疏敬叩大檀伏以院曰上元亦數百年而已久俱如鐘器非尋常匠所能成欲求鳬氏之駿功必藉孔方而聚力大檀那除一毫于氊上小和尚鑄千斤于寺中暮暮朝朝長作人天之供養鏜鏜鎝鎝悉令神鬼以皈依功德無邉民人有賴謹疏雜説二首至正乙未春禮筮仕安逺見有捕鷓鴣以媒與為花園陷魚者有感于中作二説山鷓鴣雛既長分其所食山谷于雛使各有分地有鳴其界者雛輒往鬪而爭焉土人知其性褊而好鬪捕他雛養以為媒置其界而設機縶媒鳴聞者聳其項忿然輕身以先竟被縶獲無能脫者惟老雄雖有鬪志進若遲上若思其雌又遮道勸沮之故陷者最寡嗚呼世之褊而好鬪不能且遲且思以受勸沮而墮于罟擭者豈惟鷓鴣也哉漁人編篠為圍罩溪澗中名曰魚花園立橛懸置水之半列石綴其趾設關棙于圍中採稻穗之嫩者餌誘之其始至喁喁圉圉且食且疑不盡而逝再則引群携類洋洋自恣穗日加魚日衆飽食滿意而去以為常如是者旬日始繫穗于關棙魚猶旋繞貪食恐後踴躍如逰龍少焉牽繫而棙發石確然墜圍以下漁者攘臂而至矣余觀斯魚也遇倘來之物飽食滿意而不知止使知快意不可常而中去斯不蹈確然之禍矣而竟殞身以償之噫麟原後集卷十二

body:
  text: 麟原前集卷六元王禮撰記重建濓溪書院記太虛之化絪緼升降於兩間發育萬物莫不各有固然之理而仁義禮智之性君臣父子昆弟夫婦朋友之倫則其最大者焉其或明或晦於斯世者係乎人焉耳堯舜禹湯文武周孔之道至孟氏沒而其傳不屬濓溪周元公生於千有餘載之後奮自南服不階師傅超然獨詣以上承洙泗埀絶之緒下啓河洛未發之言其功顧不偉且大歟觀太極圖通書等作根柢領要有以闡夫太極隂陽五行之奧使學者知由中正仁義而主靜以為之本決道義文辭祿利之取舍以振起秦漢以來俗學之卑陋此濂溪之功天下咸知尊而慕之章貢之有濓溪書院則非偶然者矣先生為南安司理時虔之興國宰程公珦假倅南安視先生氣貌非常人令二子師之即明道伊川也逮通判虔州二程猶往來在門政樂育英材時也河洛之學實源於此去之數世之下其神其靈未必不飛揚陟降於空同之陽章貢之滙於是表章遺迹以淑學者誰曰非宜爰自宋淳祐戊申提刑翟公繁創濓溪書院於二水之東門廡殿堂翼翼秩秩有教有養州序未能或之先也朔望惟提刑謁拜稱提刑書院在元悉仍舊貫兵燹以來莽為邱墟贛令崔侯天錫以世族為政有聲念周程講道之所不可廢也遂請於郡而謀新之凡為禮殿十二楹崇三尋一尺有五寸廣四筵有二尺深如廣而去其六尺道立堂十二楹崇三仭有五寸廣四筵二尺有五寸深視廣而去其六尺有五寸儀門之楹如堂之數崇不及七尺有五寸廣四筵有一尺深如崇之數靈星門三各二楹崇二仭有五尺廣一筵有三尺左右為廡皆十楹崇二仭有七寸廣十筵深視廣而去其九堂之西為道國元公祠八楹堂之前東西為諸生肄業之所典教之居列於學側繚以崇墉甃砌丹堊炳然煥然肖像儼如籩豆有序濬池種蓮環植松竹啓創於洪武二年三月畢工是年九月率諸生行舍菜禮告成噫侯可謂識政治之本矣前鄉貢進士金友德嘗為書院山長亦先後贊襄之命儒士趙敬來請記以昭久逺凡學於斯者想當時師友氣象而實用其力推其致君澤民之術達之天下將見書院之盛與睢嶽嵩廬為五豈不愈有可尚者耶用書以告其邦之人士使知自勉焉重修安福縣學記皇上臨御之初聿興文治思復唐虞三代之盛乃詔中外大小百司之臣崇學校明教化以基之於時海內郡縣翕然向風而廬陵文獻之邦奉宣德意尤恐或後其屬安福邑長薑君明慨憫是邑久為外暴所據今雖潰靡然欲化俗以復初宜建學為先遂謀及判簿潘君樞斬刈蓬荆爰創禮殿時經始煩劇公私赤立他則未遑也逮侯君志健繼為政始起明倫堂二令約爾珠又立儀門皆洪武初元時也四年冬天黨孫君以文學清才起為斯邑令其下車也既撫字其民人即惓惓學校為念於是構材鳩工東西兩廡各為十楹設七十二賢位次儀門東西各增兩楹為師生講肄之齋左曰日新右曰時習堂之前東為廊六楹中祠濓洛道統之賢西為廊六楹中祠鄉國忠節之士殿堂儀門蓋甃丹堊凡前政所未備者今皆奐然一新之守禦千户夏侯機湯侯祿知崇先聖之道咸匡輔焉七年仲冬始克竣事一時縉紳耆舊來觀其成僉謂學校繕修之役曩賴以為經費者今無所資矣興作惟此時為難宜勒珉紀實以示逺遂推學之士龍欽具本末來請記竊嘗謂教化實為治之本唐虞三代教民之法班班可考當是時民之由乎禮義免於刑罰者衆是以治隆於上俗美乎下後世道缺學廢宜乎茍偽之風成而雍熙之治不能以復見當在宋也纍詔天下郡邑興設學校其後作興風厲之至馴至民間書院義孰日增月益不可枚舉要皆教養之具備而後俊造之實成故能庶幾乎三代之治孫君學古者也首以學校為務其知政治之本哉真不負朝廷育才之心也哉雖然邑長之心勤矣學於斯者使能澡雪涵養以底於成異日膺民社之寄進顯於朝近之踵有宋之休明逺之佐雍熙之盛治以無愧建學初意顧不偉歟孫君名鐸字文振是役也縣丞趙禮主簿湯本洎教諭歐陽蘭訓導龍欽羅觀俱相其成者專董其工則儒生趙宜厚云畫苑記歐陽子云物常聚於所好而常得於有力之強好之而無力雖近且易有不能致之故豫雖有所酷好而制於無力悵然以止及見蘇文忠公可寓意於物不可留意於物之語於所好雖得之則喜失之亦不以愠意皆有數存乎其間同邑彭君志髙示余以其所輯畫苑人物林壑泉石煙雲鳥獸魚蟲草木之異態一舉目而得之類皆名工俊士之筆非尋常畫史之所能及雖其嗜好同於豫豫則不能致而徒羡之者有所制也故豫之畫本常在於岷峨巫峽天台海門江湖之間得之不必以力而有力者亦不能奪時艱以來過東西家如適千里惟重人間長畫老去恨空聞之感而已於彭君所輯得不爭先睹之為快哉雖然法書名畫皆士君子之雅尚也君之於畫采擷裒積有若苑者焉繼今堙罍沈鼎頺趺仆碣求其餘欵墜刻於寂寞之涯使天下聞碑名迹舉集几案覽者徐展緗帙而鼒鼐之潤篆籕之光輝映星斗尚太古之遺風可挹也豈不愈可快耶豫嘉彭君不象犀珠玉之好而雅尚清致又羡其逺且難者悉能致之而非豫所及然而聚散之相尋賞玩之何極慕尚之專者亦不可囿而滯也彭君以為何如題其後以記遂初堂記清江劉公非先生之孫某主簿永新因家邑之三井遂占籍焉逮四世生齒繁盛分處西門之外水窗頭五世有名士曰友益是為水窗先生元初代還邑燬伯仲就邑北舍東别業以居父子兄弟自為師友鄉鄰羡之尤博洽於史嘗著通鑑綱目書法大行於世有孫十三人而文貫長生於戊申之嘉平水窗喜其同己生之嵗月命之曰同壬辰兵亂闔門奔竄鄰境閭左相煽肆虐弱巢強居有年數矣亂定文貫白於公三訴於憲府凶暴伏辜卒復舊業於是相率弟姪聚廬托處而再造之功侔於創始矣一時士友咸稱詠之提舉雲陽李公一初為書遂初堂而序之文貫復欲禮有以記之既辭弗獲則慨然曰為子孫守成於承平之日易恢復於喪亂之後難恢復於喪亂類非有志者不能也惟祖宗經營創業全付我有家今乃有於強暴使祖宗魂魄倀倀無所棲依庸非為子孫之責乎責之所在雖有登天之難蛇虎之毒水火之厄所不敢避奮然直前無所顧慮卧薪嘗膽思償吾祖宗之所付必使舊物咸復其初而後吾之志始遂而吾之責始塞嗟乎此豈靡靡儢儢懦無立志者所能致哉若文貫非所謂士尚志歟非所謂克負荷者歟姑自永新一邑言之先疇遺構為強暴侵奪者何限而子孫能如文貫者亦罕矣觀其恢復雖家之與國大小則殊而慷慨激烈氣干雲霄隱然與劉文叔披圖撥亂之志同科殆未易與俗人語也文貫方盛時抱負經濟思少效尺寸於當世志與時違﨑嶇風塵以老假令生唐世得效一官於諫議有不移孝為忠揚眉吐氣國爾忘家者乎何至使人有神堯以一旅取天下而子孫不能以天下之嘆噫吾於是有感矣惡得不為斯堂記之雪齋記新安孫君彥能字其讀書之所曰雪齋豫聞而異之而莫知其意之所寓既而問之其友或曰孫氏之先有苦學而映雪以誦者君不忘昔人之清苦故名其齋以自勵或曰昔有學於程門者刻苦忘倦退而戶外雪尺君慕其人結齋而題其顔庶常目在之而有發也彥能笑曰是臆辭也非吾意也豫昔者遊息之宇成而天適雪如瑶林如玉城如水晶域光彩璀璨望之目眩對之神竦即之髮森而骨寒虗室生白如身在蓬島非人間世一時愛而悅之今雖有年數矣此景嘗往來於懷是以志吾齋况雪之德有五而世亦罕能知焉無塵清也皓皓一色純也盛隂乃降時也胚胎稔嵗和也不常為人玩髙也清以洗心純以一性時以適道和以利用髙以砥行雪獨非吾之良友耶豫得其語而思之自與彥能為友於今三年其為人也嗜樂不同流俗惟琴書自娛善吟善摸𨽻書與人交未嘗以貧富窮達異態汙隆隨遇不膠於物藹然熙然無崖岸町畦然風致自不可凡不少詭隨由此觀之彥能蓋深有得於雪之助也然則齋名以雪君子有不宜之者乎是為記吉安府重修經歷司記郡府自漢以來守皆有佐長史贊務司馬參軍名雖不同而為佐一也晉桓沖為刺史命處士劉麟之為長史麟之不肯屈沖親廷迎之孔休源為晉安王長史王深相倚仗嘗於齋中别施一榻云此是孔長史坐人莫預焉由是長史甚見禮重與郡守相可否相唯諾相羽翼而政治以成後世易名經歷始别為司在府之左更化以來廬陵復新郡治而司則仍舊洪武元年會稽宋君某以經歷長其司錢塘郝君某以知事贊其長俱宦族俱以儒術飾吏治未期月時和民輯上下翕然於是甃蓋繪飾煥爛絢麗登斯堂者心開目明郡守王侯見而樂之顧謂僚佐曰署宇之新過客顧瞻徘徊而不能去居斯宇者能新厥德以新其政人有不仰望者乎咸曰諾命王禮記其成以俟維新之治云雪隱記嗜其業樂其趣精神心術與之為一而不可須臾離者謂其隱於斯可也而奚庸迹之計哉是故夔隱於韶棄隱於稷鬲隱於魚鹽輪扁隱於斫輪陶朱隱於廢舉皆逃身其中而自得其趣豈必入山之深入林之密而後謂之隱哉入山之深入林之密而得名隱則與木石居與鹿豕遊者滔滔皆是也奚獨止稱其作者之七人作者止稱其七人則必得其精神心術之微而非以迹論也宜春朱侯志德美風儀善談論尤工寫竹梅於是字其遊息之所曰雪隱軒人亦稱以雪隱或曰雪可隱乎豫曰子求其粗而未究其精者也蓋雪非竹梅無以著其清竹梅非雪亦無以增其韻志德朝而竹梅與吾心術相謀夕而竹梅與吾精神相接夢魂栩栩又嘗邂逅六出天葩於瀟湘之濵羅浮之野其清韻何如哉逃名爵而歸於竹梅逃竹梅而歸於雪蓋得其趣外之趣而其隱也益清絶矣抑豫聞李伯時嗜畫馬一日往見法雲禪師師語之曰君後日必為神駿諷其畫觀音像以離之蓋知其心術精神之注乎馬也豫觀志德精神心術與竹梅為一有竹梅之清撡雪趣固在其中矣殆將見竹梅猶見志德見志德猶見清水寒露之在玉壺庸非雪隱云乎哉志德嘆曰子可謂知雪隱者矣請書以筆豫軒於是乎記草庵記噫嘻草庵欲記之久矣然遲遲而未酬者有所感也方子英盛年壯志不屑屑窮章句遨遊公卿間類功業可指取有逮夫歲月不貸華髮漸生乃遡南安之上遊訪前人之遺迹於是踰庾關登韶石以望蒼梧下曲江而觀乎昌樂之瀧弭節於羊城以圖南焉已而省府憐其才俾佐治保昌持以勤儉濟以恢𢎞若可以展其平生梯梯而升以繩祖武孰知日月幾何而風塵眯目世事日非矣尚憶戊戌豫以鞅掌留滯雄城四郊回祿光焰燭天城中暗室如晝子英泫然語豫曰楊氏簮纓之傳至於先人始無以蔭其後今幸躋攀分寸以似以續而世變若此君子之澤其殆斬於斯乎使含垢忍恥二三其德尚何面目上祖宗邱墓乎遂相向痛哭豫亦不能禁也其後别去不相聞者已二三年有南來者謂子英誅茅為屋左琴右書日明先王之道以待學者而自號草庵道人豫聞而竒之於今又十年而子英亦且老矣無復可用於世矣嗟乎貴戚之臣世祿之家匹休埀裕者不少於時宜草庵而不草庵子英以區區邑幕之賔乃能始終一致俯仰宇宙間可無愧矣今年秋余以程士過凌江之驛求所謂草庵而一詣焉至則花卉後先鬱有幽趣而弦歌之洋洋盈耳又未嘗不為子英喜也雖然豫與子英俱駸駸乎桑榆之域矣已邁之年回首瞬息後此不過一二十年客耳方來光景又奚足控搏耶曷若返乎青原白鷺之間相與角巾鹿裘耕間釣寂娛孫會友以樂餘齒子英曰諾吾將歸矣請書以記草庵遂著疇昔之意如此蓋子英之祖母於豫為從姑故相望拳切異於常情云曾氏祠堂記祠堂建於郡玄妙觀何居曾氏子本中為老子徒憫其先人無主祭者作也曾氏世居邑之膏澤本中幼失恃遇忌日悲不自勝逮長歸父骨煙濤千里之外世難而家喪時平而身老於是建祠於觀以祀其先捐田於祠以永其祀而謁記於豫嗟乎孝思終慕者幾何人哉執筆於斯庶無愧矣因謂本中曰世之飫膏粱艷文繡樂軒蓋堂榭之安榮蒙先業而有者衆矣水木原本之弗思春秋享祀之或懈視本中出類離倫遊方之外猶凜焉宗祀忽諸之懼豈不赧然愧汗也哉本中曰古今絶續之感雖賢聖不能免為此者姑以少慰吾心云耳雖然本中之志則善矣抑豫觀王侯將相施田宅於老佛之宫以祈悠永者往往而有一再傳之後小失其忌典大忘其像設祠之建改為收儲之場田之入悉供醲鮮之具於斯時也其將若之何本中悄然以悲而莫豫對也則又解之曰反哺跪乳報本之恩禽獸猶然君不忘其本而為斯舉後之人忍忘其本而廢斯舉乎將見一飯之頃必戒其徒曰此某師托先之餘而吾與子之所共食體前人報本之心勿替引之可也又必戒其徒曰吾於此或怠焉有廢焉人將曰彼師奉先之意且弗能守况他人乎將檀施慕善之念日荒矣吾教何由而興乎本中躍然喜曰若子之言庶無隳我之志也請書之將琢詞於石以示後之人遂為記石城縣重修城池記至正十有七年豫留雩陽王侯幕中見有上徐君興復石城縣治城池圖狀稱其秉心亷正宣力周至安輯餘民招附外境厥聲籍甚聞之喜而不寐是冬石城儒生溫晉老來致其邑父兄子弟之情求文勒石溫之言曰石城之為邑尚矣南唐保定十年割虔化縣石城場置縣於虔州宋建炎間改虔為贛虔化為寧都石城則仍其舊云郡獨僻逺壤地褊小民俗謹畏南東亘閩北界盱江西抵寧都由保定迄今五百餘歲其間城池修壞無可徴者內附國朝以來四海晏然無復外患文崇武弛城復隍平至正十一年淮冦犯江右由撫破寧都至於石城城無可守官民蕩析焚劫幾盡姦變愚從鄰仇里怨比比然矣其確乎保有鄉曲守正者惟藍田之黃洪石之廖濯龍之潘龍頭之蔡唐臺之魏數氏耳於是邑人劉杰暨其姪權余夀余必安熊曼卿等倡義謀復縣治既平或順或強匪居匪康乃陟其岡域民之良憑二險以居焉十六年秋郡守海公分府王侯審知徐君家本石城地之形勢人之情偽必盡知之俾以府史領兵招諭其怙險懷疑者入其境畫䇿襲下鄉之左坑圍破之焚偽萬户府獲其印殱其醜聞風而下者七十寨至縣按兵親詣各所推誠布公開諭之曰爾曹往歲不審惑於妖言今知其非則宜速改其所以因循不悛者懼不免於誅乎今朝廷布曠恩太守施仁政轉禍為福機不可失豫與若等舊同鄉井敢忘忠告謂豫不信請以身質衆皆感泣歸順者六十餘寨為良復業君乃顧謂耆舊之人曰邑有城邑猶家之有垣墻扄鐍也髙其垣墻固其扄鐍姦心何由而興今是邑有克復之名而無其實非實墉實壑使斯民聚廬托處豈憂深思逺者咸曰唯於是度廣袤較崇卑具楨幹儲糧食立工程嚴懲勸創始於是年臘月畢工於明年九月周圍若千里髙厚若干丈仰瞻言言俯瞰沉沉樓櫓翬飛四十餘所君曰城茍完矣公廨將若之何又自捐良材百餘章為倡學校倉庫相繼具興躬率官民入此城處耄安倪懷寢恬語嘻向之狐兔穴通市棘荆翳沃壤者屹樓閣之連連靄桑麻之斾斾使我祖父而上數百年養生送死於兹土者不廢其詒謀徐君力也忍忘之耶願一言紀嵗月以示後之人豫聞而嘆曰韓城之完詩人美燕虎牢不城春秋責鄭矧君上有保障之托下有桑梓之敬哉迹其行事可謂難矣君名行今以勞升是邑主簿總制機務協贊其役者攝邑某某是為記種學樓記蕭君鳯岡築樓於義山之隂字之曰種學其友尹又新既為之辭復徴豫記之豫聞其語而思之不無愴然有感者矣夫種學之説本於學殖諸君易經訓之災畬者抑嘗究其種之之法乎二帝三王之道載於經學之五穀也楊墨申韓百家者流學之荑稗也不慎擇而種之雖終歲勤動復何益矣豫少之時逺覽傍搜玩常嗜竒方寸之地無所不種及日至之時維莠驕驕而已爾於是賦逺遊涉洙泗周遊齊魯之郊得嘉種而還竭力播種汲汲焉惟恐其後時也惺惺焉惟恐其亂苖也不幸而八月其穫雖我稼之未同而衆且妄推其有秋也至如蕭君其種也先乎我可謂能服勤穡事然不厄於水旱則困於螟蝗矧頻年以來雖不惰之農亦舍耒改業而工商求朝樹而夕隂矣惟無他技能如豫者思天下之飢猶已不敢以水旱輟耕而望蒸民之粒孰知萬山之間君猶一翁二季憑高眺逺竭力斯事不棄二三十年不獲之壤弊弊而種之嗟乎如豫與君其不貽改業者之笑幾希而猶自信如此也雖然水旱之後地力息久則利倍但患種之秕耳豫視君所種實堅實好茍舍舊而新是圖則天必憫君之勤而使之受厥明賜矣異時有飶其香邦家之光擊鼓以報田祖則豫也青鞋布襪經邱尋壑往賀於曲江之上與種學老農取斯語誦之未必不掀髯一笑也義塜記義塜者何西域氏旅塋也營之者誰吉安中憲大夫達嚕噶齊也於是可觀德矣於是可知混一之盛矣何也西域之於中夏言語嗜欲殊焉雖漢唐以來婚媾有之然各懷舊族不能雜處他土顧安有生西域而葬江南者惟我皇元肇基龍朔創業埀統之際西域與有勞焉洎於世祖皇帝四海為家聲教漸被無此疆彼界朔南名利之相往來適千里者如在户庭之萬里者如出鄰家於是西域之仕於中朝學於南夏樂江湖而忘鄉國者衆矣歲久家成日暮途逺尚何屑屑首邱之義乎嗚呼一視同仁未有盛於今日也至正辛卯公以海北廣東監憲簡在帝心選守名郡實監吉安明年淮冦蔓延賴公仁勇亷明戡定勞來所以父母斯民至矣又以餘力買地一方於水之東西域客死於此皆葬焉築堂三間以享以祀俾特穆爾布色董其後而世守之庶無他族逼處魂魄相安於九京也郡之耆老嘆於里巷曰傳稱親親而仁民仁民而愛物推是心也將掩骼埋胔如恐弗及况士大夫之墓有不封崇之乎飢餓於我土地者有不惠利之乎父兄詔其子弟曰吾儕小人服盡情盡相視途人疾而不持喪而不救壞土莫讓甚若仇敵聞賢太守之風將不勝其愧悔矣嗚呼民德歸厚其在斯舉也夫是不可以不記麟原前集卷六

body:
  text: 麟原後集卷十元王禮撰行狀元故梅洲居士王公行狀曾祖某宋兩浙轉運使司屬官祖維翰考公塗妣湯氏先君諱斯覺字先民姓王氏廬陵宣溪人也楊文節公志其先世之墓謂仲舒觀察江西子孫因家焉先君十一歲而孤太夫人朝夕訓誨十三黠鄰欺孤侵其恆産賴舅氏輔翼訴于江西行省鋤其強橫由是粗能自立即務從學通知大義無凝滯弱冠以荐剡舉充吉水縣學教諭念母老不忍離膝下辭官治厥家畢三妹一弟婚嫁知太夫人愛幼子尤篤門户公役悉不以及其弟既長念宋季先人辟地小豅山谷間違宣溪一舍宗族多逃難解散遂謀之族之能立者復敖城瀟洲闔閭聚處于是携弟奉母同族之一二兄弟歸故里創造稍還舊觀雖不敢跂望上世三太守之盛然鄉黨姻舊莫不稱中興焉敖城居民鱗集有巡徼之司有征商之所而革罷子務市馬遂以敖城所辦課錢數千緡責之三十四三十五兩都職役民以消耗往往棄業流亡先君力訴于總府謂此乃往來商稅難以重困兩都展轉十餘年始得散加于縣之九十餘都而後兩都之民樂生安業時有外邑之姦人結為黨伍攻訐人之隂私以恐取財物名曰廣涎謂其射影禍人也先君尤深惡之謀于里之大姓曰是曹工于媒孽人短一旦入吾境非大姓之福也有能助我者吾將先其未發而制之蜃涎之徒聞而宵遁里閈以寧己巳嵗大旱道殣相望先君隨力周繼其鄰里之窶乏者不足又請于官以賑之所活者衆明年春虐雪祈寒減米分薪以濟凍餒以倡富室常恨力不贍不能盡已之志歲時祭掃以尊祖燕宗尤拳拳切切有引無替重刋譜牒以聨屬族姓章别親踈而以先賢所撰墓志行狀數十篇附其後以激勸後人垂成將卜日會族之長幼祭于祖塋歸燕而給以譜焉未幾燬于蠻寇此志竟隳先君暮年見禮兄弟能酬酢不墜復作堂以怡慈顔堂成適從寺僧得履齋吳公潛為從祖衡州府君所書耆昌堂扁遂以揭之族之長老題其後曰此扁乃吳相為衡州公築堂奉親而書也今族子先民作奉親之堂而幸獲之非偶然也况上侍慈闈下撫蘭茁斯堂斯扁于先民實宜先君為之喜署一聨于兩楹間曰修其孝悌忠信俾爾耆艾熾昌見者稱贊太夫人享年七十有六終于辛未之秋先君葬祭盡禮復求申齋劉先生書其行而銘之墓平居嘗舉大禹克勤克儉以為家法意適神間輒哦咏陶靖節同源分流人易世踈慨然寤嘆念茲厥初禮服遂悠歲月眇徂感彼行路眷然躊蹰與夫民生在勤勤則不匱宴安自逸歲暮奚兾擔石不儲飢寒交至顧爾儔列能不懷愧之句若有當于其心所居之後有梅洲自謂梅洲居士見子弟嗜學必極口稱譽之且勉之曰科第吾家舊物也工深力到天不汝憐耶至正庚寅禮忝舉于鄉先君深以為喜曰庶幾不愧世科矣逮禮往任安逺校官則舉范德機先生為官不必髙髙者乃其賢之句以戒飭之後禮參謀軍中深入蠻縣招撫狪獠嚮義安業時參政公全普菴薩里及噶海齊便宜行事版授禮興國縣主簿越明年改授廣東宣慰使司都元帥府照磨以勵忠藎先君聞之愈慰晚節而八表塵昏世事日非矣乙未之冬禮獲歸省見鄉之戍守無偹遂謀于兄弟買舟先奉二親依郡城之近以居明年春寇燬于里家業一空寇退復回小豅山左以就口食是年七月十二日先妣虐疾卒先君傷悼得疾遂不起實至正丙申八月初二日也享年七十有七先妣劉氏有賢行經紀家政輔先君為多子男四人觀豐禮祥庶子一人天祿女二人適劉某廖某孫五人脫頴寶溥華溥賢完哲諸孤慮時艱危即葬二親于小豅山之原餘旬寇復出凡新舊塜皆發取中藏惟先君先妣墓不少動人以為為善之報又踰一年為洪武改元禮與弟姪合力遷二柩以歸戊申十二月二十日以先君祔葬于峽潭野猿掬水之兆先妣葬蘆富上谷之牛形于今又十年矣未有片石以昭潛德不子之罪尚可逭乎用托其平生大略以乞言于當代之立言君子惟哀而憐之賜以不朽不肖孤之幸也謹狀羅瀘州子父志節狀至正壬辰廣東元帥沙克嘉巴勒以連州有警遣使詣廣西募達爾罕五百人征進至得二千人以歸癸巳夏五月至廣州城下時連州羽書疊至元帥就城外犒賞即調赴軍前諸隊長怒曰我數千里逺來元帥既不容我入城又不令我休息而即赴敵頗生怨言離廣州即肆鹵掠至清逺停不進縣宰渡江避之元帥患之召諸奏差問曰誰能為我起遣廣西逹爾罕赴軍前者奏差羅次丙前嘗為靖江潯州郡吏識其隊長二人進曰次丙願往遂令乘傳往至清逺郡逹爾罕皆貫弓執矢相向次丙遙謂曰汝勿動我來頒賞而實不持賞也問縣宰安在曰在對江次丙移舟渡江與之謀曰元帥遣我督西軍進討而西軍乃相距我詭言元帥有賞而實無賞縣宰能為辦楮幣錠三百乎縣宰曰諾得二百次丙持楮幣勞軍始得其歡心欣然就道次丙督以赴連州至則正交戰次丙督以助戰寇稍却西軍深入而不知要害出入為所敗七月初二日次丙被禽寇施慘酷欲降之次丙不屈十四日被殺事上帥府帥府上之省贈畨禺簿次丙父文節少有逺志年三十三至京師為胄監陪堂生有相者謂曰君兩顴骨入鬢當于邉逺立功名國子先生姚公南禮舉于集賢集賢移咨雲南省授昆明州學正升孟傑府教授補大理金齒宣慰司令持氷蘖以厲逺人其地産金賂輒數鋌文節輒斥去逺人憚之事多立辦嘗以徴賦金至乾崖湎里乃近西日落之地其地十一月方生草二月即以熱枯死諸葛武侯所謂深入不毛者是也其民愚賂使者金常如所徴賦之數兾茍免使者久不去仍如數納所賦金無悔常不肯先納文莭至賂亦如故文節諭之曰汝所賄我金足輸汝賦矣汝何愚不早輸賦徒多費汝金也其人始悟感恱有豪民占人田賂金數鋌文節不受卒奪豪占歸其人後除普定路知事補雲南行省椽史厲􅋵愈堅西御史至必加奬豫雲南故事驛馬皆中朝給楮幣為買馬費然楮幣至則官吏共分之而以買馬責之土酋文莭曰官給驛馬價而官吏私有之可乎悉以付有司買馬無敢分毫為姦者參政錫勒通以能忤時宰左遷而至務欲立竒功以自見念非亷且能者不足以助成已志擇文節為提控掾取今弊悉更之聲動蠻夷中人多有自逺徼來歸者文節嘗喜賦詩有邉臣不識金銅像使者新降鐡甲郎之語儕輩多不便之金銅像者蠻人所用以與貨貝同行者也貨貝亦蠻人所用謂之􅖝子事有不便于土官者土官輒以多賄動文莭文節怒斥之其人曰君薩逹克齊耶乃不納我金也蓋國初時有平章薩達克齊至亷故其言如此錫勒通悉更庶務文節乃為文上內中書曰國家混一南方自得雲南始是猶髙祖之關中光武之河內也且雲南一縣名不足以重方面而省署曰雲南諸路行中書省不得同內諸省皆非大一統義也願改曰平南等處行中書省所以彰國家混一南土所從始也會錫勒通除上都留守事寢不行填池有蜦能出雲為風雨歲大旱文節為文檄之大雨然以此多取嫉于省憲兩府後西御史至交讒之御史搜求訖不得毫髮過但以專任自用劾去文節至京師辨明改龍馬他郎甸長官甸猶縣也長官猶縣令也文節素不善阿匼所至多枘鑿不能展所志年六十二以文林郎重慶路瀘州同知致其事作金土地坡詩以自嘆金土地坡者雲南地産金土人以金鑄土地之神而祀之數為貪夫所戕既悟則曰纍土地之神者以其為金也後易以木至今無恙意以為平生為才所纍使為土木偶則無嫉之者矣又嫉風紀之司以貪失邉人心作虎神祠詩以譏之虎神祠者雲南之人近百歲往往有化為虎者其化也先自尾而身及肩雖子孫不敢近之化成乃山去嵗時歸食其祀子孫設祀于屋後隟地虎夜歸食之而去故其地祠虎神人其衣冠而虎其首意以為叨餮者人其衣冠而虎其勢以脅取之也次丙在兩廣時其父尚留燕數以書戒次丙曰我以齟齬窮然汝勿以我為懲當以亷律己而謹三尺以行之務有所樹立次丙遵父命故所至有聲稱次丙之兄大已字伯剛孝友篤行君子也經誠明行誠修試藝乃不得志于有司未顯于世家故貧教授鄊里以給衣食將老喪明人猶以其不盲于心爭延致以淑其子弟惟一男子前數年客死于外去年大已又與一從弟俱亡傷哉若人之不淑也蘇文忠公有云原憲之貧顔回之短命揚雄之無子馮衍之不遇皇甫士安之篤疾彼遇其一而人哀之至今而茂誠兼之豈非命也哉由大已觀之又有甚于茂誠者矣大已存日嘗屢以書屬禮書其弟次丙與其尊府瀘州公志節禮未及述愧負深矣偶閲故笥得其手字不勝愴恨念其父子之平生可謂無忝士類而蹇連若此自不知造物者之何心爰序其槩以償夙諾庶幾挂劍之意慰良友于九京也奏差歐陽存逺行狀曾祖國安湖州路照磨祖古明樂安縣典史父逄春故不仕母劉氏君諱永字存逺吉之吉水人也生而頴茂長而機敏德性淳厚其接物也從容以和如春陽之溫其處事也發言當理如秋月之朗事父母盡孝友兄弟尤篤鄉人信之先達器之有司以薦者言舉為州從事職親案牘視官事如家事為人平恕鞫讞罪囚得免于死則喜苟或未然憂形于色屢反寃獄憲司按臨聞其能聲多有委任往往以儒術飾吏事咸稱其職由是遴選充𣙜茶運司奏差時運司多賢士大夫喜其才委以遍歷巡按所至守令敬之如運官之親臨事無不舉民安其生延譽逺邇莫不稱美考績以年勞將升照磨之職薦剡交上舉參憲掾而淮潁兵興八表塵昏矣于是慨然曰吾才非不如今人吾志豈不如古人而遇斯時命也自是杜門養晦與世浮沉撫時序之良辰恱親舊之情話滋蘭蒔菊臨水尋丘不知駸駸乎暮景矣君平生不汲汲于名不切切于利流行坎止隨遇而安凡宗族姻親閭里故舊貧困鰥居者助以成其婚孤女無托者助以畢其嫁死而無歸者葬之兄弟耗費其財物者不少每寬而不較以粟百斛貸里之屠沽負販令經紀以生而微沾其息間有久假不歸亦置而不問以故細民多德之洪武七年君一日抱病醫巫紛若相視束手衆皆危之男子耕等哀籲于天夜禮北斗願減已齡以延父夀惟孝動天卒遂更生十有四年十一月君復嬰疾迫于殆子耕刲股以助參术祈病之瘳君聞召而語之曰汝何不智之甚耶夀夭稟于有生之初非禱所能移曩嵗幸而獲宥亦數之未盡耳身體髮膚受之父母何用自苦如此吾年踰八十死亦何憾古人云為善最樂汝曹勉之言訖而逝生于前元闕己亥終于洪武辛酉享年八十有三越二年癸亥十月葬仁夀鄉黎洞之沙分向則巽已配李氏有賢行善綜理其家子男三人子方子耕與耕女二人長適袁闕幼在室孫男十人豫以甲子之臘重至文江聞其墓有夙草悲愴久之故老猶歷歷道其于物無競宜垂裕後昆蟄蟄且有立又聞子耕刲服以療父病惻然于懷雖不適中要亦發于誠孝之所致也既而求述君之懿行以俟當世能文辭者銘其藏故即所聞述其槩俾有所藉手以請云祭文祭文信國公于嗟夫子之烈烈兮剛獨抱此忠貞死而不朽兮反貴于生忱千載而一人兮與天地比夀日月齊明紛趙宋之末運兮日淪胥而莫挽北風其涼而霰集兮何重任其途逺雖成敗利鈍不容以前知兮盡瘁之死以為期胡賈餘慶吕師孟之賣國兮羌獨置我于危疑雲慘慘而北征兮路曼曼其何極茍宋德之未厭兮軌句踐而是力望儀真其匪遙兮脫虎口為後圖藹良苖耳成之翼翼兮將飫我而有餘鯈肝膽其弗照兮謂化茅之荃蕙指蒼天以為正兮孰家置夫一喙曰階庭芝李制置蘭青青兮佩湘纍而有光倘察吾之中情兮雖死庸何傷揚子渺渺幸濟兮邅天台而遵海朝括蒼而夕閩兮求帝子之所在念神堯一旅有天下兮夫孰非人之所為天命其或未移兮國中興其庶幾橋轅門以飛檄兮咸景從而嚮應水萬折而必東兮金百煉而益徑噫五坡兮嬰禍罹命之窮兮可奈何下沈陷而無地兮上寥泬而無天夜舊鄉以徑度兮哀首丘之無緣五載依其燕獄兮寧變心而易志幽與明其兩不怍兮亶無雙之國士慨豫去之百歲兮過故居而拜祠慕抗行之薄天兮思惝恍其逢之形可瞻而神不可接兮步兩涯而求索駕風鞭霆何所之兮目熒熒兮而靡得夔龍從容以獻替兮孰謂其非忠獨罹此以顛越兮萃百慘于一躬立人極于將墜兮揭綱常以為式俗至今而愈薄兮好修悲值夫鬼蜮酌寒泉以蒸鞠兮兾靈降之連蜷奏楚音以代竽瑟兮碩俯鑒豫之希賢祭主簿潘景嶽嗟嗟潘君何止于此撫大化之參差兮杳莫知其何以謂善未足為兮衆或譏其悖理謂善之果足為兮所活不知其幾方致附之然疑兮等人命于螻蟻君緩頰于片言兮廽群生于萬死天道報施苟可諶兮隂隲宜濟夫屯否活千人者必封兮胡一仆而莫起曩維余楫章江兮望歸舟夫千里仰雲翮之將翺兮落萬譽于一毁抱幽憤其誰明兮兾鬼神其知已言愈逺而悲長兮老泪泫其如洗魂降只乎家庭兮歆漬綿之清醴祭總制俞君文某年月日永新懋齋俞侯靈柩歸于江東舟次宣溪友生廬陵王禮謹以孤鴈斗酒致千古之别而侑以辭曰叔敖之城兮宣水之湄昔公擊楫兮凡幾過之人生百年兮黃粱一炊靈旐重經兮無復來時交遊零落兮後死可悲江東暮雲兮云誰之思車過腹痛兮千載交期夜月屋梁兮鑒此一巵祭汪照磨文某年月日王禮謹以清酌庶羞致祭于照磨汪君士章之靈嗟嗟汪君人中鸞鳳既清且和亦謙而重遭世孔艱沈晦弗用寄迹轅門待時以動簮纓蟬連歷唐與宋食租衣稅而菲自奉斗粟及繒與朋友共曾幾何時百年一夢旋殯禾川我臨而慟柩經宣水抆淚以送送子傷子知子抱痛母先倚門舉奠無從天耶命耶難平者衆我辭孔哀于以代賵祭趙道夫文惟君堂堂華系磊磊英姿望之鸞鳳即之蘭芝少負鋭氣勇于有為志與命殊懷才莫施中更喪亂按轡不馳弗耀其光益藴其竒懷古隱淪石門我師于時耘耔于時棲遲群蛾赴明咸蹈危機君如林鹿食蘋以嬉朝儕暇叟夕侣樵兒白石濯足紫芝療飢允矣養晦賢哉識時嗟我稚孫泰山是依胡不期頥而止于斯托好絲蘿未覿令儀落日屋梁我心孔悲爰具豆羞抒哀以辭魂無不在尚其鑒兹祭外舅蕭兩峯代叔厚作嗚呼我公學足以啓沃夫後進景既暮而弗佚才足以寄百里之命乃屢辭乎徴辟惟願慤以自持實鄉閭之矜式天弗憗遺寢簀斯易嗟泰山之將頺將安仰而靡軾念平昔之誨言不自知涕泗之霑臆幽明永隔實在今日奠以敘哀五內如刺書與劉參政書往歲適然而識面倐焉而分手雖天各一方莫覿光儀然以昔人心友神會言之雖疏逺猶左右也後聞敷政浙省威德並行逺邇具瞻如在天上然遇知行志自我輩分內事耳但當忠君愛民夙夜匪懈以不負所學禮也年踰八帙碌碌何成無足為故人道近以餘力謾緝佳什為滄海遺珠集四卷用奉公退寓目焉相見邈不可期涼風日深惟鼎禋葆和以膺柄用不宣與子榖弟手帖吾弟既沐天恩便當洗心滌慮國爾忘家公爾忘私以圖報稱在家技倆􅊏毫莫用魚與熊掌不可得兼名與利之謂也職事典故有不知者求教于人庶無違誤戰兢自持無貽前人羞慎之慎之不他及啓回蕭兩峯啓某慨念平生持循晚節謂優遊而度日抱膝含飴忽咄咄以書空擬步如漆太史公以一言受禍千載貽羞蘇東坡為群小所排四海稱屈况如老我素號醇雅惟直道以事人少的學以諧世彼司平于我者既棄周鼎而寶康瓠故嫁禍于人者亦舞鰍鱔而號狐狸每顧本之中者無愧惶豈以至自外者為榮辱乃厪髙誼疊慰窮愁每嘆令郎冒風雨泥塗之艱維持者再亦以至親有手足肺腑之誼踈慢則孤自莫敘于謝私又逺勞于存問籠鵝愧黃庭之未寫臘醖覺緑蟻之猶浮豈期座側之明珠亦遣著中之儀物報懷莫罄銘骨逾深千金散盡還來盈虛有素一飯之恩必報遲速待時草率占酬不勝感楫賀醮子兹審醮子而宜室家新偕鴛偶為酒以召僚友逺賁鸞箋喜溢鄉里光生庭户花燭阻陪于華宴菲儀聊致于賀私讀書煮茶想自此優遊于椿府設弧繫紱惟從今祝贊于榴房莫罄歡欣悉祈鑒察賀夏道存教授啓茲諗以鄉先生為郡博士泳仁蹈德作新樂育之範模刮垢磨光整肅來遊之冠帶幸諧僉論宜貢尺箋竊以黌舍作養俊髦師儒實為重職胡安定之興湖學治二事者多賢才徐仲車之在楚州誨諸生而為君子必規矩凖繩先自治庶禮義亷耻非虛言是以洋洋乎絃誦之和濟濟然威儀之盛窮簷委巷甚貧者亦務明經顯族髙門不學者指為俗輩人知趨向意自激昂矧今天下一家喜見書同文車同軌羣黎百姓皆知術有序黨有庠蓋齊家治國由大學而知則傳道授業非明師不可眷兹文獻在我鄉邦校無魯國之真儒斯文幾喪郡有蜀川之太守吾道其興虗教職以遲遲採輿情而察察誠以其人之賢否係乎此府之觀瞻必稱其才乃無廢事恭惟詞源浩蕩德量𢎞深雖賢能歲貢之書讓于伯氏而鄉里月評之論屈此長才同師而必超羣學易以無大過西橋流水棲遲在衡泌之間東閣延賢徴起遇風雲之會訓導兩載發揚六經芹藻萃于泮池菁莪育于中沚循循而善誘年彌卲德彌髙休休如有容學不厭教不倦利祿之際每如怯夫名教之中自有樂地不圖鶚薦發此鱣祥道之所存孰謂以退為進時不可失要亦由老更成試藝春官了當年之故事低頭座主恐前日之門生歸斯受之在此行矣既専施于化雨宜大拯乎頺風上以答府主之心下以塞士類之口某居常篤于自信老益壯而窮益堅未能俯以為同譽者少而毁者衆所喜耆英之在泮或來暮景之浴沂爰敘微𠂻綴茲賀語謹奉啓以聞賀伯逹知縣啓請老挂冠實人間之偹福遺榮結社昉林下之一人吾黨增輝里閭交慶恭惟大尹先生蚤窮六藝百家之奧鋭意榮名晚值四海群雄之爭竄身離亂幸大明之當運得就日以分輝有志竟成不負所學五十齡而富貴己聞綬見于會稽千萬里以驅馳將見書成于史記又能佩老氏功成身退之訓初非如淵明昨非今是之歸與野老以為鄰招門生而立館文字優遊于晚節何異求仙林泉笑傲以娛情賢于從事某本圖恭賀竟以事牽致令尺牘之後期用貢四詩以為禮深慚踈慢所兾宥原回蕭尚質賀婚孫啓詒厥孫謀不過喜傳家之有道為之有室抑孰知任責之無人由其抱平生不足之悲是以償晚而未了之債雖曰季父視之猶子然亦君子所貴抱孫偶爾隨宜因而成事為酒食召僚友尚缺此情事詩書或絲麻各令自立乃厪厚禮寵以褒辭燈火秋涼或有煮茶之餘福階庭春雨斷無憂草之間懷報謝語踈感銘心切回鎦以安賀婚孫啓生子既為之有室孰知暮景乃抱孫婚姻所貴于以時不過貧家之了債豈復有盛時花燭之宴况兼以隆暑草具之難愧無嘉肴旨酒以速賔親乃厪髙詞厚禮之耀蓬蓽受之深愧却則匪情逸豫優遊或有一日煮茶讀書之樂功名事業恐乖奕世穿楊射䇿之期率爾占酬藹然莫報麟原後集卷十

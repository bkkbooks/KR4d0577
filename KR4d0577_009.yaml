body:
  text: 麟原前集卷九元王禮撰傳靜春先生傳劉先生清之字子澄吉州廬陵人也年五嵗讀李瀚蒙求至龔遂觀農文翁興學誦不絶口父母因語之曰此二君子教人讀書耕田也人事不過耕學耳自是讀書勤甚比長受業於兄劬學自修孝友誠篤質直好善心廣氣和強敏有立専以儀刑先哲為事博極書傳不專科舉之習紹興二十七年第進士授袁州宜春簿未上丁外艱服除改嚴州建德簿欲應博學宏詞科及見新安朱公熹即盡焚所業慨然義理之學罷官嚴陵亟至東萊吕公祖謙書院講論經義留數月乃去廣漢張公栻守嚴陵時未識先生而深知其為人其後書問往復神交而心契矣蓋先生天資既髙復與二三君子遊故所造日益超詣其學以力行為本不事空言燕居端坐非翻閲經史則省察心情見義如渴無所顧慮與人交推誠􅈤惻語約理盡見有親者必勉以孝敬見有子者必勉以教子見初仕者必勉以事君澤民為志聞人善樂道不已聞人過慘然如痛在已訓誘後進惟恐失一士繼任瑞州髙安丞撫州宜黃宰俱有善政龔茂良周必大薦於孝宗召對首論民困兵驕大臣退托小臣茍偷數事又言用人四事一曰辨賢否二曰正名實三曰使才能四曰聽換授稱旨除太常簿啓謝諸公有如懷祿希世將恐初心之遂亡倘或獻諛取容何待知己之不厚未幾復丁內艱服闋倅鄂州嵗滿歸自武昌日與學者楊炎正黃豹李如圭等三十人於槐隂精舍更相問辨以觀其識向閲時既久凡去私進德之方修身應物之道彚集得百餘篇名曰槐隂問答時諸司薦知常州允請得除擬奏事略曰今日之俗惟知得而忘義詔令一下仕者曰增秩乎士曰免舉乎兵曰受賞乎民曰蠲租乎有則欣然奉承否雖良法美意利國而便人視之如無也蓋為治之道有政有教理義人心所同謂今世明於理義者難其人不亦誣乎今當精擇百官求明於理義者為監司為學官為守令為將帥則風俗知義上下一心陛下又與大臣端本清源所以儀刑萬邦者不出於他而舉出於禮義將以紹復大業斯無難矣未上又改衡州當路忌之諷言者論罷差主管雲臺觀寧宗嗣位越月即起知袁州而病已革矣初先生贄晦翁以書其略曰王承告其子毗學之所入者淺體之所安者深間習禮學不如式瞻儀刑諷誦文辭不如親承音旨清之讀此未嘗不慨然太息也學之於人切矣宜乎父子至情丁寧而不敢忽也始清之讀語得元祐諸老之説以為世徒有此書耳他日有告以今時諸君子所發明者時坐不安席欲起而從之已而不能則有三焉體弱不能徒行貧無僕馬不可以適逺一也位卑身賤有在上者則不可攀而求之二也世道之衰屈身於勢利者不怪一從學士真儒考德而問業則曰是好名者三也末云今二三君子之中不幸已死者則無可言幸而執事者在有可見之便其又奚説語曰經師易遇人師難遭願以素絲之質附近朱藍伏惟誨之晦翁復書曰執事盛年壯氣清節直道發軔雅途既有志於當世而悅學好問勤勤有加又將有意古人為己之學及其沒也晦翁為文哭之曰子澄以樂易之資躬篤行之行立志高雅信道堅深處家庭則孝弟逹聞交朋友則信義昭著居間則講道著書有以樂衆人之所不樂從宦則養民善俗獨能憂衆人之所不憂至於收恤宗黨而接引後來蓋孜孜焉無不用其至若其樂人之善矜人之惡又汲汲焉惟恐不盡其誠故賢者與之遊常幸其有思齊聞過之益不賢者與之處常病其有明汙招過之差然世之賢者少而不賢者多是以子澄得譽寡而蒙毁衆道不得行於一州而齎志以殁是可不為深悲而痛恨也耶覽斯文先生平生大節可見矣享年五十七學者稱為靜春先生云嗚呼山川風氣之通塞固亦各有時哉何其生才前後豐嗇之異也由周以來至於宋千五百餘年矣廬陵始有歐陽子為一代儒宗厥後節義文學之士炳炳琅琅層見而疊出於是四方談忠節之邦文章之藪必歸廬陵然當伊洛之學盛行先生身體力行以與朱吕數君子上下論議故廬陵道學得齒諸任自劉氏始而近時邑人士子鮮有知者豈先生爵位不大顯於世故尊而信之者有不若慕忠節文章者之衆歟抑至道難聞師從者少故其傳有幸不幸歟竊嘗嘆夫由宋而上遡唐與漢世之相去若此其久也而廬陵未有一名世之士出乎其間將時尚不同雖有之而好者鮮遂因以無聞歟至若道學之正如日麗天無異尚者世之相去又若此其近也乃罕有知先生之名識先生之學者其亦可嘆也夫其亦可感也夫於莵夜兒傳兵興荆楚沔為藪戶口十餘萬富積寶貨男子從征戍家居者率婦女嫗婢而已有皮工蔡姓者出姦計縫虎皮為衣手足著銅距長二寸許遇夜匍匐而行若真虎也踰垣墻破門關婦人女子悉駭怖竄逸惟害己是憂雖竒貨重寶盡失惴惴不敢視以為神虎一郡相謂曰今之財物悖致也其天降罰因是孽而喪耶不然何出入不常莫能逐也蔡由是日富盡穽其有於床下凡三嵗不敗鄰有袁氏者家惟妾三人一日刺豕蔡市肉不得怒夜蒙虎皮入其室衆妾匿頃之其一妾謂其二人曰恐虎去而不畏者踵後入吾室將盡吾有也吾冒死以覘之緩急汝吾助遂潛往伺於室之奧俄而虎復入人立四顧取虎所不取者妾抱持之大噉虎抉其面躑其脛妾察有異抱持愈謹呼二妾二妾呼四鄰四鄰集蔡憂弗免褪其皮逃去腰以下未及褪也妾以皮聞之官官命大索得之掘蔡穽室得虎皮半截驗之合籍其家坐其孥梟其首於是君子曰世之肆貪暴以戕害人者蓋白晝之於莵者也蒙其皮為姦於昏夜者彼知僇之身為於莵於白晝而弗知己者又將誰僇耶殆袁妾之未遇耳世之畏威俯伏寧虀粉其身而不思除其姦者何智力不妾婦若也嗟夫戅直夫傳戅直夫者泰和白沙翠竹里人也返徐挂墓劍不以死倍吾心刺廣酌貪泉不以飲易吾潔皆其先世同姓之顯者至宋科第尤甚升於學者二十二人舉於鄉者五十有七薦於漕者三奏於禮部及精究科賢良科者九而特科恩封世賞拜爵者又三十有四人盛哉丞相文信國公跋其宗譜可驗厥後中微夫之大父幼孤辛勤敏給與時轉貨訾以裕其家性宇光霽時扶笻携孫尋芳洲渚間悠然自樂人稱為芳洲居士大父既殁夫年日長知問學為箕裘所從皆一時名士業漸成方思自效而元之國事日益非矣於時舉義者爭欲致夫幕下夫知大厦之傾非一木可支即拂袖歸隱杜門求志亂定由吳楚涉淮泗以觀黃河泰華之高深過燕趙齊魯之墟訪賢傑遺迹遇悲歌慷慨之士輒狂吟豪飲以泄胸中之磊塊逮還闢故址理間田蔬果有畦薑芎有區葺屋乎清池之上修竹之間有子二人服勞奉養家事悉不及夫惟娛孫適意而已鄉人招飲率傾其座人初視其貌若愚至論事説理是謂是非謂非能正人之曲又似直者焉於是相謂曰古之愚也直非斯人之謂歟遂目之為戅直夫夫欣然領之謂其知己一日詣踈放翁求傳其事念夫識量有過人者故為論次其概云贊曰漢髙帝謂王陵少戅武帝謂汲黯甚戅而陵黯所樹立卒厝國家於太山磐石之安皆社稷之臣也人之戅烏可少哉史魚病命其子曰吾在衛朝不能進蘧伯玉退彌子瑕是為臣不能正其君他日置尸牖下於我畢矣靈公弔而聞之進伯玉而退子瑕尼父善其以尸諫故能忠感其君而稱之曰直人之直又可少哉世之從俗富貴哫訾栗斯咿嚅喔唲如脂如韋者雖纍千百緩急可倚仗乎尼父謂忠臣之諫君有五義焉而二曰戅諫四曰直諫是戅直誠事君之大節矣使是得一命以展所蘊豈不庶幾古人之萬一而顧混迹流俗以老嘻贊王公君直畫像贊有序贑二守奉議王公榮忠分府雩陽之六年有議欲歸公會府者雩之人皇皇懼不得私而有之也則無所窺尋其聲光於是合力建生祠於南城之隅設像祝其夀又各繪其容於家猶子弟不忘朝夕見父母之顔色也紫陽道士蕭養素尤敬愛公是時繪者無慮百餘家而養素是幅端重俊偉鸞翔虎踞見之者宛然如侍公側也養素謂豫曰數年前紅巾由宜黃陷寧都是邑將為墟矣賴公力戰復之民有耕鑿之利事育之樂繄誰賜耶其後分府於此築城浚池比城完而寇至者幾萬非公則殺其父兄虜其婦女有其帑積燬其棟宇又安有今日哉公於雩民德澤在其心傳於其子孫永永且不忘也非祠與像斯民無以寄甘棠之愛公果何事於此乎余曰顔魯公倅吉時民未嘗立祠公去後民始祠之至於今不廢胡忠簡在新州豈有惠利斯民者而新州人祠之是其秉彛好德之不可掩又不係利澤之在民否也矧公於雩人生死骨肉其以蜀人事張益州者事公固宜然豫聞民不可與慮始而可與樂成使當日城完而寇不至彼且德之乎哉將勞民之嘆無已也今日官府勞民於兵勢所不免患未至則功不形得無有忘大德思小怨者乎養素憮然曰若然非人也長慮却顧者必不爾也噫斯舉奚足為我公報哉苐欲藏之後人使數世之下為政者或聞公之賢拜公之像耻為齷齪汙下而有企其齊焉之思則實斯民子孫之福豫嘉養素言不忘本皆民情之真又喜公之有以獲此於雩人也遂為之贊曰其憂民也有元次山之忠其破賊也有賀拔勝之略其溫然於君子也風日之暄妍其厲然於小人也雷雹之交作識物情於深微濟世變以恢廓倘效用而繡衣將動搖乎山嶽則今之倣佛於紫氣之關殆後之炳煥乎凌煙之閣者耶二直贊達觀氏胡臨江系儒世變扶義惟姦妖是誅頻年賢勞民因無虞一隳防守斃於袁醜妻嚴聞而自沈匹夫匹婦自致不朽世祿希榮順降恐後夫骨未寒心擬他媾表兹二直彼也顔厚吁嗟義人吁嗟節婦麟原前集卷九

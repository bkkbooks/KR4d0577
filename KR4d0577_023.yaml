body:
  text: 麟原後集卷十一元王禮撰說劉士能已知字說友生劉漢章以避御名易字己知而名曰莫徴豫一言說其義以告四方親舊使知今昔稱名之殊而非兩人也豫諗之曰生之易字也則是通名而誦之也則非莫已知者得無有怨天尤人之意乎方今朝廷求賢如不及占小善者率以録名一藝者無不庸以生之才何患無知已者而有斯歎哉豫請因生之字而更生之名可乎夫子嘗言不患莫己知求為可知也又曰君子病無能焉不病人之不已知也夫能者可知之實士而有能奚病人之不已知也哉請以士能易生之莫何也禹有治水之能稷有播種之能天下後世言治水播種者必歸之知禹稷之實能也秋之奕養由基之射輪扁之斫輪伯樂之相馬皆極其能者也故知名于天下後世况君子自修之道可不實有其能哉實有其能則不求人知而人自知之矣劉生喜而從豫言故貽是說使知所自勉云李允巽字說宣聖嘗言邦無道危行言孫竊疑此為有言責者發也若夫尋常士庶雖邦有道言亦不可不孫不孫則不相入蓋巽與之言能無說乎說則相入矣雖然巽固相入然過于卑巽非恐怯則諂恱皆非正也嘗讀易之巽其辭曰利有攸往利見大人則巽之功用可見矣聖人以二五陽剛而居卦之中所謂剛巽乎中正而志行故于象詞一則曰紛若之吉得中也一則曰九五之吉位正中也是巽之吉何莫非中也與李氏中氣和而質美辭順而志清雖酬應膠擾中遇士大夫必從容進退以盡其意宜有階庭之譽也豫以其兄曰允謙從而字之曰允巽中意亦協矣乃欲聞一言于豫于是繹其義以為字之說而重為告曰說卦謂巽為木為長為髙巽之性也其于人也為近利市三倍巽之亨也豫望子也逺矣尚其勉之樂村生說豫友鄧仲舉英妙人也僑寓城西之斂陸里門俯清池園出修竹或抱甕而灌蔬或編籬而蒔菊城市之跡寡而郊野之興濃于是以樂村生自名焉豫問之曰適彼樂國豫聞之矣樂彼之國豫聞之矣生之樂乎村也何居則曰吾之居于此也耳不聞喧譁呌囂之雜而樵歌牧唱之遙臨目不接隳突輕儇之態而烟簔雨笠之時見務本而不逐末貴朴而不尚竒作則負耒而興倦則班荆而坐熙熙焉有太古之風焉此吾之樂乎村也豫聞而歎曰古者市門惟民得入大夫士凡有爵祿者入市有罰蓋所謂市者府史胥徒兵戎卜祝百技工巧駔儈負販之輩淆處而雜繇之仲舉城市之跡寡而郊野之興濃則其樂乎村也有素矣將見垂髫之童戴白之叟相與謡康衢而歌擊壤其樂豈有涯哉仲舉之志尚亦可嘉矣作樂村說以貽之伯漢字說大雅之詩曰倬彼雲漢為章于天又曰倬彼雲漢昭回于天為章昭回不及日月星辰而獨言雲漢何也豈以日月星辰有蝕有隕有灾異而雲漢無之其猶善人君子之無咎者與且雲漢不常見必俟秋氣清而後見于箕斗二星之間其猶君子藏器待時而後出者與安成劉君士培之子倬資質淳美嗜學不厭以豫父執也定字于豫豫字之曰伯漢而書是說以貽之務謹字說城西蕭氏之彥曰務謹為人爽爽朗朗有疏通意磊磊落落有跌宕情幹濟有譽進退適宜達官貴人爭欲致之幕下豫知其必為時用久矣一日謂豫曰先生老矣毋金玉爾音而有遐心倘蹐城府於我乎舍雖纍信信無厭射也又云賤子近易名常不識于務謹之義協乎否也豫憶其色似欲得豫發其字之說務謹良友也豫雖耄及奚愛于一言哉謹之一字聖學之始終係焉不可須㬰離也故聖人于入孝出弟即以謹為戒而于君子之道未能一焉亦繼以庸德之行庸言之謹釋者曰庸平常也謹者行之有常也蓋朝焉能敬而夕則忽之不得為謹也甲焉能敬而乙則慢之不得為謹也大抵世之人往往能致謹于憂患危疑之際而不能致謹于平常動靜之間蓋君子所以為君子非玩常嗜詭求為甚髙難行之事但即夫目前平常之所行而不忽焉即納身于無過之地矣何也閨門之肅肅身教之初也家庭之怡怡為政之基也大者小之推邇者逺之則能致謹于平常則無往而不謹矣噫不忽其常而戰兢自持庸非君子之先務乎務謹常逰于江淮所見夫名卿賢大夫不為不衆所聞乎崇論𢎞議不為不多亦何待于豫言抑豫之惓惓于務謹者惟欲其不忽于平常方為謹之至而無滲漏也茂之茂之豫望子也殆猶河華之髙深豈如斯而已乎姑發其字之義以為進德之助云爾尚絅文輝名字說古之君子問學聚辨孜孜而不怠者非為人也誠以躬行之外無餘事德有所未修學有所未講皆吾身之憂一言一動惟反求之已以自治而已豈有一毫要譽之心㦲故暗然而日章者美在其中而文見乎外其光輝發越如石韞玉而山輝水含珠而川媚自有不容掩抑矣夫苟務外之心勝而務內之實亡汲汲焉求知于人而不能有若無實若虗則與古人尚絅之意豈不大相逺絶哉慈湖楊氏有云昔人以奢為耻今人以不奢為耻此世道之感也西安李君尚絅字文輝以才名弓招將提憲寄謙下力辭再授永新上坪巡徼官與士大夫語和氣滿容退然若不勝衣而詞氣之雍雍威儀之棣棣粲然有文以相接至其短衣匹馬見賊身輕又有二師之風焉可謂有文事有武偹矣名者實之賔揆其名若字可謂名實相符矣明廷論功必膺峻擢而施勞之色無幾微見于顔面非古之君子乎栁子厚云有其實者名固從之因其名若字之稱為作是說焉巽權字說巽之為德和順其于易也六以隂柔處初故或進或退意若有疑利用武人之剛貞以立其志至二之與五曰吉無咎曰貞吉悔亡無不利以巽順之得中也六四以隂居隂得巽之正巽于上而巽于下善處如此是猶田獵之獲三品利市之有三倍若九居上之極過于巽而失其剛則反喪其資斧矣惟巽以行權乃得之也從子巽謙下以與世浮沉而應變機敏進退適其宜輕重合乎節豫定其字曰巽權云歐陽止敬字說洪武六年秋豫與建寅先生俱以廷議徴辟辭不獲命同載詣省舟次積阜時建寅適携其子來見眉目娟好所謂蘭茁其芽者也明年冬豫至其家建寅在邑未歸其子進退揖讓周旋言論儼若老成風格豫深喜故人之有子也問其字則曰師友命之以止敬而孩名則未之更也于是進而告之曰聖學成始成終皆由于敬將白于尊父更之曰成何如且止敬之說豈獨為臣者所當止乎大學姑就其重且切者言耳綱常之間動靜云為之際舍敬何以行之哉故逺之事君此敬也邇之事父亦此敬也居致其敬不莊非孝徐行後長正容聽恭久而益敬晏子善交相待如賔兾缺獲薦出門如見大賔使民如承大祭果可有一之不敬哉故敬則成不敬則虧欲成吾之學成吾之德成吾之事慢忽以臨之而收其效者吾未之見也茍事事止于敬是以敬作所矣何為而不底于成哉處而為端人善士出而為賢卿大夫皆自敬之一念始顧名思義敬之敬之故人有子其使豫喜也歐陽生謝曰成不敏請佩斯語以為訓豫嘉其意遂叙次以為止敬字說仁齊說孟子曰人皆有不忍人之心說者曰天地以生物為心而所生之物因各得夫天地生物之心以為心所以人皆有不忍人之心也蓋不忍即是仁忍則非仁矣孟子又曰仁人心也蓋仁是中心之生理常流行生生不息終始無間苟無此生理則心即死矣其待人接物恭敬何自而發必無所謂禮處事之際必不能裁斷以合于義至于是非則頑然無所辨别而智亦荒矣是故仁為心之全德而不忍人者好生之端愛物之理也然惟仁人為能推之而得其宜是義之所存者亦仁也惟仁人為能恭儉而有節知覺而不昧是禮智之所存者亦仁也此可見其兼包四德而貫乎其中矣天體物而不遺猶仁體事而無不在禮儀三百威儀三千無一物而非仁也仁乎仁乎大哉德乎其人之所以為人者乎府掾蕭子仁氣質踈通儀表魁岸豫素竒其人一日至其居愛其雅潔而開豁見其伯仲怡怡競爽因題曰仁齊乃謝而求其說豫故發是義以告之子欽字說豫友王恭先既冠賔友字之曰子欽乃欲豫發其義于說庶幾終身佩服祈為君子之歸豫嘉其志進而告之曰恭者敬之見于外也欽者敬之主乎中也有諸中形諸外表裏如一非僞為也堯大聖人也史臣贊其德冠以欽之一字則見聖之為聖亦無出乎此矣蓋朝廷郊廟州閭鄉黨事上接下敬則成慢則隳立心之要道蒞事之切務也是以舜于恤刑命官一則曰欽哉二則曰欽哉而師尚父告武王丹書之訓首曰敬勝怠者吉宣父亦謂居處恭執事敬雖之夷狄不可棄也其丁寧拳切之意為何如哉子欽從豫逰所欲聞者堯舜周孔之大道故豫因其字發其要以勉之欽乎欽乎有一言而可以終身行之者其是之謂乎豫言切矣至矣蔑以加矣宜書之座右以自警伯康字說豫嘗見世之人有不敢康而獲康從康而不得康者矣服勞以養父母勤生以給公上明發不寐放仁義行不敢少自遐逸如是則理順而心安不敢康而獲康志士之為也書所謂所其無逸是也惰四肢而逸豫委庶事于不理問學就荒而弗憂博奕玩愒以為樂如是則欲縱而身危從康而不得康邪辟之行也詩所戒無巳大康是也吾宗階庭之秀有曰伯康已娶而不忘燈窗之苦己裕而不廢隴畝之勤養志而無違勞生以務本亦有志之士也今年執經于吾門無寒曝之間有足嘉者欲聞字義故以是告之雖然豫也老至而耄及世雖妄推之矣而常歉然于古人不可及為之愧汗浹背雖編離簡斷尚不忍釋况年富力强如伯康而可自怠自棄哉勉旃伯康慎擇而力行之可也孝力字說西愚劉先生之長孫曰孝力自幼頴悟豫見其可人意招致館下俾諸孫有所矜式日與講論先王之道以待用孝力御下莊以厲襟徒多嚴憚之惜豫家凉不能久淹也别數年矣學問日益加進踐履日益篤實近一再㑹于其里億其辭色似歎豫老邁欲聞其字之說以自警因念與人子言依于孝况其字有相及豫何愛于一言哉于是進而告之曰古人事父母以服勞奉養為切近第一事而服勞又居其先聼于無聲視于無形恆若親之有所教使是以大舜之聖完廩浚井惟親所命子路負米百里次翁受傭以供養休徴守奈于風雨石建為郎中令取親中裙躬自浣灑無非竭力服勞以順乎親則已心安矣不自竭其力不足以為孝豈當委之他人伊川亦謂事親若曾子可謂孝矣而孟子僅云其可未嘗以曽子之孝為有餘蓋子之身所能為者皆所當為也今世子弟自敖自逸為長者折枝猶瞋目語難頒白提挈負荷于前縮手旁觀而不顧秉彛受中以生靈于庶物獨不愧于心乎求如孝力惟恐子道之弗盡百無二三焉何世道之薄也父母之恩如天罔極于所厚者薄無往而不薄矣嗚呼世道愈趨愈下一至此哉聞豫言者有不惕然于中者耶有不幡然共為子職者耶必將有感于斯文得之誠孚中字說豫往年以故人館授侯城嘗宿招提之境羡其歷劫如在桃源鄉衮文信公榜署煥如日星可敬可愛因詠歌題其壁洎記其慈雲道場而始有斯文之好焉于時主院事者霖公也其季存誠信實爽朗酬應適宜人字之曰孚中孚中欲聞其說于豫適以歸迫未有以告之去年夏過其里辱止豫宿燈下笑曰先生于孚中二字得毋有諾責乎詰旦又以事牽弗果一語而去于今重遊有愧仲由多矣于是為之說曰中孚在易下兊上巽以一卦言之為中虗虛則無私無私非孚信之本與以二體言之為中實實則無妄無妄非孚信之實與人之為人存心以虛而無所偏倚接物以實而無所罔欺果何往而不見信于人哉故彖辭曰信及豚魚之二物也一躁一𡨕至難感者也孚信能感于豚魚則無不至矣而况靈于萬物之人乎雖然孚者潜通默化于其中而不大聲以色也夫苟形于聲色則所謂孚者非中而昧說以巽之義其為感也淺矣豈存心以虛接物以實之道哉師雖遊乎方之外而理則不踰是也其亦有味乎吾言也乎姑以是釋其字之說孚中尚其勉之劉閒閒字說吾鄉華蓋山有道士曰閒閒行混元教法以濟夫人既而喪明然不盲于其心與人語禍福億中如響逺近有竒疾者爭迎致之跨一驢從一僮貿貿自西自東無虛日又喜丈詞得名士一言榮于華衮屢求豫發閒聞之義豫以為閒者天下之至福也而閒之又閒乃至福之尤者也而未易得也唐人詩曰又得浮生半日間又曰能解閒行有幾人皆深羡極慕若不可幸而致也惟遊乎方之外者則庶幾焉蓋出無爵祿之縻以勞其心處無妻妾之奉以纍其身若可以少自暇逸矣可謂偹天下之至福矣而猶卒卒無須㬰閒者何哉而又謂之閒閒可乎道士曰天下之理始之不閒者有時而得閒專務于閒者閒終不可得矣詩不云乎不解于位民之攸暨豫之閒閒以衆人之安為一己之安以衆人之閒為一己之閒故語其閒非一言所可盡也豫笑曰道士辨矣雖然豫昔也聞之漆園吏曰大知閒閒小知間間間間分别町畦者也閒閒則從容自得之意矣夫苟從容自得于其心又奚以泥其迹為嗟夫世之人安于閒者不知閒之為樂而往往見小利者之為利而自擾之其于人賢不肖何如也豫既書其說以貽道士而亦因以自警焉歐陽海旭字說蓋嘗觀夫旭日之離東海者乎其始也出自暘谷次于扶桑烜烜赫赫蒼蒼凉凉衆陽之宗孰齊其光彼夫海氣之鴻濛也既進而升若退而藏故旭有驕鶱之意然剛而精終焉允臧在易卦為離明在陽爻為君子庸非君子德性之良雖暫蝕于物欲而夲體之明不逺而復則浮翳孰掩乎太陽賢人君子之在世也譬之皎日當空萬民所望歐陽生旦海旭資質開朗學知鄉方以推擇為吾里巡徼司吏周折廽翔未數月慨然曰身體髮膚受之父母吾安能以遲鈍日受責于大府而謀稻梁乎遂求代去行之日過豫求一言豫嘉其志作海旭字說以貽之使知自强云東旭字說佛者之徒心昶字東旭住儋嶺慈雲道場為人謹飭嗜詞翰嘗從長老雲林定公遊風致自異西愚劉先生欲豫為說以貺之豫以嘗瞻慈雲之嶺㠝岏崱屴意必有勝俟異日逰而悉之為一言未晚也庚申之冬西愚之從子敦復出守潯江豫往賀焉西愚與同登儋嶺以縱目而暢懷良宵劇談而知東旭之襟度藹如也西愚曰東旭之義俟子而發兹非其時乎豫愧諾進而告之曰旭者曜靈之光彩也方其升于東也蒼蒼凉凉或掩或彰躍于暘谷隱乎扶桑與雲霞而同出不烜赫而揚光庸非陽德之養晦者乎方今當寧求賢如渴凡吾儒與二氏之翹楚者莫不登崇授之以政而東旭則寄跡靈山勝地以遁其世茲東旭之所以為東旭也與其寓意微而婉矣雖然此用世法也至若明夲然之心見本然之性則當洞洞煌煌無隱之弗燭無逺之弗鍳矣師其勉之哉東旭謝曰一切出世法應作如是觀稽首而去麟原後集卷十一

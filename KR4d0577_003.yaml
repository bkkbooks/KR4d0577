body:
  text: 麟原前集卷三元王禮撰行狀德慶路郭推官行狀公諱某字民則姓郭氏廬陵人也系出汾陽王之第九子金陵府君府君仕于吉因家邑之麻江五世祖某徙葛陂在宋以科第顯內附初科詔未下至大三年公遊京師集賢院以茂異舉皇慶初筮仕濟南學正既至即訪求碩儒以新學校得張公起岩師表後進延祐科興張以明經進士魁天下士類益服公之知人已而東昌分憲以公性行溫純問學博洽保充館閣之職銓曹奉行不力公亦以躐等辭至治間授瀋陽路安撫使司髙麗軍民總管府儒學教授歷兩考升將仕佐郎永豐縣主簿任未滿丁內艱居喪盡禮弔者恱服服闋或勉之仕則喟然嘆曰始也干升斗之祿為養故也自今以往其無意于斯世矣况敢希榮名之寵乎改兩浙都轉運使長林場司丞竟不赴後選充京城義儲倉使公府催迫上道比到官勤謹自持五侯七貴餼禀之供入薄而出厚隳私以償公處之晏如無幾微見于辭色遷福安州判官以鄉里親舊所在杜門息交六載如一日州之長王侯德貞亷潔士也無得而少焉後以徴仕郎任興國經歷省臣辟充理問委赴江西求援未報而湖廣陷遂留豫章朝廷以淮氛滋昏道路壅隔命行省便宜銓注又有德慶推官之命國步險艱而公由是勇退矣禮聞公神情蕭散美髭髯孝友根乎天性子弟有片善奬借不離口世慮淡泊而交誼繾綣賔舊過從歌詠傾動于駢儷之文尤敏給使朝廷用舉者言置之清要必黼黻皇猷克稱其職何至馳驅簿書以老令人有用乖其材之恨哉嗚呼悕矣故老于今落落矣公生于闕丁亥沒于闕辛丑享年七十有五父肇慶府君贈從仕郎髙安縣尹母劉氏李氏俱贈髙安縣君妻涂氏封宜人夀八十而終子男三人子年子明子禮女一人在室孫四人諸孤以其年臘月葬于里之泉江山五年後余過葛陂公之冢子與余有故幸氛祲之始清慨譜乘之淪落俾狀其行以俟求銘于先友之相知者禮惟終慕之孝有不可辭故次第其槩以為之狀云前鄉貢進士廣東道宣慰使司都元帥府照磨王禮狀澗月居士胡君行狀君諱履輝字清翁吉之太和禾溪人也其先五季時由長沙辟地徙于吉𣲖别有三孟為值夏之胡若忠簡公銓其後也仲為南城之胡䇿慶厯六年第仕至朝奉大夫衍者其後也季為禾溪之胡分徙黃漕若進士南城丞箋暨居和溪者多其後也曾祖必舉字伯俊妣龍氏祖士茂字國秀歸附初以豪俊靖邑里人稱古澗先生妣劉氏父元永字宗逺一字東隱妣蕭氏陳氏君初生時大父夢月墮掌中命名曰月比長明敏穎逹幹蠱用裕公私酬酢輕財倜儻弛張合宜遇事即始見終通變不拘語儒不流于迂語吏不期于刻理較曲直不茍挫于人卓然能自樹立思大其家聲居當孔道迎送無虛日不倦力雖後人豐資富積無逺識者恆下之人謂東隱為不死念父沒抱不終養之憾事祖母劉尤竭其力寒燠之候滑甘修瀡之奉必躬視之母蕭氏先卒奉繼母無幾微不用其極兄弟四人君處其次佩服先訓聚居尊禮堂友恭怡怡始終如一季弟履寧實陳氏出也觀光京國屢易寒暑而無離憂者知兄左右盡養猶已在膝下也陳年踰八袠遭承國恩賜帛公率昆弟子姓升堂奉觴為夀潘輿萊衣焜煌後先歡洽三世鄉人榮之胸次和易爽朗如春風秋月不為崖岸險絶與鄉鄰處紛難以解釁隙以平里有巡徼從政者必賴以為治焉所居郭家渡舊有徒杠橫跨洶湧先世所建君繼志修理行者德之若間林寺重修清福菴崇道觀特建混元壇割田樹碑立祠奉先以托悠久非求福田利益也中嵗以生齒日蕃先廬不足以容乃求地溪東卜築杜山之下幽蔚夷曠翠合青回儲書有樓彈琴有室又闢南齊以聘師訓子為先務列置誠齊楊文節公福榮堂記煥章閣學士艮齊謝公儒林精舍記及祖若父墓文諸碑刻之存者于庭復輯録誠齊艮齊文信國公須溪劉太史青山趙先生麟洲龍先生諸名勝與先世往來詞翰序述暨忠簡公遺帖古澗吟藁盡刻梓以傳名曰胡氏流芳集其拳拳詩書門户詒厥孫謀類此晚别字澗月因以名堂示不忘先祖夢兆也搢紳先生喜其名實相副若吳草廬龍麟洲夏果齊虞邵菴而下為詞詠歌之者纍百篇又作退菴于居側取趙文敏公子昂所書蓬寓二字榜之性酷嗜古書名畫精于鍳别暇日與子弟擇其尤善者類分而貯之以資玩覽花時月夕觴咏怡神樂其餘年而時殊事異有足興慨者矣于是屬其子弟語之曰古今治亂相乘驗之前史可見承平混一幾百年厥今四郊多壘履霜堅氷其可憂者乎吾氏之居此土忠厚傳世殆非一日逹而在上立乎人之本朝則當抗言極論不避權奸以忠簡公為法窮而在下無民社之責則當保障鄉曲毋縱反側以古澗公為法况我里當義山遂水之衝冥頑之斬木揭竿者日相繼也鄉黨宗族之所依祖宗墳墓之所托保庇之責其容可後乎散儲蓄聚丁壯絶奸惡滋蔓為官府籓維正今日事也汝曹試思之君今捐館已十年陵谷之感何限而令子矻然砥柱中流使鄉里按堵如故是豈偶然也哉君娶嶽氏宋進士衍之五世孫也子男四人長志楫初以軍功授巡檢次志安繼兄履坦後次志道志德繼弟履常履寧後女二長適劉次適嶽孫男三奎煥倬公生乙未二月九日殁于至正丁酉四月八日葬于所居之後嗚呼以君之才之識使當賢智馳驅不足之日得效一官任一職豈不綽綽乎有足觀者而竟齎志以殁為人才世道惜者能不恨恨于斯乎禮之里違和溪一舍而遙知君家世舊矣又嘗與君之子逰益得君平生梗槩故序述其行俾得藉手以請銘焉光幽發潜仁人君子必有哀而賜之者矣謹狀李教授主敬行狀曾祖長翁祖崇甫父翔飛懷集教官妣劉氏君諱主一字主敬姓李氏廬陵朋田人唐西北忠武王晟生嶺南節度使憲憲生宜春府君遊遊家宜春至孫服應南唐三經科始遷廬陵朋田纍徴不仕賜號三經處士蓋自宜春徙居吉者衆朋田則處士之系也吳文正公題其家乘曰西平十五子南土百千孫墨蹟具在世業儒由科第起家者纍纍有焉君少負竒才俊氣登祝融歷長沙窺九疑慕聖賢之遺風考載記之往跡一時名士魯樵雲鞏志道貫子素燮元浦楊伯謙輩深器重之邂逅湘潭傾情輸膽揮觴落筆明日傳誦得聲吳楚間豈過情哉尤為廣西元帥章公所敬舉充陽朔校官不就後試吏宣城存心及物上下宜之適丁外艱後復歸湘潭子弟從者益衆方養晦待時而世事有可慨矣壬辰還鄊奉母避地既而母夫人以疾終猶能葬祭盡禮于奔竄之隙人以為難亂定卜築楓林之間以老學者稱之曰楓隱先生登山臨水耕道獵德若將終身焉已酉春㑹明廷遣使求賢羅山絡澤無逺弗至咸又以君為舉首後郡守王侯君澤以吉為江右名郡非得聞望老成不足師表學校遂力起君為郡博士在職寬敏屢以公委至京遂感痰暈之症既愈復作卒于家洪武六年十一月草六日也享年六十娶胡氏男一人汝善女二人繼胡氏男二人歐生歸生女一人壻安成周某越三日諸孤以君祔葬祖塋之側違所居近百步同邑王禮于君為斯文契既往哭之其子涕泣請書其行因念君平生劬學思自見于當世遭時多艱賫志以殁死之日家無以為葬傷哉貧也然論其為人非尋常可及而到君事大父極其敬順大父臨終撫其頂曰孝哉順孫吾必隂報汝克昌于後君親喪未除二弟淪胥以逝教養從子切于已子今皆成立重然諾一以意許知已生死不相負經指授者槩可觀輸忠猶恐弗盡自今觀之復求如君晨星霜木矣豈不重可歎哉有集曰秋山樵唱為文隨事說理穩穩有至味詩歌發揚清亮置之髙岑間殆伯仲也藝之末者余嘗取而傳之世躬行之實不無望于當世立言君子焉姑述其行以授其孤俾得藉手以請云謹狀教授夏道存行狀曾祖元巽吉水縣學教諭祖雷亨故不仕父吉先故不仕妣蕭氏君諱霖字道存吉水人也先世居金陵宋建炎中始祖澤以刑部司門郎從孟太后南遷至吉水因家焉世業儒在宋有父子相繼入胄監者在元有父子同中進士科者故里有聫魁坊君幼穎拔異群兒卓有逺志讀書嘗至夜分父母憂其勞勩止之伺母夫人既寢竊燈燭入帳披吟不輟稍長侍親往教親有所適即檢攝同輩莫敢嬉戲如親未出人已竒之二親之殁也祭葬盡禮僉謂夏氏有子延祐癸亥從兄仲善以易經舉于鄉君益勵志于學思並驅齊駕遂從季父明德先生受易大義季父亟稱于衆曰吾家科第又有人矣所居泮水經門而橋橫其西因名其居曰西橋流水之間日與名勝講習其中蜚聲籍甚祕書卿逹公兼善篆其顔御史貢公泰交序其事一時鄉之先逹如解中正馬成已王與耕輩皆相與莫逆讀其程試之文光明而俊逸暢逹而紆餘莫不以世科期之然試于私輒在前列大比之嵗又往往屢黜于有司其命也夫天厯已巳從兄再舉及第改㑹稽尹君由㑹稽入姑蘇過廣陵遡大江以逰乎吳楚之交于是四方慕夏氏之易學自安豐自姑熟來從者有焉君亦自負所藴期于晚成孰知宇宙墋黷而世事日非矣喪亂以來頻年奔走衣食之不給而未嘗阿附以取容敖惰以取辱惟待人一誠故雖暴夫悍卒亦知敬服僞陳之在九江趨者日衆或諷君以進君曰吾雖不能有為于昔豈不能有守于今耶遂擇忠襄文節二楊公之里卜築以老焉于時鄰曲親朋齒德相近者得九人每遇良辰美景必迭為賔主飲酒賦詩以為樂名曰真率㑹好事者繪為九老圖大夫士家莫不欣羡蓋山林恬退之趣君于是専之矣故亦自號退菴老人云既而天命耆定文事聿興設科取士無異前代廣東江西以較藝聘者無虛嵗省憲長二之崇儒者時因行人問安否自是從逰日衆而世故又有不得而辭者矣二守楊侯𢎞道聘之頖宫太守徐公彥中薦于省部辭之辭之不獲則受鄉郡教授以歸領職以來易佻達為謹厚起倦厭為勤敏稍稍無愧廬陵時朝廷方尚鄉飲之禮君與博雅君子考之經傳所載參之歷代所行酌古凖今不膠不陋由是冠帶濟濟有嚴有泰觀者歎曰郡庠非教授太守獨能行此曠典者乎越三月得痰疾交遊問視言笑自若一夕夢至家即動歸與謂子彛曰吾平生未了者惟吾父母改葬未安耳汝曹毋忘吾志言訖就寐翛然而逝實洪武八年六月十四日也享年六十有六沒之日太守率僚屬往臨治喪命載還其里太守而下及士友送祭于城南者數百人莫不痛哭流涕舟發而後返觀者榮之越數日諸孤權殯其柩于里之夏徑明年春彛兄弟具梗槩求禮狀其行每一執筆不覺澘焉出涕追惟較藝五羊忝同馳驅鄉飲議禮忝同揚確一話言一動容顯顯猶在心目而九京不可作動隔嵗時能無感于中者乎知已晨星相繼淪謝前年狀李君主敬善行君謂有此可無銘矣曾幾何時復述君生平惡得不動後死者之悲也君盛時未效于用事業未顯然為性寬厚口不論人是非與人言必依于仁義待學者亹亹忘倦遇有關于風教者必反覆極論使聽者感動常誨子弟曰作文作詩無補于世雖工何益徒費紙墨耳又曰文者德行之表德行之不足而名能文者亦僞焉耳使鄰里鄉黨常有斯人與居後生氣質豈不潜改而默化而不可復得矣若談經則欲探伊洛之微妙為文則喜效韓歐之舂容詩賦尤追古人鄉先生劉公桂翁評之曰道存之詩琢清貯淡凝幽拔竒不茍簡一語飄乎如輕雪之度風冷乎如寒泉之落澗淡乎如古罍洗之不可雜衆器也永嘉先生李公孝光亦曰豫讀廬陵夏君所為古賦詩和粹雄蔚浸追古之作者今其藁之存者有荷亭集越遊集金灘集馬田集莊西集振文集尋梅集養正集辭之溫厚衍裕要亦類其人焉配蕭氏宋殿中侍御史定基諸孫子男五人已有能纘其學者曰彛曰寅曰貢曰謨幼者未名女二人孫男四人從兄之子曰瓉英年俊發蚤試于時實君教也今以監察御史謫居鳯陽嵗時周繼憂形于色有甚于已子凜凛乎孝友篤行君子之遺風也是為狀曠作楫行狀君諱某字某姓曠氏廬陵西里人也其先在安成髙洲為著姓五世祖某徙廬陵宣溪蕃衍好善富埒封君焉至君九嵗而孤母夫人鞠養訓誨駸駸有成人意象逮長激卬周密恨不及事其父事季父盡孝道待族姻以厚處里閈以和見賔友以敬應門接物重輕淹速適宜不輕為然諾毋敢姗侮邑長多藉其視聽為公平喜鋤强梗徐徐析以理咸宛舌無能盡一辭鄰邑有猾民習詰告相雄長植黨詐欺事關節以法律罔無辜為生涯蔓于廬陵君曰蟊賊入境矣良植有不被害者乎集叨詖而盡除之濟其事者于我乎取由是逃責四逸境內靖安君力也居閒無事繕亭榭蒔花竹奉潘輿怡愈其間音樂之奉饔膳之珍雖力足以備養亦可謂左右無違者矣闢齊閣藏書籍常教其子曰懵于書者流于俗耽于書者淪于迂不俗不迂斯善學矣或者謂為知言至正壬辰兵釁日開淮冦攻掠郡邑君傾資以助軍儲里之石門群惡嘯聚左道惑民亦厚賞給募驍壯躪其穴鄉鄰以寧又領府檄紏衆數百人往援永新凡扞禦盡力且知方者皆其平生褱音懷誠秉忠之驗也乙未八月十有一日乃以疾沒于家于戲陵遷霧塞之際正賴英雋以驅馳黎萌庶其有濟而止于此豈不深可痛惜哉君生戊申十二月十二日享年四十有八配永新張氏簮纓世族也繼室中順大夫翰林直學士曾德裕之女三娶文氏則信國公從孫也男一人曰懷女二人壻楊某王某皆士族孫男二人諸孤權厝于藥溪之原後之一紀某年月日始謀葬于某所懷以禮其父執也求狀其行以請銘于搢紳先生賁其幽竁禮故述所知者俾得藉手往拜云王與京行狀廬陵西北鄉多王氏多祖金地長者長者在南唐時以仁厚存心澤物不倦嘗捨宅為寺鄉稱長者子孫蕃衍日盛在宋最賢者瀘溪先生庭圭也二十二世孫有諱彧者字與京生皇慶丙子六嵗而孤與弟茝俱賴大父撫育迄用有成既弱冠堂構數楹兄弟朋友時觴詠其間以為樂本齊王侯字其顔曰怡偲與京嗜學雖浮屠老子之宗醫藥卜筮之伎靡不畢究本齊帥廣東檄為潮州儒學學録以母老辭弗就明年有母之喪哀慕靡届祭葬以禮既而慨然曰人本乎祖譜諜之弗修尚得謂水木本原之思乎謀及季父用賢參訪棟溪連嶺茅堂分宜石分諸𣲖崇卑親逺瞭然黑白遂鋟梓以章圖系承㫖邵菴虞公為之序既又慨然曰人生所幸者有後有後而不使親炙名勝以成其材德猶之無也于是作齊三間以為藏修遊息之所以致博雅聞望之士種竹萟蘭焚香煮茗琴瑟在御圖史在前以雪竹名其齊則學士曼碩揭公筆也意謂雪以清其神竹以虛其心子弟之于學也其庶幾乎于時士之能詩者相與咏歌申齊桂隱二劉先生俱序其事髙州二守馮君子羽亦造雪竹而為之記焉逮元之季與京屢試藝有司弗利四溟塵昏即仗義募勇擐甲執殳身先戎馬間以殄賊為志謂功業可指取有孰知事有大謬不然乃陳亡于安成實至正丙申九月十三日也噫于今二十二年矣其子志伸痛念厥考齎志以殁無壞土以寄春秋展省之感䀌然永傷數求豫狀其行以傳余悲與京卓犖有志而逢時之不淑以至于斯也不忍違志伸之請嗟乎世之有其材有其志而無其逢者豈獨一與京哉曾大父逢丙字仲父大父展生字正叔父繼宗字用昭母程氏妻蕭氏弟茝字仲芳男一人善繼述即志伸也女一人淑慧適蕭惟臣是為狀劉宗海行狀先妣劉夫人之族姪曰宗海廬陵永福人也君生三嵗而喪母既冠䀌然內傷追服齊斬三年事繼母尤恭順逮丁外艱葬祭盡禮賦性剛直卓爾自樹非其義不屈念先廬之在中洲湫隘弗足容乃營構于溪南之雄美岡峻棟夷庭甲于鄉族臨川郡侯楊公益𨽻書于堂曰海峯美其屹乎波靡之中也生聚于斯聘師誨子為先務待諸子極嚴切左右奉命惟謹不敢少盩小有失雖對客廷辱不宥從學之隙即令幹蠱不使有幾微紈綺驕惰意象處家事雖瑣尾亦井井有法尤善生殖嘗業鐵爐于金牛大冶煽役者常千人由是髙資厚積漸擬虞任猶長松百尺雖不自覺而蓬蒿之仰羡于下者衆矣天歷已巳嵗旱明年道殣相望君為糜粥以濟饑殍存活者衆又運菽粟于淮歸以貸其不能糴者稔則收其直不計其息篤宗族之親明疏戚之系以宋潮州守城山王公孟孫所撰譜序請于翰林承㫖歐陽文公𤣥題辭于譜鋟梓以授族之人其尚義類如此初有舉君都水監從事君不屑晚值兵禍延蔓江右君率民義保障鄉井或勸上功大府庶異日一資半級可覬君曰從政而不能忠以報國亷以律已公以澤民往往獲譴有之但得朝野寧謐子孫淳厚傳家不絶詩書之澤足矣焉用仕既而元之國事日益非矣君亦擕家避地流轉無虛月然視鄉之蹀血玉成寨者逺矣非前知之明能自脫耶壬寅之嵗天兵收輯郡邑民間始復故業乙已正月負芻殘孽出沒墟里君不幸殞于家得年六十有六娶蕭氏有賢行相夫持家足為壼範子男五人天佑文佑保佑元佑科佑俱克植立不隤其家天佑先君一年卒女五人壻蕭西有曠作敬楊子言蕭㑹同王文達孫男十三人曾孫男三人以闕年闕月闕日葬君于闕越十有四年諸孤不忘先美俾狀其行余惟劉氏自南唐駙馬丞亮之四世孫昉徙永福于今有年數矣非世族乎宗海復振于中微為鄉閭所稱慕有過人者故家子弟無論學術所到茍能如君僇力賃殖轉遷有無以利其家則陶朱必屢散以得聲司馬不抱恨而立傳况土國者力有以贖又足全天倫之樂此余誦靖節人生在勤勤則不匱之句深有慕于君之立身而痛恨子弟無志量者齒于遊民也禮于宗海有兄弟之好死生契濶悲愴何極惡得不取其槩而狀之宗海君字也而諱則海云麟原前集卷三

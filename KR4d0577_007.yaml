body:
  text: 麟原前集巻七元王禮撰記雩都沈縣尹祠堂記三代御天下之賢也取之有其道用之稱其才當是時大者靖共豈弟信道不回小者和順正直執徳惟謹君臣之義有死無貳下逮秦漢先王之道幾息然人心尚醇魯地歸楚也曾幾何時即不肯易節於漢非高帝示羽頭彼豈有愧禮義之國哉田横於齊人也一隅之主耳及横歿二客自殺五百人亦自殺何其同心同徳視死如歸有如此者唐宋以來守節死義之士亦屢見焉我元有天下也取人多塗用人一律然國家涵喣幾百年報本之思雖齊民不敢廢况析人珪儋人爵者乎至正十三年淮孽蔓延江右效死勿去者李江州一人耳棄其守土死與冦力戰不敵死屈體折節求免弗獲死等耳而榮辱異不知所决擇何哉兵部全公之牧贛也以忠義固人心以公正為民望故墉壑獨完思欲風厲有官君子以報國素矣夏四月雩都縣尹沈侯野仙死於興國防戍之地仲子紹節死焉家僮二人死焉公聞其罵賊壯而哀之遣吏弔其家率屬候其䘮為文祭之立廟祠之舉官其冡子紹忠以世之於是贛人以為榮奮而從之也輕南唐後主時有淮人李雄憫國城重圍奮力徃救陣於溧陽與宋師遇父子俱歿李氏訖亡不沾褒贈容齋洪氏每痛惜其無傳夫舍生取義者其理正其心安即無憾矣傳不傳非所計也以今較昔沈侯之遇兵部公豈不誠幸矣乎予知其慰於九京也十五年余來雩都紹忠襲官已二年邑人感侯死事欲祠祀之紹忠曰昔我父雖尹兹土然未久而歿生未有以利乎民可以死而有累乎民哉自創祠三間於東南城隅設像以祀買田歲入粟十石贍祠事請記以示後予辭之辭之弗獲遂志思古之意以成沈侯之仁以慰紹忠之心以著兵部公激勸之美若沈侯大節之詳則有兵部公所製廟碑在侯字宗仁紹興人贛州路重修城北黄籙壇記老氏之教有壇安所稽乎古者祀郊廟則壇祀社稷則壇唐祖老子為𤣥元皇帝宜其教之有壇也曷為而屋之其猶祀帝於明堂以人禮事之親之也贛城北有黄籙壇而咸稱曰下壇何也城内壇者三為斯民祈禳之地尚矣順流上中下别之斯在下也此何以獨興昔紫陽張真人治妖猿於梅闗嘗此焉信宿仙真之所過化意必有隂佑而黙相之者誰與新之真常冲静大師周君常静暨其侣孔君道清也成之何時費將焉取我元至順三年里民劉英可禮請二人主壇事二人盡禱祀之誠兼岐黄之術所活既衆人益信之乃竭平日錙銖之積以供興作無求於人於是事神有殿燕居有舎井厨庾廊靡不完繕實至正八年也然則孰主張是太守正議伯都哷丹通守宣威哈都爾也求文於石者何欲來者知興廢在人勿替引之可也噫使凡有名教之責者能如孔周之用心其道有不昌矣乎城南園池記凡營第宅於州里者占臨眺之美什五六具園池之勝什四三并而得之者什有一二焉然好事之士鮮能遇之徃徃奪於髙訾富賈之流辱於委𤨏握齱之目則猶絶倫卓行不遇知己豈不負其平生竒氣哉金川黄某磊落士也卜築得園池臨眺之勝欲予有以記之問其概則曰弊廬久燬矣早夜以思年將半百而寸禄未霑吾志自期於古人吾遇乃不如今人城南可以隠而闔廬庇風雨曽不如桑土之綢繆者乎吾園廣袤數十餘畝倚其池雖結駟連軫可以徑度剏草屋數間其中東以貯妻孥西以待知友無欂櫨節棁之華有竹苞松茂之固以峯巒為障圖以雲霧為屏幙左經右史彼琴此奕暇則藝樹課蔬學尸郷翁從濠梁叟客至山肴野䔩隨意觴酌談笑竟日醉或鼓腹而歌歌曰我園我池其甘維菲其鮮維鯉衎我嘉賔如兄如弟於胥樂兮又歌曰中園有甓兮池有石杠佇立以視兮或潜或洋花之朝月之夕池上乎翺翔誠懙懙施施不知其不可也予聞而喜曰善黄君之樂斯勝也曩君家於驛近齋閣清幽玩好滿案滋蘭臯治蒲石士大夫徃還者輙倒屣迎留引滿舉白盡歡與世之擁婦兒屏間窺者異故賦詠傳誦矧結廬城南又所謂并而得之者勝概有以助發其偉懐名流有以品藻其清致則地若而幽景若窈而邃予豈惟羡君之得所將賀園池今日之遭矣兵亂以來予避地南荒惟恐山之不深林之不宻清江碧嶂之間無謝公屣者餘十年矣他日停楫東臯或造其勝尚當為君一一詠之石坡記古郢王君彦昭仕於江右也語廬陵王子曰吾舍於石坡之下日履􅀈确以遊以眺漢水湯湯其趾一瞬千里而石坡儼然泰華之儀刑矯然廬霍之秀拔友石益久熟察而愛之物無故觸之而物自壊或遷之不輕動以為墉墻倚柱隄防也外暴不為患膩滑離離而色不一噓之雲蒸而霧温叩之羽振而徴應用之砥礪則劍㦸銛鋭中藴玉而人莫之知吾性樂焉因之以自號子以為可不可也王子聞而歎曰天下之物茍適於用者皆可敬也而况於石乎况於石坡之産乎栁子謂楚之南少人而多石烏知石之徳豈庸衆人所及哉物無故觸之而物自壊剛也或遷之不輕動重也以為墉墻倚柱隄防外暴不為患忠也膩滑離離而色不一文也噓之雲蒸而霧濕潤也叩之羽振而徴應直也用之砥礪而劍㦸銛鋭利物也中藴玉而人莫之知謙也之八者君子或未備惡得以石視石耶盖剛而不潤則流於燥重而不直則流於滯忠而不利物則流於朴文而不謙則流於矜兹焉兼盡其美庸非才全徳備者哉或曰水沫為石柔而剛也或曰石乃氣之核陽而隂也王君樂石坡之為徳而身體之予知其寛猛之適中矣夫當蒸黎塗炭之極慨念何使非民急起而救之翕然致善政之稱於談者之口是石坡方由王氏知名天下尚何可不可之難哉詩不云乎惟其有之是以似之即石坡以觀其人君子有不知所敬者乎昔米芾見竒石喜曰此足以當吾拜予於石坡亦云王君笑曰子辯矣子辯矣請事斯語以為進徳之助予故記之俾知君之所以號具慶堂記至正壬辰吾邑郭一魯充洪省行人之職監司康公異視之知其二親耆艾善養無違為書具慶表其事親之堂亦可謂榮矣後之九年﨑嶇兵亂棟宇化為飛烟而親之具慶自若也一魯將謀新之繇章貢訪予雩水之上語及具慶喜動眉睫徴予文記之予聞而歎曰具慶之樂豈易致哉謂其係於天者固也予竊以為亦存乎人焉上焉其親下焉其子無所愧負而後天之厚於我者始不孤矣天下親之具慶滔滔皆是也其間有而樂之者幾何人哉得天為至厚而於人有未盡雖有具慶如無有也今郭氏之堂嚴君徳慶推官與宜人涂氏朋夀一百五十歲矣齊眉偕老鶴髪童顔笑語雍容兒孫環膝此天隲佑之隆非偶然者而徳慶知止足之分杖屨邱壑撫青松以怡顔娱白雲於無心視彼日暮途逺倒行逆施有逕庭矣庸非保有厥慶亦係於其親者乎一魯兄弟馨膳潔飱承顔候色夙夜匪懈惟志之從以適親心有家庭之譽無子弟之過又有以成具慶之樂郷人望廬起敬起慕嗟乎予少之時未嘗少離乎親側人固有羡其具慶者矣其後有四方之徴欲躋攀分寸為父母榮也定省之疎甘㫖之缺間亦有焉由今而思榮不盖愧矣聞一魯具慶之樂不自知涕泗之交頥也古人有云孝子愛日又曰為人子者願為人兄不願為人弟知此有不惕然於具慶之日者乎郭氏能全斯樂予故著其父子間意而深羡之亦以志吾之過云耳詩禮庭記詩禮庭者麻江郭氏之古堂也郭氏莫顯於唐令公第七子嘗佐廬陵廬陵有郭氏自兹始當在宋也有通五經指要三舉於郷號盤軒翁者爰構斯堂於時藏修於時游息於時詒謀他族所莫及也翁三子七孫其孫字洪徳者恭儉慈厚顯用於時予既識之知其有聞於家教矣伯氏𢡟徳邃於易學惜乎未及識其子復過予雩陽舉止雍容談笑又信其不産於三家市也一日請於予曰吾氏自先宋以來莫不兢兢焉詩禮淑身者以曾大父家訓在闔門數百指聚廬托處兵亂以來悉為煨燼惟詩禮庭巋然獨存意者天之佑之善餘之澤或未艾也昨謀於季父將翼以傍舍新之庶幾勿替引之意也願記其概可乎因為言曰詩禮之教聖人數數然言之不厭盖深致其意焉耳平日雅言執守者詩禮也示門人為學亦曰興於詩立於禮也至於過庭之訓二者初不與易於此見聖人心胸公平廣大人知未嘗私其子予以伯魚所聞論之未嘗不厚其子也盤翁取以榜其庭使子孫嘗目在之用意頋不深逺哉游斯庭者愾乎如聞我祖教詔之歎息肅乎如覩聖人獨立之儀刑頋瞻之頃必慨然而興曰温柔敦厚詩教也反求吾身其有一毫弗似否乎恭儉莊敬禮教也反求吾身其有一息或戾否乎慎思之篤行之將見易直子諒和平老成達於政而能言進退揖讓周旋酬酢㑹於理而能立邇不負詒謀之盛心逺不愧埀教之本意豈非吾願望哉舍是予無以助子矣復謝曰善哉敢不服之無斁以無忘先生忠告之賜於是忘其淺陋援筆以為記遊洞巖記予兒時聞郡城士女仲春多遊青原洞巖有暢敘之樂稍長嘗至青原惟洞巖未始有一跡庚子秋與親友龍同翁子元辟地明徳江口李家歩萬載黄鍾鍾英同邸暇日鍾英子元約遊洞巖觀值夏儒生胡章文煥臧夣良尚弼偕行予二兒亦在侍經邱尋壑縈紆而入得遺墓榛莽瓦礫間令人興塵世轉堪哀之歎仙童道予至東巖循谷至尾石壁峭立􅪤罅有若掩闗狀相傳唐貞元年中吉郡閻使君寀自表入道暨得戎昱代隠巖下久之石漸合其家人猶見門内桃花半樹不復可得入泉㶁㶁自巔而下自藤蘿埀瀑中類龍須俗號龍須草泉可咽不可𠻳味甘而烈絶頂有玉華壇乃曾仙化處有棋枰藥臼微雨未徃觀西洞清幽通浄居寺釣臺下水所謂六仙者閻君前有謝仙後有彭劉曾皆無名曾此山道童而楊仙師在東山者亦與傳者云昔天師嘗定天下名山三百六十以應天度此居其三百三十五焉觀有徐楷記自寳夀改名朱陵其後忠簡胡公銓丁大中丞公憂服除與兄蓬山居士築栢舍於洞巖從名儒蕭楚講學觀門殊庭叢書閣多忠簡與周文忠公題匾其解牛菴壁題云省菴居士周子充澹菴老人胡邦衡同欵朱陵飯蔬食歠茗聴鳥弄甚適乾道庶子啟前志忠簡又詩云夜久巖壑寂黙坐祠宇岩瓦響松落子磬聲風入簷月晴添澗浄雲散露峰尖對景發遐想莫肩梅與閻屬和賦詠滿壁今皆烟飛影滅諸老聲光無所窺尋矣少焉出山坡外有碾涡磨室乃羽士僑所肅客烹茗因得洞巖初集中有唐戎昱送閻使君入道詩云聞道桃源志塵心忽自悲予當遊宦日君是去官時金汞封仙骨靈津嚥玉池受傳三籙備起坐五雲隨洞裏花常發人間鬂易衰他年㑹相訪莫作爛柯棋又一律云廬陵太守近隳官月帔初朝五帝壇風過鬼神迎受籙夜深龍虎衛燒丹水溶入鏡纎埃静玉液添瓶潄齒寒莫遣桃花迷客路千山萬水訪君難與荒幻之說徃徃合約山朱渙有齊天樂云白雲封斷仙巖路重重洞門深窈翠竹籠烟芥崖濺瀑古木隂森回抱壇空石老鎻一片莓苔幾叢莎草試把桃源較量風景是誰好乗鸞人去已久只今惟有鶴飛猿嘯樹擁青幢泉敲玉珮疑是羣仙重到塵氛可笑久志慕丹臺夣思蓬島願把真遊細㕘梨與棗鶴田李珏詩云苔徑入東西蒼崖不可梯磵分泉脉逺雲䕶石稜低瑶草春烟濕桃花客路迷閻君成道後誰復此幽棲予曾伯祖衡州史君南山翁季雍亦有句云神仙所跡人難詰宇宙初開孰與謀最後須溪劉先生依同年蕭獻可於虎溪與巽吾彭元遜亦有登覽之句劉詩云古木荒烟闔又開洞門無鎻有誰推瀑泉未受徐凝涴石壁猶留叔夜來黯黯蒼苔開寳宇髙髙華盖化人臺日斜鐘動山門雨不見林僮放鶴回又云洞府由來自有真緑扉半闔劣容身山中黄石避逃我城郭令威憔悴人桑海何如麻谷水桃蹊只是正元春道家藏室書何在風雨荒祠認墊巾彭次韻云五百年間石壁開偶然約候不須推古今亂世神仙出風雨空山客子來六士飄颻專洞壑三華離使擁蕭臺御風更上千山頂又見乖龍抱耳回又云從來踈懶任吾真自省三生見在身石室舊書應待我半山長嘯更留人白雲下抱蒼崖雨野草時通洞府春城郭遺民今老矣史君應復識綸巾閱之盡巻子元作而歎曰昔之遊此者名流多矣非藉歌詠何以暢一時之雅懐為異日之佳話况兹遊實濯濯文翰之侣盍賦詩以紀斯㑹於是用江山留勝跡我輩復登臨為韻分賦巻成人藏一通一通授羽士鶴臯草樓予故紀其概以見一時遊心方外仰止先賢之意云友慶堂記安成王尚賔遣其子孜致辭廬陵王禮曰某世家臨川唐同光間有為吉州刺史因家焉名其里曰金溪示不忘始遷故地先祖崆峒先生周顯徳中赴召讀史官之弗就賜號孝友居士諫官楊公徽之榜其燕居曰孝友其後辟地城居既靖大父兄弟復謀歸金溪之里曰是初徙之止基也屋廬尚足庇風雨忍委而去之乎更字其堂曰友慶趙文敏公書之程文憲公記之兵興以來堂燬記逸僑居郡城又十年矣慨念始也思自樹立期不墜家聲孰知命與時離竟沉困卑位無所成名今焉老將至而耄及之復奚能為仍誅茅金溪為待賔課孫之地復以友慶二字掲之楣間庶來者體先祖友于之心榮立家門志願足矣竊聞古以文辭自娱者率能成人之美斯志未有以詔後敢控於執事禮以荒蹇辭久而不獲其知友王季䪫又日賛於側於是因季䪫復之曰髙明祖父以友慶易孝友者非忘孝也友者孝之成也人之於親生事葬祭之外無所用其情惟起處笑語是思杯棬手澤有所不忍以及一草一木之愛皆孝也而與我同親之遺體者乃有䦧墻撡戈之怨則生事𦵏祭之盡情皆偽焉而已耳果得名為人子乎鞠子不哀紾臂不恤死者復生生者有不愧乎夫非為兄弟而友也至友而後孝之道始成古之人友其兄篤其慶或於世三十年八百驗之予則以為友與慶同出異名有其友斯慶存焉慶非在友之外也嘗觀兄兄弟弟之家怡愉雍睦聲孚氣感而父子夫婦長㓜朋友無不各盡其分是已由乎吉祥之中其何慶如之彼或等同氣於途人視手足如胡越則情誼乖戾外務旁觀祚薄門衰再世希不失矣王氏兄弟不忘其同出而友焉王氏子孫又不忘前人之友而友焉將數世之長如一日友未有已其慶焉有涯哉一家仁一國興仁此感彼化是慶又將被於郷國之逺矣登友慶之堂思友慶之理其不戚戚於心也夫尚賔聞之喜而歎曰㫖哉言乎使來者誦斯文而油然孝弟生於心君之賜也敢不拜嘉酌而賦抑之六章曰無言不酧無徳不報季䪫酢而賦杖杜之二章曰豈無他人不如我同姓禮喜其有味於予言而相悅以有成也遂為之記吉安路重修司獄司記至正十二年夏廬陵守臣既復其境土實墉實壑且守且攻其明年冦勢日平庶司咸竭力興廢以還舊觀於是攝司獄王君存義掾史李君徳彦周覽圜宇上落旁通户牖摧敗而器物之廢者過半矣相頋慨然曰責可辭乎遂倡而修理之自春渉冬克底於成丹雘炳炳有如改作徳彦謂予曰子抑知前司獄薛公之居此乎在職九年獄求其情必不可枉非辜以阿上一介無取於人雖屢空恬如也至元三年以俸積剏建弼教堂暨於門廡而内外囚舍之廢者葺之復廣司獄勸田為五十三石以備囚糧之不給者其用力勤而存心厚矣去年冦退舍燬碑仆鞠為荒隅即今日葺之之難知剏者之不易庸忍薛公之美無徴於來世哉子為我志於石嗟乎古者治道隆替騐之囹圄之實虗故刑措不用乃三代極盛之時王政之成也獄之所係大矣任是職者豈徒然哉徳彦始以憲司書徃赴辟於此至是果能欽恤為心經營䘮亂之餘且切切焉前政之美不傳是懼其用心與力可謂無愧厥職矣後之典獄者得於見聞惕然興念官以薛公為師吏以李君為法刑期無刑即一郡之三代也推而放之他郡豈非國家盛美之事哉薛公諱居敬晉寧人李君名宗聖豫章人存義則吾郡尚義之家傾私帑助公室者是為記麟原前集巻七

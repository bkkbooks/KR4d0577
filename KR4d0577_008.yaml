  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0577_WYG_008-1a, image: WYG1220/WYG1220-0426a.png}
body:
  text: 麟原前集巻八元王禮撰表鄭氏孝義門表門名孝義者何朝家旌淑之令典也浦江鄭氏有之而他不得者何鄭有孝義之實也余讀揭文安公孝友傳見鄭綺事親孝父以非罪繫獄綺欲見不得以頭觸圜扉出血上書請以代郡守錢端禮偉之為直其事母張氏末疾綺保持若嬰兒雖奏圊必抱就之三十年不懈其四世孫徳珪友其弟徳璋甚至怨家傾徳璋以死罪逮送揚州徳珪以詭計先往當之徳璋比至兄已死獄市中矣未嘗不深羡其孝友萃於一門與古君子同科故至於今十世同㸑無有私財内外翕然一遵先訓宜乎名公碩士播之聲歌著之紀述達之邦國天下洋洋盈耳粲乎簡編以埀耀於後然余猶以為是理之固然也秉彛好徳人心所同孝義同根於是心有不喜談而樂道哉至若養祈泉而井湧𦵏禱霽而雪消馬待齊而茹草犬各雛而均哺然後知孝義之感達之於天而天應之求之於地而地應之被之禽獸而禽獸化至徳通貫豈惟感召同類而已哉及觀其家範朔望家長率衆謁祠堂畢出坐堂上男女分立堂下令子弟一人唱聽唱以儆衆耳一人誦於側曰子道孝養妻道順正兄必愛弟㓜必敬長毋狥私欲以妨公義毋聽婦言以傷和氣毋為非横以干天刑毋躭麯蘖以亂厥性有一於此既殞爾徳復隳爾𦙍勝兹訓辭實係興廢言之再三爾宜深戒於時會揖而男女各堂以序會膳議所當為各趨其事而矜不能冬夏有衣履之給婚𦵏有禮物之助宗族之無歸者生有義宅以居養之死有義祠以烝甞之鄉隣之無後者生有義廪以賑給之死有義塚以安厝之凡數十條焯焯前賢之遺意繼承其良規防範其流弊念慮詳宻而規模宏逺又未嘗不嘆夫天之報施善人必使其有賢子孫世世守之勿替有引故一堂雍穆有如此者然觀世之清門舊族又有彼友而此不恭下順而上弗睦見利達則忌之見清修則汚之若是者抑獨何心余又竊疑夫鄭公之鄉必其山川之美風氣之聚有以助之故後之人同心同徳無有榛梗如是其逺不然何為非他族所能及也嗟乎嗟乎浦江之鄭誠有足敬者矣過其門孰不曰此堯舜之民也此鄒魯之俗也為其子孫者可不以此自待自厚也哉鄭君仲纎溫厚君子也視余以其家集披閲數四起敬起慕遂飾鄙陋之辭綴其巻末以為孝義門表盖表其異於他氏而亦因以自儆發云真定張氏樂丘表洪武庚申前承事郎廣東道宣慰使司都元帥府都事張翀即其所居之右營樂丘焉一日與其友廬陵王某往觀之謂曰人生屈伸聚散猶晝夜猶夣覺誰能免此存順殁寧均托於是吾平生動静惟子能悉片辭為我表之庶及我之見也庸非友朋之高義乎某辭弗獲則以所見所聞所傳聞叙之張氏真定趙州栢鄉右族也上世多聞人膴仕曾祖嘉議大夫户部尚書榮祖承務郎集慶路上元縣尹仁父承事郎言安路萬安縣税課大使彦祥封真定路趙州判官母王氏封宜人翀字鵬舉㓜隨父宦遊於吉時世父皓任吉安路總𬋩喜其頴㧞遣入郡庠從名師後以儒生推擇為吉州水吏陞補隆興路掾檢舉積年無所稽决舊牘凡數十白諸省府之長盡去其籍革絶虗文站赤舊遇馬死站戸輙賂提領之屬遷延不補使櫪上之驛絡繹受困君搜弊問罪馬政一新御史過而悦之大加稱奬壬辰紅巾逼江右省委隆興治中潘景中繕城墉潘猝無所措一夕髭髪盡白總管安謙召君與謀君曰事急矣陶甕何及凡寺觀街衢及縣司各處條石移以起城借民庫磚足之而城以完遷補吉安掾時㓂初退城市煨燼達嚕噶齊丁中憲􅋈舟東岸總管梁亞中屯戍大洲墉壑墮寘民無與守府長危之君知真常永興二觀之豐裕召而諭之曰有城斯有民有民斯有觀唇齒相依者也今城漸完其上守鋪百五十所敢以累二觀將真常免戰艦之修永興免户役之累以優此勞二觀風從翕然以就其次修葺倉庫官舍設置險要防禦近逆境者免秋糧罷軍需賑饑勸分停不急之務皆君賛襄力也至若權謀機變雖古智能之士無以大過初丁中憲憂㓂蔓而兵少命典史陳徳威勸義士募丁壯以偹荆時省椽陳允中自長沙辟難至永新民共推之遂典一州兵務義士有憚徳威嚴切賂允中之佐呉以吾罪徳威遲慢軍情擒寘於獄丁公求而弗獲頗銜之委君牓散其兵權允中覺遣其妻之弟額森迓於龍福以羈君君匿於斷岸榛莽避其鋒厚賞募民乘其後也先被禽於是徳威囚釋而以吾就罪丁公又命進士龍元同攝萬安尹龍騐屍鄧林劉季安遣客刺之領衆白尹事聞委君馳驛調㤗和州尹達正道討之達以粗能自守辭君单舸自詣萬安因所識求見季安詭示以按龍泉官典失守檄季安為酒饗宴懽如平生時叅政全普菴薩里留贑遣寧都州尹楊鈞州判蘭生領衆五百駐皂口意在季安而未敢入季安亦疑之君啖以甘言且曰二人吾友舊也願借季安一羜二卣侑懽媛一人吾往與接殷勤覘之驛舫留此季安以二价從我因得其情矣遂至皂口與楊蘭相勞苦飲酣披腹心出全公擒偽尹特勒宗從旁目及焉明日回邑中令勒宗語季安我不欲數露形迹向晚大尹可來商之夙戒烝徒曰劉尹至吾舟燭滅即離岸發櫓矣至昏季安從數人至君請尹登舟而約其從謂謀不可不宻也已而燭滅舟開順流如箭瞬息抵快閣矣逹侯聞之驚倒萬安歸正全公聞而嘆曰吾遣二人領五百衆以往乃不如鵬舉一人使我得一二如鵬舉者何所不濟乎迨君之掾廣東帥府也首掌邊闗於石門口盤詰私鹺官賣文引致糧五萬餘石招安連桂二州及南海三山官窑反側又典選法衰老待次者遄除豪富叠注者追改愬訟咸歸歌謡載道本道憲使伯嘉努暨帥府官薦剡交上至正十九年入京授前職考滿憲使布扎爾布哈復薦於朝君慨然曰海内兵興征伐之權自方伯出其能乆乎吾父母年高僑居於吉定省乆踈子職缺矣乃間道歸覲怡愉色養孰知悦親之志長而待養之日短明年連丁内外艱然三牲之奉五鼎之祭亦不愧人子矣既而築室廬陵城西以老占園林之勝而字其堂曰知止君子莫不高其志云嗟夫若都事君者其亦罕見也乎智足以牢籠百態而所守也正才足以應酬萬變而所見者逺有拯民濟物之心而不逄其時有燭奸捄弊之䇿而不盡其用然而進退不失其宜恬澹以保其節仰有以光乎前俯有以啟乎後亦可謂卓犖不常者矣昔人曠逹之懷固有以自銘其墓今君樂丘成而屬筆於某其亦知某之剛直言足取信於後世歟是為表麟原前集巻八

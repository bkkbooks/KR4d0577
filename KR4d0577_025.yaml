body:
  text: 附録元廣東宣慰使司都元帥府照磨王公墓志銘賜進士第中順大夫詹事府少詹事兼左春坊左諭德經筵講官闕里孔公恂撰麟原先生歿于洪武丙寅四月二十六日以戊辰十二月庚申葬於中村其髙祖運屬官之墓後距今成化改元乙酉七十有八年其族孫大理公槩以其曾孫謙所奉壙志來請銘豫與大理公舊同寅也誼不可辭按志先生諱禮字子讓姓王氏世居廬陵之宣溪自號清和道人因所居後有憩麟山學者稱為麟原先生曾祖維翰祖公塗父斯覺俱隱居弗仕母劉氏先生生而聰慧好讀書事親孝五嵗就學揖讓進退儼若成人八歲四書經傳皆通習之十歲即有志于科第出就外傅習舉子業年十五作文􅋵筆立就老師宿學皆嘆異焉十八試於有司與群士爭衡至正十年庚寅以詩經魁江西有司以名聞十一年授安逺縣教官十三年循民弄兵掠汀州攻龍南于是安逺頑民作亂十五年贑州路總管噶海齊以先生嘗典教是邑令奉詔往綏之蠻獠礪兵刃弦弓矢以逆于境先生諭其父老曰吾奉詔輯安汝民宜改過自新毋自速咎使妻孥得保首領以歿顧非幸歟若負固肆暴一旦天兵逺臨父母昆弟並遭擒戮悔之何及汝宜思之父老再拜謝曰明公教以生道敢不自悛叱其子弟令各歸舍解甲為農于是逺近居民悉遵化贑州移文省憲議功十六年授興國縣主簿未幾以親老辭歸江西行省參政沁布阿咱爾聞而嘉之遂辟參謀幕府越明年遷廣東道宣慰使司都元帥府照磨十八年噶海齊為江西行省參政總戎贑州復召先生歸幕府參贊軍事九月陳兵陷贑沁布阿咱爾與噶海齊俱死所領兵亦潰先生偕都事巴延子中收餘兵棲天封意圖恢復而世事日非矣乃取道過雩明年挈家下贑又明年歸廬陵而鄉里莽為邱墟民不遑處二十二年江西內附遂構堂于古城舊址鄉郡學者爭師之洪武紀元詔興學校郡守王君澤以書幣延至于郡庠為學者師洪武庚戌設科取士于是福建廣東藩臬奉詔禮聘先生為考試官繼又江西湖廣書幣交至皆以疾辭弗往八年詔行鄉飲酒禮郡守徐彥中以先生老于文學固請為賔講明禮法九年四明烏斯道知奉新縣事復迎處賔位多所咨問焉先生自少至老嗜學不倦其于六藝之文百家之書靡不閲覽嘗類群賢之詩名曰長留天地集滄海遺珠集行於世復輯官針一帙名曰為政規範俾官守者得以法焉每于嚴冬氷凍輒減米以濟貧者鄉鄰德之元季以來科舉法廢先生遂工為古文是時前進士江浙提舉雲陽李公祁國子司業西昌劉公嵩翰林學士金華宋公濓每見先生之文咸推重焉亂後文多散逸其所存者百無一二名之曰麟原集生元延祐甲寅正月四日夀七十六配吳氏有賢德子男三人長楫次朴次樞楫樞先卒女一人適固塘文氏孫男四人士頡景蘧希晏慕僑曽孫男十三人謙其一也銘曰仁者必有後而後未必多賢吁嗟乎先生簮組綿綿德者必有言而言未必能傳吁嗟乎先生道義兼全道以淑人義以制事惟所在而能安故俯仰而無愧中村之陽有幽其堂勒銘斯藏百祀不忘麟原後集附録
